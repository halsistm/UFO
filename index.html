<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO キャトルミューティレーション</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08071a;width:100vw;height:100vh;margin:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;touch-action:none}
  #gc{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;touch-action:none;background:#050510}
  canvas#c{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:0;box-shadow:none}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;pointer-events:none}
  .panel{background:rgba(0,0,0,.6);border:1px solid rgba(100,220,255,.3);border-radius:10px;padding:8px 14px;backdrop-filter:blur(6px);pointer-events:all}
  .sc{font-size:22px;font-weight:700;color:#7ff0ff;text-shadow:0 0 12px #00eeff}
  .lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
  .bw{width:140px;height:9px;background:rgba(255,255,255,.12);border-radius:5px;margin-top:4px;overflow:hidden}
  .bf{height:100%;border-radius:5px;transition:width .25s}
  #hpf{background:linear-gradient(90deg,#ff4466,#ff8800)}
  #alf{background:linear-gradient(90deg,#ffaa00,#ff2200)}
  #upbtn{cursor:pointer;background:linear-gradient(135deg,#1a3a5c,#2a5a8c);border:1px solid rgba(100,200,255,.5);color:#7ff0ff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;letter-spacing:.5px;transition:all .2s}
  #upbtn:hover{background:linear-gradient(135deg,#2a5a8c,#3a7abf);box-shadow:0 0 12px rgba(100,200,255,.4)}
  #upanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,8,28,.96);border:1px solid rgba(100,200,255,.4);border-radius:16px;padding:24px;width:340px;backdrop-filter:blur(12px);display:none;z-index:100}
  #upanel h2{color:#7ff0ff;font-size:18px;margin-bottom:16px;text-align:center;text-shadow:0 0 10px #00eeff}
  .ui{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,.05);border:1px solid rgba(100,200,255,.2);border-radius:8px}
  .un{color:#fff;font-size:13px;font-weight:600}
  .ud{color:rgba(255,255,255,.5);font-size:10px;margin-top:2px}
  .ub{background:linear-gradient(135deg,#1a5a3a,#2a9a5a);border:1px solid #3aca7a;color:#7fffa0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap}
  .ub:disabled,.ub.mx{background:linear-gradient(135deg,#333,#444);border-color:#555;color:#666;cursor:not-allowed}
  #clo{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:8px;border-radius:8px;cursor:pointer;font-size:13px}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.78);border-radius:8px;z-index:200}
  #ov h1{font-size:46px;font-weight:900;color:#7ff0ff;text-shadow:0 0 30px #00eeff,0 0 60px #0088ff;margin-bottom:8px}
  #ov .sub{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:28px;text-align:center;line-height:1.8}
  .btn{background:linear-gradient(135deg,#1a4a8a,#2a7adf);border:2px solid rgba(100,200,255,.6);color:#fff;font-size:17px;font-weight:700;padding:13px 38px;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:1px;box-shadow:0 0 30px rgba(0,120,255,.4)}
  .btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,150,255,.6)}
  #ctrl{position:absolute;bottom:10px;left:12px;color:rgba(255,255,255,.35);font-size:10px;pointer-events:none;line-height:1.9}
  /* ── 図鑑 ── */
  #zbtn{cursor:pointer;background:linear-gradient(135deg,#3a1a5c,#6a2a9c);border:1px solid rgba(200,140,255,.5);color:#dda0ff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;letter-spacing:.5px;transition:all .2s}
  #zbtn:hover{background:linear-gradient(135deg,#6a2a9c,#9a3acf);box-shadow:0 0 12px rgba(180,100,255,.4)}
  #zbadge{display:inline-block;background:#ff3366;color:#fff;font-size:9px;font-weight:900;border-radius:999px;padding:0 5px;margin-left:4px;vertical-align:middle;line-height:16px;min-width:16px;text-align:center}
  #zov{position:absolute;inset:0;background:rgba(4,2,20,.96);border-radius:8px;z-index:150;display:none;flex-direction:column;overflow:hidden}
  #zov-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(180,100,255,.2);flex-shrink:0}
  #zov-header h2{color:#dda0ff;font-size:18px;font-weight:800;text-shadow:0 0 12px #aa44ff;letter-spacing:1px}
  #zclo{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px}
  #zgrid{flex:1;overflow-y:auto;padding:18px;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start}
  #zgrid::-webkit-scrollbar{width:6px}
  #zgrid::-webkit-scrollbar-thumb{background:rgba(180,100,255,.4);border-radius:3px}

  .zcard-inner{width:100%;height:100%;position:relative;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.6)}
  .zcard-inner canvas{display:block;width:100%;height:128px;background:#111}
  .zcard-bot{padding:6px 8px;background:#0a0818;height:82px;display:flex;flex-direction:column;justify-content:space-between}
  .zcard-name{font-size:11px;font-weight:800;color:#fff;line-height:1.3;letter-spacing:.3px}
  .zcard-type{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}
  .zcard-stats{display:flex;gap:6px;margin-top:3px}
  .zcard-stat{font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:3px;color:#fff}
  .zcard-count{font-size:8px;color:rgba(255,255,255,.35);text-align:right}
  .rc-common{border:2px solid #888}
  .rc-uncommon{border:2px solid #44cc66;box-shadow:0 0 8px rgba(60,200,80,.35)}
  .rc-rare{border:2px solid #4488ff;box-shadow:0 0 10px rgba(60,130,255,.45)}
  .rc-epic{border:2px solid #cc55ff;box-shadow:0 0 12px rgba(180,60,255,.5)}
  .rc-legendary{border:2px solid #ffcc00;box-shadow:0 0 16px rgba(255,200,0,.6),0 0 32px rgba(255,160,0,.3)}
  .stat-w{background:#334466} .stat-s{background:#334433} .stat-t{background:#441111}
  /* Card detail overlay */
  #cdov{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:160;display:none;align-items:center;justify-content:center;border-radius:8px}
  #cdcard{width:280px;background:linear-gradient(160deg,#0e0820,#180a30,#0e0820);border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8);position:relative}
  #cdcard canvas{display:block;width:100%;height:200px}
  #cdcard-body{padding:14px 16px}
  #cdcard-title{font-size:20px;font-weight:900;letter-spacing:.5px;margin-bottom:4px}
  #cdcard-sub{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:10px;letter-spacing:.5px}
  #cdcard-stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .cd-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.3px}
  #cdcard-desc{font-size:11px;color:rgba(255,255,255,.65);line-height:1.7;font-style:italic}
  #cdcard-close{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:8px;border-radius:8px;cursor:pointer;font-size:12px}
  /* New card toast */
  #nc-toast{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:170;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
  .nc-pop{background:linear-gradient(135deg,rgba(10,5,30,.95),rgba(30,10,60,.95));border-radius:12px;padding:8px 14px;text-align:center;animation:ncAnim 2.8s ease forwards;opacity:0;box-shadow:0 0 20px rgba(180,80,255,.4)}
  @keyframes ncAnim{0%{opacity:0;transform:translateY(10px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
  .nc-new{font-size:9px;font-weight:900;letter-spacing:2px;color:#ffaa44;text-transform:uppercase}
  .nc-name{font-size:15px;font-weight:800;margin-top:2px}
  /* ── 3D Pip Window ── */
  #pip-cont{position:absolute;bottom:20px;right:20px;width:180px;height:120px;background:#000;border:2px solid rgba(100,200,255,0.4);border-radius:10px;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,0.8);display:none;pointer-events:none}
  #pip-ch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;pointer-events:none}
  #pip-ch::before, #pip-ch::after{content:'';position:absolute;background:rgba(0,255,100,0.6)}
  #pip-ch::before{top:0;left:19px;width:2px;height:40px}
  #pip-ch::after{top:19px;left:0;width:40px;height:2px}
  #pip-label{position:absolute;top:5px;left:8px;font-size:8px;color:#0f0;font-family:monospace;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 4px #0f0}
</style>

  <div id="pip-cont">

</div>

<script>
// ─── Setup ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
// WebGL cannot share the same canvas with 2D context. Use an offscreen canvas for Zukan portraits.
const offscreenCanvas = document.createElement('canvas');
offscreenCanvas.width = 500; offscreenCanvas.height = 500;
const ctx = offscreenCanvas.getContext('2d');

const W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

// ─── Game Constants ──────────────────────────────────────────────
const UFO_MAX_HP = 100, ALERT_MAX = 100;
const UPGRADES = [
  {id:'beam',   name:'ビーム強化',  desc:'吸い上げ速度 +25%', cost:500, maxLv:4, icon:'⚡'},
  {id:'engine', name:'エンジン強化',desc:'移動速度 +20%',     cost:400, maxLv:4, icon:'🚀'},
  {id:'stealth',name:'ステルス装置',desc:'発見距離 −25%',     cost:600, maxLv:3, icon:'👁'},
  {id:'shield', name:'シールド',    desc:'HP上限 +30',        cost:700, maxLv:3, icon:'🛡'},
  {id:'gravity',name:'重力制御',    desc:'暴れ抵抗 −30%',     cost:800, maxLv:3, icon:'🌀'},
];
const OBJ_TYPES = [
  {type:'human',  weight:70,   score:100,  speed:1.3, w:2, h:4, reports:true, color:'#e53030' },
  {type:'cow',    weight:600,  score:300,  speed:0.4, w:4, h:3, color:'#f2f2f2' },
  {type:'car',    weight:1500, score:800,  speed:0.9, w:5, h:2, color:'#e03020' },
  {type:'pig',    weight:100,  score:150,  speed:0.6, w:3, h:2, color:'#f5a0b0' },
  {type:'chicken',weight:2,    score:50,   speed:2.2, w:1.5, h:1.5, color:'#f5ead0' },
  {type:'truck',  weight:3000, score:1500, speed:0.5, w:7, h:3.5, color:'#2255aa' },
  {type:'sheep',  weight:80,   score:120,  speed:0.7, w:3, h:2.5, color:'#f0f0ee' },
  {type:'dog',    weight:30,   score:80,   speed:1.9, w:2, h:1.8, color:'#d4903a' },
];
const STAGES = [
  {id:'ks', name:'カンザス農場', goal:15, x:180, y:300, clear:false, type:'rural', desc:'静かな農村。牛や鶏をターゲットにせよ。', bgCol:'#204010', fogCol:'#080a20'},
  {id:'nv', name:'ナッシュビル閑静な住宅街', goal:25, x:360, y:340, clear:false, type:'town', desc:'人々が集まり始めた。警察の巡回に注意。', bgCol:'#304030', fogCol:'#0a1025'},
  {id:'ch', name:'シカゴ郊外', goal:35, x:480, y:220, clear:false, type:'suburbs', desc:'工業地帯の近く。大型トラックや逃げ足の速い犬が多い。', bgCol:'#404040', fogCol:'#050510'},
  {id:'dc', name:'ワシントンD.C. 首都圏', goal:45, x:650, y:260, clear:false, type:'capital', desc:'政府機関が密集。エージェントが目を光らせている。', bgCol:'#101030', fogCol:'#000010'},
  {id:'ny', name:'ニューヨーク大都会', goal:60, x:720, y:180, clear:false, type:'metropolis', desc:'最終局面。あらゆる勢力がUFOを阻止しようとする。', bgCol:'#050510', fogCol:'#000'},
];

// Unified State
let state='title', score=0, captures=0, ufoHP=UFO_MAX_HP, alertLv=0;
let upLvs={beam:0,engine:0,stealth:0,shield:0,gravity:0};
let curStageIdx=0, stageCaptures=0, unlockedIdx=localStorage.getItem('ufo_unlocked')?parseInt(localStorage.getItem('ufo_unlocked')):0;
let scene, camera, renderer, pipCamera, ufoGroup, beamMesh;
let objects=[], particles=[], police=[], military=[];
let beamOn=false, beamTarget=null, abductProg=0;
let keys={}, mouse={vx:0};
let clock = new THREE.Clock();
const HORIZON  = H * 0.56; // used by stars/bg in card portraits
const GROUND_Y = H * 0.74;
var stars=[], gt=0;

// ─── Helpers ─────────────────────────────────────────────────────
const rnd=(a,b)=>a+(b-a)*Math.random();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;

function hexToHSL(hex, lumOffset) {
  if(!hex) return null;
  let r = parseInt(hex.slice(1,3), 16) / 255;
  let g = parseInt(hex.slice(3,5), 16) / 255;
  let b = parseInt(hex.slice(5,7), 16) / 255;
  let max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if(max == min) h = s = 0;
  else {
    let d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch(max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return `hsl(${h*360}, ${s*100}%, ${clamp(l*100 + lumOffset, 0, 100)}%)`;
}

function initStars(){
  stars=[];
  for(let i=0;i<130;i++) stars.push({x:rnd(0,W),y:rnd(0,HORIZON*.85),r:rnd(.5,2.2),tw:rnd(0,Math.PI*2),sp:rnd(.5,2)});
}

// ─── Sprite drawing functions ────────────────────────────────────
// Comic style: bold outlines, flat colour, expressive

function comicSetup(){
  ctx.lineJoin='round';
  ctx.lineCap='round';
}

/* ── Human ── */
function drawHuman(cx, cy, dir, alert, shake){
  ctx.save();
  if(shake){ctx.translate(rnd(-3,3),rnd(-2,2));}
  ctx.translate(cx, cy);
  ctx.scale(dir<0?-1:1, 1);
  comicSetup();

  // Pants
  ctx.fillStyle='#1a4fa8';
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-9,-12); ctx.lineTo(-9,-28); ctx.lineTo(9,-28); ctx.lineTo(9,-12);
  ctx.lineTo(4,-12); ctx.lineTo(4,-22); ctx.lineTo(0,-22);
  ctx.lineTo(-4,-22); ctx.lineTo(-4,-12); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Shoes
  ctx.fillStyle='#222';
  [-8,8].forEach(sx=>{
    ctx.beginPath();
    ctx.ellipse(sx+sx*.25, 0, 7, 3.5, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  });

  // Shirt
  ctx.fillStyle='#e53030';
  ctx.beginPath();
  ctx.moveTo(-10,-28);ctx.lineTo(-10,-44);ctx.lineTo(10,-44);ctx.lineTo(10,-28);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Arms
  ctx.strokeStyle='#d98060'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-10,-41); ctx.lineTo(-16,-32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-41); ctx.lineTo(16,-32); ctx.stroke();
  // Hands
  ctx.fillStyle='#f5b990'; ctx.strokeStyle='#000'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(-16,-32,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(16,-32,4,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Head
  ctx.fillStyle='#f5b990'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(0,-54,11,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Hair
  ctx.fillStyle='#4e2a10';
  ctx.beginPath(); ctx.ellipse(0,-63,11,7,0,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-11,-56,5,Math.PI*1.2,Math.PI*1.8); ctx.fill();
  ctx.beginPath(); ctx.arc(11,-56,5,Math.PI*1.2,Math.PI*1.8,true); ctx.fill();

  // Eyes
  ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(-4,-54,3.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(4,-54,3.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=alert?'#ff2200':'#1a1a6a';
  ctx.beginPath(); ctx.arc(-4,-54,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-54,2,0,Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle='#000'; ctx.lineWidth=1.8;
  ctx.beginPath();
  if(alert==='reporting'){
    ctx.arc(0,-49,4,0.1,Math.PI-.1); // panic mouth open
    ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-49,2,.3,Math.PI-.3); ctx.stroke();
  } else {

  [10,18,26,34].forEach(tx=>{ctx.beginPath();ctx.moveTo(tx,-36);ctx.lineTo(tx,0);ctx.stroke()});

  ctx.fillStyle='#2255aa'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-41,0); ctx.lineTo(-41,-28);
  ctx.quadraticCurveTo(-41,-36,-34,-36);
  ctx.lineTo(2,-36); ctx.lineTo(2,0); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Windshield
  ctx.fillStyle='#a0d8ef'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-38,-24); ctx.lineTo(-34,-36); ctx.lineTo(-4,-36); ctx.lineTo(-4,-24);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Exhaust
  ctx.strokeStyle='#888'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-2,-36); ctx.lineTo(-2,-48); ctx.stroke();
  // Smoke puffs
  ctx.fillStyle='rgba(180,180,180,.5)'; ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(-4,-50,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-55,3.5,0,Math.PI*2); ctx.fill();

  // Wheels x4
  [[-28,0],[-10,0],[16,0],[30,0]].forEach(([wx])=>{
    ctx.fillStyle='#222'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(wx,0,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#777'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(wx,0,5.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Lug bolts
    ctx.fillStyle='#555'; ctx.lineWidth=1;
    for(let a=0;a<5;a++){
      let ang=a/5*Math.PI*2;
      let lugX = wx + Math.cos(ang)*3.5;
      let lugY = Math.sin(ang)*3.5;
      ctx.beginPath(); ctx.arc(lugX, lugY, 1.2, 0, Math.PI*2); ctx.fill();
    }
  });

  // Headlight
  ctx.fillStyle='#fffaaa'; ctx.strokeStyle='#aaa'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(-41,-12,3,5,.1,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.restore();

// ─── Draw any object by type ─────────────────────────────────────
function drawEntitySprite(obj){
  if(obj.captured) return;
  let cx=obj.x, cy=obj.y+obj.h/2, dir=obj.dir, sh=obj.shake;
  let al=obj.alertState;
  switch(obj.type){
    case 'human':   drawHuman(cx,cy,dir,al,sh);  break;
    case 'cow':     drawCow(cx,cy,dir,sh);        break;
    case 'car':     drawCar(cx,cy,dir,sh);        break;
    case 'pig':     drawPig(cx,cy,dir,sh);        break;
    case 'chicken': drawChicken(cx,cy,dir,sh);    break;
    case 'truck':   drawTruck(cx,cy,dir,sh);      break;
    case 'sheep':   drawSheep(cx,cy,dir,sh);      break;
    case 'dog':     drawDog(cx,cy,dir,sh);        break;
  }
  // Abduction progress bar
  if(obj===beamTarget && beamOn){
    let bw=54,bh=7,bx=cx-bw/2,by=obj.y-obj.h/2-22;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(bx,by,bw,bh);
    let g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,'#00ff88'); g.addColorStop(1,'#00ddff');
    ctx.fillStyle=g; ctx.fillRect(bx,by,bw*(abductProg/100),bh);
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1;
    ctx.strokeRect(bx,by,bw,bh);
  }
}

function drawEntityAscending(obj){
  if(!obj.ascending) return;
  ctx.save(); ctx.globalAlpha=clamp(1-(obj.ascY/(ufoGroup ? ufoGroup.position.y : 40))*.8,.2,1);
  let cx=obj.ascX, cy=obj.ascY+obj.h/2, dir=obj.dir;
  switch(obj.type){
    case 'human':   drawHuman(cx,cy,dir,null,false);break;
    case 'cow':     drawCow(cx,cy,dir,false);       break;
    case 'car':     drawCar(cx,cy,dir,false);       break;
    case 'pig':     drawPig(cx,cy,dir,false);       break;
    case 'chicken': drawChicken(cx,cy,dir,false);   break;
    case 'truck':   drawTruck(cx,cy,dir,false);     break;
    case 'sheep':   drawSheep(cx,cy,dir,false);     break;
    case 'dog':     drawDog(cx,cy,dir,false);       break;
  }
  ctx.restore();
}

// ─── Background ──────────────────────────────────────────────────
function drawBackground(){
  // Sky
  let sky=ctx.createLinearGradient(0,0,0,HORIZON*1.15);
  sky.addColorStop(0,'#1a0830'); sky.addColorStop(.3,'#2c0c58');
  sky.addColorStop(.65,'#7a2850'); sky.addColorStop(.85,'#c05840');
  sky.addColorStop(1,'#e8a050');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Ground
  let st = STAGES[curStageIdx];
  let gnd=ctx.createLinearGradient(0,HORIZON,0,H);

function addFM(txt,x,y,col,sz=20){ 
  const el = document.createElement('div');
  el.textContent = txt;
  el.style.cssText = `position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);color:${col};font-size:${sz}px;font-weight:900;text-shadow:0 0 10px #000;pointer-events:none;z-index:1000;animation:fmAnim 1s ease-out forwards`;
  document.getElementById('gc').appendChild(el);

function init3D() {
  const canvas = document.getElementById('c');
  const W = canvas.width, H = canvas.height;
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x080a20, 0.002);

  camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 3000);
  pipCamera = new THREE.PerspectiveCamera(45, 180/120, 0.1, 500);
  
  const ambient = new THREE.AmbientLight(0x4040a0, 0.6);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(100, 200, 100);
  sun.castShadow = true;
  scene.add(sun);

  createUFO();
  createTerrain();
  createStars();

  window.addEventListener('resize', onResize);
}

function createUFO() {
  ufoGroup = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(5, 7, 2, 32);
  const bodyMat = new THREE.MeshPhongMaterial({color:0x5c6488, shininess:100});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  ufoGroup.add(body);

  const domeGeo = new THREE.SphereGeometry(3, 32, 16, 0, Math.PI*2, 0, Math.PI/2);
  const domeMat = new THREE.MeshPhongMaterial({color:0x60d0ff, transparent:true, opacity:0.7});
  const dome = new THREE.Mesh(domeGeo, domeMat);
  dome.position.y = 1;
  ufoGroup.add(dome);

  const beamGeo = new THREE.ConeGeometry(5, 100, 32, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({color:0x00ff88, transparent:true, opacity:0.3, side:THREE.DoubleSide});
  beamMesh = new THREE.Mesh(beamGeo, beamMat);
  beamMesh.position.y = -50;
  beamMesh.visible = false;
  ufoGroup.add(beamMesh);

  ufoGroup.position.set(0, 40, 0);
  scene.add(ufoGroup);
  ufoGroup.add(pipCamera);
  pipCamera.rotation.x = -Math.PI/2;
}

function createTerrain() {
  const geo = new THREE.PlaneGeometry(3000, 3000, 100, 100);
  const mat = new THREE.MeshPhongMaterial({color:0x112208, flatShading:true});
  const plane = new THREE.Mesh(geo, mat);
  plane.rotation.x = -Math.PI/2;
  plane.receiveShadow = true;
  scene.add(plane);

  // Decorative trees with slight variation
  const treeGeo = new THREE.ConeGeometry(3, 12, 6);
  const treeMat = new THREE.MeshPhongMaterial({color:0x051d05});
  for(let i=0; i<400; i++) {
    const tree = new THREE.Mesh(treeGeo, treeMat);
    const ang = Math.random() * Math.PI * 2;
    const d = 150 + Math.random() * 1200;
    tree.position.set(Math.cos(ang)*d, 6, Math.sin(ang)*d);
    tree.rotation.y = Math.random() * Math.PI;
    tree.scale.setScalar(0.5 + Math.random());
    scene.add(tree);
  }
}

function createStars() {
  const geo = new THREE.BufferGeometry();
  const vertices = [];
  for(let i=0; i<3000; i++) vertices.push(rnd(-1500,1500), rnd(150,800), rnd(-1500,1500));
  geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const mat = new THREE.PointsMaterial({color:0xffffff, size:1.2});
  scene.add(new THREE.Points(geo, mat));
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  
  if(state==='playing') {
    updateFlight(dt);
    update3DObjects(dt);
    update3DBeam(dt);
    update3DAlerts(dt);
    updateHUD();
    checkGameOver();
  } else if(state==='title') {
    ufoGroup.rotation.y += dt * 0.4;
    ufoGroup.position.y = 40 + Math.sin(clock.elapsedTime) * 5;
  } else if(state==='over' || state==='clear') {
    // Keep rendering background but stop flight
    ufoGroup.rotation.y += dt * 0.1;
  }
  
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene, camera);
  
  if(state==='playing') {
    const pipW = 180, pipH = 120;
    renderer.setViewport(window.innerWidth - pipW - 20, 20, pipW, pipH);
    renderer.setScissor(window.innerWidth - pipW - 20, 20, pipW, pipH);
    renderer.setScissorTest(true);
    renderer.render(scene, pipCamera);
  }
}

function spawn3DObject() {
  const pool = [];
  OBJ_TYPES.forEach(tp => {
    let weight = tp.weight < 100 ? 3 : 1; // Basic weighting
    for(let i=0;i<weight;i++) pool.push(tp);
  });
  const tp = pool[Math.floor(Math.random()*pool.length)];
  const group = new THREE.Group();
  const color = tp.color || 0xcccccc;
  
  if(tp.type === 'human') {
    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshPhongMaterial({color:0xf5b990}));
    head.position.y = 3.6;
    group.add(head);
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.8), new THREE.MeshPhongMaterial({color:color}));
    body.position.y = 1.8;
    group.add(body);
    // Legs
    const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.5, 0.5), new THREE.MeshPhongMaterial({color:0x222222}));
    leg1.position.set(-0.4, 0.75, 0); group.add(leg1);
    const leg2 = leg1.clone(); leg2.position.set(0.4, 0.75, 0); group.add(leg2);
  } else if(['cow','pig','sheep','dog'].includes(tp.type)) {
    const bw = tp.w * 0.8, bh = tp.h * 0.7;
    const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bw * 0.5), new THREE.MeshPhongMaterial({color:color}));
    body.position.y = bh/2 + 1.2;
    group.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(bh*0.6, bh*0.6, bh*0.6), new THREE.MeshPhongMaterial({color:color}));
    head.position.set(-bw/2, bh + 0.8, 0);
    group.add(head);
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([sx,sz]) => {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.4), new THREE.MeshPhongMaterial({color:0x333333}));
      leg.position.set(sx*(bw*0.3), 0.7, sz*(bw*0.2));
      group.add(leg);
    });
    group.rotation.y = Math.random() * Math.PI * 2;
  } else {
    group.add(new THREE.Mesh(new THREE.BoxGeometry(tp.w/2, tp.h/2, tp.w/2), new THREE.MeshPhongMaterial({color:color})));
    group.children[0].position.y = tp.h/4;
  }
  
  const angle = Math.random() * Math.PI * 2;
  const dist = 450 + Math.random() * 600;
  group.position.set(ufoGroup.position.x + Math.cos(angle)*dist, 0, ufoGroup.position.z + Math.sin(angle)*dist);
  group.userData = {...tp, variantIdx: Math.floor(Math.random()*3)};
  scene.add(group);
  objects.push(group);
}

  const group = new THREE.Group();
  group.add(new THREE.Mesh(new THREE.BoxGeometry(6, 3, 10), new THREE.MeshPhongMaterial({color:0x111111})));
  group.children[0].position.y = 1.5;
  const siren = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 1), new THREE.MeshPhongMaterial({color:0xff0000}));
  siren.position.y = 3.3;

  const angle = Math.random() * Math.PI * 2;
  group.position.set(ufoGroup.position.x + Math.cos(angle)*800, 0, ufoGroup.position.z + Math.sin(angle)*800);

}

function spawn3DMilitary() {
  const group = new THREE.Group();
  group.add(new THREE.Mesh(new THREE.BoxGeometry(5, 5, 14), new THREE.MeshPhongMaterial({color:0x223322})));
  const rotor = new THREE.Mesh(new THREE.BoxGeometry(18, 0.2, 2), new THREE.MeshPhongMaterial({color:0x111111}));
  rotor.position.y = 3; rotor.name = 'rotor';

  group.userData = {type:'military', speed:50, shootTmr:2};
  scene.add(group);
  military.push(group);

function updateFlight(dt) {
  const speed = 70 * (1 + upLvs.engine*0.25);
  if(keys['KeyW']) ufoGroup.translateZ(-speed * dt);
  if(keys['KeyS']) ufoGroup.translateZ(speed * dt);
  if(keys['KeyA']) ufoGroup.translateX(-speed * dt);
  if(keys['KeyD']) ufoGroup.translateX(speed * dt);
  if(keys['KeyQ']) ufoGroup.position.y += speed * dt;
  if(keys['KeyE']) ufoGroup.position.y -= speed * dt;
  ufoGroup.position.y = clamp(ufoGroup.position.y, 10, 250);
  ufoGroup.rotation.y -= mouse.vx * 0.005;
  mouse.vx *= 0.9;
  const offset = new THREE.Vector3(0, 35, 80);
  offset.applyQuaternion(ufoGroup.quaternion);
  camera.position.lerp(ufoGroup.position.clone().add(offset), 0.1);
  camera.lookAt(ufoGroup.position);
}

function update3DObjects(dt) {
  objects.forEach(obj => {
    if(obj.userData.captured) return;
    obj.position.x += Math.sin(clock.elapsedTime + obj.position.z) * 1.5 * dt;
    if(obj.position.distanceTo(ufoGroup.position) > 1500) {
      scene.remove(obj);
      objects = objects.filter(o => o !== obj);
    }
  });
  if(objects.length < 20) spawn3DObject();
}

function update3DBeam(dt) {
  const raycaster = new THREE.Raycaster(ufoGroup.position, new THREE.Vector3(0,-1,0));
  const intersects = raycaster.intersectObjects(objects, true);
  const pipCh = document.getElementById('pip-ch');
  if(intersects.length > 0) {
    pipCh.style.background = 'rgba(255, 0, 0, 0.4)';
    const target = intersects[0].object.parent; 
    beamOn = true;
    if(!beamTarget) { beamTarget = target; abductProg = 0; }
    if(beamTarget === target) {
      abductProg += (30 / (target.userData.weight||50)) * 40 * dt * (1 + upLvs.beam * 0.25);
      if(abductProg >= 100) captureObject(target);
    }
  } else {
    pipCh.style.background = 'none';
    beamTarget = null; beamOn = false;
  }
  beamMesh.visible = beamOn;
}

function captureObject(target) {
  target.userData.captured = true;
  scene.remove(target);
  objects = objects.filter(o => o !== target);
  captures++;
  score += target.userData.score || 100;
  addToCollection({type: target.userData.type, variantIdx: target.userData.variantIdx});
  updateHUD();
  beamOn = false;
  addFM('+'+(target.userData.score||100)+'pt!', 0, 0, '#7ff0ff', 24);
}

function update3DAlerts(dt) {
  if(beamOn) alertLv = Math.min(ALERT_MAX, alertLv + 10 * dt);
  else alertLv = Math.max(0, alertLv - 4 * dt);
  if(alertLv > 35 && police.length < 3) spawn3DPolice();
  if(alertLv > 75 && military.length < 2) spawn3DMilitary();
  police.forEach(p => {
    const dir = ufoGroup.position.clone().sub(p.position).normalize();
    p.position.add(dir.multiplyScalar(p.userData.speed * dt));
    p.lookAt(ufoGroup.position);
    p.userData.shootTmr -= dt;
    if(p.userData.shootTmr <= 0 && p.position.distanceTo(ufoGroup.position) < 250) {
      p.userData.shootTmr = 3; ufoHP -= 4; addFM('被弾！', 0,0, '#f00', 18);
    }
  });
  military.forEach(m => {
    const dir = ufoGroup.position.clone().sub(m.position).normalize();
    m.position.add(dir.multiplyScalar(m.userData.speed * dt));
    m.lookAt(ufoGroup.position);
    const r = m.getObjectByName('rotor');
    if(r) r.rotation.y += 0.9;
    m.userData.shootTmr -= dt;
    if(m.userData.shootTmr <= 0 && m.position.distanceTo(ufoGroup.position) < 350) {
      m.userData.shootTmr = 2.2; ufoHP -= 10; addFM('ミサイル！', 0,0, '#f00', 22);
    }
  });
}

function onResize() {
  const W = window.innerWidth, H = window.innerHeight;
  if(renderer) renderer.setSize(W, H);
  if(camera) {
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
  }
}

window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='KeyU') toggleUpgrade(); if(e.code==='KeyZ') toggleZukan(); });
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => { mouse.vx = e.movementX || 0; });

function startGame() {
  state='playing'; score=0; captures=0; ufoHP=UFO_MAX_HP; alertLv=0;
  objects.forEach(o=>scene.remove(o)); police.forEach(p=>scene.remove(p)); military.forEach(m=>scene.remove(m));
  objects=[]; police=[]; military=[]; ufoGroup.position.set(0, 40, 0); ufoGroup.rotation.y = 0;
  document.getElementById('ov').style.display='none';
  for(let i=0; i<10; i++) spawn3DObject();
  updateHUD();
}
function checkGameOver() { if(ufoHP <= 0) { state = 'over'; document.getElementById('ov').style.display = 'flex'; document.getElementById('ov').innerHTML = `<h1>GAME OVER</h1><div class="sub">スコア: ${score}</div><button class="btn" onclick="location.reload()">RELOAD</button>`; } }

function updateHUD() {
  const el = id => document.getElementById(id);
  if(!el('sd')) return;
  el('sd').textContent = score;
  el('cc').textContent = captures;
  el('hpf').style.width = Math.max(0, (ufoHP/UFO_MAX_HP)*100) + '%';
  el('alf').style.width = Math.min(100, alertLv) + '%';
  el('alt').textContent = alertLv < 30 ? '平和' : (alertLv < 70 ? '警察' : '軍隊');
  el('zbadge').textContent = collection.length;
}

// ─── COLLECTION ───────────────────────────────────────────────────────────────
var collection=[];
var totalVariants=0; // computed after VARIANTS is set

function pickVariantIdx(arr){
  let pool=[];
  arr.forEach((v,i)=>{ let w=RARITY_WEIGHTS[v.rarity]||20; for(let k=0;k<w;k++) pool.push(i); });
  return pool[Math.floor(Math.random()*pool.length)];
}

function addToCollection(obj){
  let vArr=VARIANTS[obj.type]||[]; if(!vArr.length) return;
  let key=obj.type+'_'+obj.variantIdx;
  let entry=collection.find(e=>e.key===key);
  let isNew=!entry;
  if(!entry){ entry={key,type:obj.type,variantIdx:obj.variantIdx,count:0}; collection.push(entry); }
  entry.count++;
  showNewCardToast(obj,vArr[obj.variantIdx],isNew);
  updateZukanBadge();
}

function updateZukanBadge(){
  document.getElementById('zbadge').textContent=collection.length;
}

function showNewCardToast(obj, vd, isNew){
  if(!vd) return;
  let rc=RARITY_COLORS[vd.rarity];
  let toast=document.getElementById('nc-toast');
  let div=document.createElement('div');
  div.className='nc-pop';
  div.style.cssText+=`;border-top:2px solid ${rc.border};box-shadow:0 0 16px ${rc.border}66`;
  div.innerHTML=`<div class="nc-new">${isNew?'✨ NEW CARD ✨':'↺ 複数所持'}</div>
    <div class="nc-name" style="color:${rc.text}">${vd.name}</div>
    <div style="font-size:9px;color:rgba(255,255,255,.45);margin-top:2px">${rc.label} ${'\u2605'.repeat(rc.stars)}</div>`;
  toast.appendChild(div);
  setTimeout(()=>div.remove(),3100);
}

// ─── ZUKAN UI ───────────────────────────────────────────────────────────────
let zukanOpen=false;
function toggleZukan(){ zukanOpen?closeZukan():openZukan(); }
function openZukan(){
  zukanOpen=true;
  document.getElementById('zov').style.display='flex';
  renderZukanGrid();
}
function closeZukan(){
  zukanOpen=false;
  document.getElementById('zov').style.display='none';
  document.getElementById('cdov').style.display='none';
}

function renderZukanGrid(){
  let grid=document.getElementById('zgrid'); grid.innerHTML='';
  document.getElementById('zcounter').textContent=`${collection.length} / ${totalVariants} 種類捕獲`;
  if(!collection.length){
    grid.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:14px;padding:40px;text-align:center;width:100%">まだ何も捕獲していません...<br>UFOで地上の生き物を吸い上げよう！</div>';
    return;
  }
  let rarOrd={legendary:0,epic:1,rare:2,uncommon:3,common:4};
  let sorted=[...collection].sort((a,b)=>{
    let va=VARIANTS[a.type][a.variantIdx],vb=VARIANTS[b.type][b.variantIdx];
    return rarOrd[va.rarity]-rarOrd[vb.rarity]||va.name.localeCompare(vb.name);
  });
  sorted.forEach(entry=>{
    let vd=VARIANTS[entry.type][entry.variantIdx];
    let rc=RARITY_COLORS[vd.rarity];
    let card=document.createElement('div');
    card.className='zcard';
    card.innerHTML=`<div class="zcard-inner rc-${vd.rarity}">
      <canvas class="pc" width="150" height="128"></canvas>
      <div class="zcard-bot">
        <div><div class="zcard-name">${vd.name}</div>
        <div class="zcard-type">${vd.typeLabel} &middot; <span style="color:${rc.text}">${rc.label}</span></div></div>
        <div class="zcard-stats">
          <span class="zcard-stat stat-w">${vd.weight}kg</span>
          <span class="zcard-stat stat-s">${vd.score}pt</span>
          <span style="font-size:9px;color:${rc.text};margin-left:auto">${'\u2605'.repeat(rc.stars)}</span>
        </div>
        <div class="zcard-count">&times;${entry.count}捕獲</div>
      </div></div>`;
    card.onclick=()=>showCardDetail(entry);
    grid.appendChild(card);
    drawCardPortrait(card.querySelector('.pc'),entry.type,entry.variantIdx,vd);
  });
}

function drawCardPortrait(pc,type,variantIdx,vd){
  let tc=pc.getContext('2d'),pw=pc.width,ph=pc.height;
  tc.clearRect(0,0,pw,ph);
  let rc=RARITY_COLORS[vd.rarity];
  let bg=tc.createLinearGradient(0,0,0,ph);
  bg.addColorStop(0,rc.bg); bg.addColorStop(1,'#050510');
  tc.fillStyle=bg; tc.fillRect(0,0,pw,ph);
  // Grid lines
  tc.strokeStyle='rgba(255,255,255,.04)'; tc.lineWidth=1;
  for(let gx=0;gx<pw;gx+=20){tc.beginPath();tc.moveTo(gx,0);tc.lineTo(gx,ph);tc.stroke();}
  for(let gy=0;gy<ph;gy+=20){tc.beginPath();tc.moveTo(0,gy);tc.lineTo(pw,gy);tc.stroke();}
  // Rarity glow at bottom
  let gl=tc.createLinearGradient(0,ph-20,0,ph);
  gl.addColorStop(0,rc.border+'00'); gl.addColorStop(1,rc.border+'44');
  tc.fillStyle=gl; tc.fillRect(0,ph-20,pw,20);
  // Swap ctx to draw sprite
  let savedCtx=ctx; ctx=tc;
  let sc=type==='truck'?.75:type==='car'?.8:type==='cow'?.8:1.0;
  tc.save(); tc.translate(pw/2,ph*.9); tc.scale(sc,sc);
  try{
    switch(type){
      case 'human':   drawHuman(0,0,1,null,false);break;
      case 'cow':     drawCow(0,0,1,false);break;
      case 'car':     drawCar(0,0,1,false);break;
      case 'pig':     drawPig(0,0,1,false);break;
      case 'chicken': drawChicken(0,0,1,false);break;
      case 'truck':   drawTruck(0,0,1,false);break;
      case 'sheep':   drawSheep(0,0,1,false);break;
      case 'dog':     drawDog(0,0,1,false);break;
    }
  }catch(e){}
  tc.restore(); ctx=savedCtx;
}

function showCardDetail(entry){
  let vd=VARIANTS[entry.type][entry.variantIdx];
  let rc=RARITY_COLORS[vd.rarity];
  let card=document.getElementById('cdcard');
  card.style.border=`2px solid ${rc.border}`;
  card.style.boxShadow=`0 0 40px ${rc.border}55,0 0 80px ${rc.border}22`;
  document.getElementById('cdcard-title').textContent=vd.name;
  document.getElementById('cdcard-title').style.color=rc.text;
  document.getElementById('cdcard-sub').textContent=`${vd.typeLabel} \u30fb ${rc.label} \u2605${rc.stars} \u30fb x${entry.count}捕獲`;
  let statsEl=document.getElementById('cdcard-stats');
  let threat=Math.min(vd.threat||0,5);
  statsEl.innerHTML=[
    {l:'体重',v:vd.weight+'kg',c:'#4488cc'},
    {l:'得点',v:vd.score+'pt',c:'#44aa66'},
    {l:'危険度',v:threat?'\u2605'.repeat(threat):'\u2606\u2606',c:'#cc4444'},
    {l:'希少度',v:rc.label,c:rc.border},
  ].map(s=>`<span class="cd-tag" style="background:${s.c}22;border:1px solid ${s.c}55;color:${s.c}">${s.l}: ${s.v}</span>`).join('');
  document.getElementById('cdcard-desc').textContent=vd.desc;
  let bigC=document.getElementById('cdcanvas');
  drawCardPortrait(bigC,entry.type,entry.variantIdx,vd);
  document.getElementById('cdov').style.display='flex';
}


// Title UFO mini animation
setTimeout(function(){
  try {
    let tc=document.getElementById('titleUFO');
    if(!tc) return;
    let tcx=tc.getContext('2d');
    let tft=0;
  function ta(){
    tcx.clearRect(0,0,160,100);
    tft+=.02;
    let ty=50+Math.sin(tft)*6;
    // Mini UFO body
    tcx.save(); tcx.translate(80,ty);
    // Dome
    let dg=tcx.createRadialGradient(-4,-14,2,0,-8,22);
    dg.addColorStop(0,'rgba(160,240,255,.9)'); dg.addColorStop(1,'rgba(30,80,200,.3)');
    tcx.fillStyle=dg; tcx.beginPath(); tcx.ellipse(0,-7,17,12,0,Math.PI,0); tcx.fill();
    // Body
    let bg=tcx.createLinearGradient(0,-8,0,8);
    bg.addColorStop(0,'#3c4268'); bg.addColorStop(1,'#1c2248');
    tcx.fillStyle=bg; tcx.beginPath(); tcx.ellipse(0,0,30,7,0,0,Math.PI*2); tcx.fill();
    // Lights
    for(let i=0;i<8;i++){
      let a=(i/8)*Math.PI*2+tft*2, lx=Math.cos(a)*23,ly=4+Math.sin(a)*4;
      let p=.5+.5*Math.sin(tft*4+i);
      tcx.globalAlpha=p;
      let lg=tcx.createRadialGradient(lx,ly,0,lx,ly,4);
      lg.addColorStop(0,'rgba(180,255,255,1)'); lg.addColorStop(1,'rgba(60,160,255,0)');
      tcx.fillStyle=lg; tcx.beginPath(); tcx.arc(lx,ly,4,0,Math.PI*2); tcx.fill();
    }
    tcx.globalAlpha=1;
    // Beam hint
    let bh=tcx.createLinearGradient(0,7,0,90);
    bh.addColorStop(0,'rgba(80,255,100,.7)'); bh.addColorStop(1,'rgba(40,200,70,0)');
    tcx.fillStyle=bh; tcx.fillRect(-12,7,24,60);
    tcx.restore();
    requestAnimationFrame(ta);
  }
  ta();
  } catch(e) { console.error("Title UFO Anim Error:", e); }
}, 100);
