<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFO Abductor - OPEN WORLD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden; background: #000; font-family: 'Courier New', monospace;
            user-select: none; -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-board {
            position: absolute; top: 20px; left: 20px;
            color: #00ff88; font-size: 20px; font-weight: bold;
            text-shadow: 0 0 12px #00ff88;
            letter-spacing: 2px;
        }
        #multiplier { font-size: 12px; color: #88ffcc; margin-top: 4px; opacity: 0.8; }
        #biome-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #aaffdd; font-size: 13px; letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffaa;
            background: rgba(0,0,0,0.4); padding: 5px 16px; border-radius: 20px;
            border: 1px solid #00ff8844;
        }
        #controls {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; gap: 16px; pointer-events: auto;
        }
        .btn {
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, rgba(0,255,136,0.05) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            color: #00ff88; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 11px; letter-spacing: 1px;
            cursor: pointer; text-shadow: 0 0 8px #00ff88;
            box-shadow: 0 0 15px #00ff8833;
            transition: all 0.1s; user-select: none;
        }
        .btn:active { background: radial-gradient(circle, rgba(0,255,136,0.4) 0%, rgba(0,255,136,0.1) 100%); }
        #encyclopedia-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.7);
            color: #00ff88; border: 1px solid #00ff8866;
            border-radius: 6px; cursor: pointer; pointer-events: auto;
            font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 1px;
            text-shadow: 0 0 8px #00ff88;
        }
        #modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.92);
            z-index: 1000; overflow-y: auto; color: #fff;
            backdrop-filter: blur(4px);
        }
        #modal-header {
            position: sticky; top: 0; background: rgba(0,5,17,0.95);
            border-bottom: 1px solid #00ff8833;
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }
        #modal-title { color: #00ff88; font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 12px #00ff88; }
        #close-btn {
            padding: 8px 20px; background: transparent;
            color: #ff4444; border: 1px solid #ff4444;
            border-radius: 4px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 13px;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; padding: 40px 60px; }
        .card {
            background: rgba(0,255,136,0.05); border: 1px solid #00ff8833;
            border-radius: 8px; padding: 20px; text-align: center;
        }
        .card-icon { font-size: 36px; margin-bottom: 10px; }
        .card-title { color: #00ff88; font-size: 14px; letter-spacing: 1px; margin-bottom: 6px; }
        .card-pts { color: #88ffcc; font-size: 12px; opacity: 0.7; }
        #notification {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88; font-size: 36px; font-weight: bold;
            text-shadow: 0 0 20px #00ff88;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; letter-spacing: 2px;
        }
        #controls-hint {
            position: absolute; bottom: 130px; left: 20px;
            color: #00ff8855; font-size: 11px; letter-spacing: 1px; line-height: 1.8;
        }
        #virtual-stick-container {
            display: none; position: absolute; bottom: 30px; left: 20px; pointer-events: auto;
        }
        #stick-base {
            width: 110px; height: 110px;
            background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, rgba(0,255,136,0.02) 100%);
            border: 2px solid rgba(0,255,136,0.35); border-radius: 50%;
            position: relative; touch-action: none;
        }
        #stick-knob {
            width: 46px; height: 46px;
            background: radial-gradient(circle, rgba(0,255,136,0.55) 0%, rgba(0,255,136,0.25) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #00ff8866; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="score-board">
        SCORE: <span id="score">0</span>
        <div id="multiplier">ABDUCTED: <span id="count">0</span></div>
    </div>
    <div id="biome-label">GRASSLAND</div>
    <button id="encyclopedia-btn">[ 図鑑 ]</button>
    <div id="controls">
        <div class="btn" id="abduct-btn">ABDUCT</div>
    </div>
    <div id="controls-hint">WASD / 矢印: 移動<br>SPACE / ABDUCT: 吸い込み</div>
    <div id="virtual-stick-container">
        <div id="stick-base"><div id="stick-knob"></div></div>
    </div>
    <div id="notification">+100</div>
</div>

<div id="modal">
    <div id="modal-header">
        <div id="modal-title">// ABDUCTION LOG //</div>
        <button id="close-btn">[ 閉じる ]</button>
    </div>
    <div class="grid" id="card-grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {

// ======================================================
// WORLD / CHUNK SYSTEM
// ======================================================
const CHUNK_SIZE = 64;       // 1チャンク = 64ユニット
const CHUNK_RENDER_DIST = 3; // 周囲3チャンク（7x7=49チャンク）
const BLOCK_SIZE = 8;        // 1ブロックのサイズ
const BLOCKS_PER_CHUNK = CHUNK_SIZE / BLOCK_SIZE; // 8ブロック/チャンク

// バイオームタイプ
const BIOME = {
    OCEAN:      0,
    BEACH:      1,
    GRASSLAND:  2,
    FARMLAND:   3,
    FOREST:     4,
    MOUNTAIN:   5,
    SUBURB:     6,
    URBAN:      7,
    INDUSTRIAL: 8,
    RIVER:      9,
};

const BIOME_NAMES = {
    0: 'OCEAN', 1: 'BEACH', 2: 'GRASSLAND', 3: 'FARMLAND',
    4: 'FOREST', 5: 'MOUNTAIN', 6: 'SUBURB', 7: 'URBAN',
    8: 'INDUSTRIAL', 9: 'RIVER'
};

// シンプルなノイズ関数（Perlin風）
function hash(n) {
    n = Math.sin(n) * 43758.5453123;
    return n - Math.floor(n);
}
function noise2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    const a = hash(ix + iy*57);
    const b = hash(ix+1 + iy*57);
    const c = hash(ix + (iy+1)*57);
    const d = hash(ix+1 + (iy+1)*57);
    return a + (b-a)*ux + (c-a)*uy + (d-a)*ux*uy - 0.5;
}
function fbm(x, y, oct=4) {
    let v=0, amp=0.5, freq=1, max=0;
    for(let i=0;i<oct;i++){
        v += noise2D(x*freq, y*freq)*amp;
        max += amp; amp*=0.5; freq*=2;
    }
    return v/max;
}

// バイオーム決定（ワールド座標に基づく）
function getBiome(wx, wz) {
    const scale = 0.008;
    const h = fbm(wx*scale, wz*scale) + 0.5;
    const moisture = fbm(wx*scale+100, wz*scale+200) + 0.5;

    // 川: 特定のストライプパターン
    const riverN = Math.abs(fbm(wx*0.005, wz*0.005+500));
    if(riverN < 0.07) return BIOME.RIVER;

    // 海
    if(h < 0.28) return BIOME.OCEAN;
    if(h < 0.33) return BIOME.BEACH;
    if(h > 0.78) return BIOME.MOUNTAIN;

    // 地形による分類
    const cityN = fbm(wx*0.015+300, wz*0.015+300) + 0.5;
    if(cityN > 0.72) return BIOME.URBAN;
    if(cityN > 0.60) return BIOME.INDUSTRIAL;
    if(cityN > 0.50) return BIOME.SUBURB;
    if(moisture > 0.55) return BIOME.FOREST;
    if(moisture > 0.40) return BIOME.GRASSLAND;
    return BIOME.FARMLAND;
}

function getGroundHeight(biome) {
    switch(biome) {
        case BIOME.OCEAN:  return -3;
        case BIOME.BEACH:  return 0.2;
        case BIOME.MOUNTAIN: return 4 + Math.random()*8;
        case BIOME.RIVER:  return -0.5;
        default: return 0;
    }
}

// バイオーム別ブロックカラー
const BIOME_COLORS = {
    [BIOME.OCEAN]:      [0x1a3a6e, 0x0e2550],
    [BIOME.BEACH]:      [0xd4b483, 0xc8a870],
    [BIOME.GRASSLAND]:  [0x2d5a1b, 0x3a7a20],
    [BIOME.FARMLAND]:   [0x8b6914, 0xa07820],
    [BIOME.FOREST]:     [0x1a3d0f, 0x142e0c],
    [BIOME.MOUNTAIN]:   [0x7a7a7a, 0x909090],
    [BIOME.SUBURB]:     [0x4a4a3a, 0x3d3d2d],
    [BIOME.URBAN]:      [0x222233, 0x1a1a28],
    [BIOME.INDUSTRIAL]: [0x333322, 0x2a2a1a],
    [BIOME.RIVER]:      [0x1e5080, 0x14355a],
};

// ======================================================
// THREE.JS SETUP
// ======================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);
scene.fog = new THREE.FogExp2(0x000814, 0.004);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.autoClear = false;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.0;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 800);
camera.position.set(0, 40, 55);

// 照明
const ambient = new THREE.AmbientLight(0x223355, 0.8);
scene.add(ambient);
const moonLight = new THREE.DirectionalLight(0x8899cc, 0.6);
moonLight.position.set(-50, 80, -30);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.left = -300; moonLight.shadow.camera.right = 300;
moonLight.shadow.camera.top = 300; moonLight.shadow.camera.bottom = -300;
moonLight.shadow.camera.far = 600;
moonLight.shadow.bias = -0.001;
scene.add(moonLight);
const horizonLight = new THREE.DirectionalLight(0xff8833, 0.15);
horizonLight.position.set(100, 5, 100);
scene.add(horizonLight);

// 星
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000*3);
for(let i=0;i<3000;i++){
    starPos[i*3]   = (Math.random()-0.5)*1600;
    starPos[i*3+1] = Math.random()*500+30;
    starPos[i*3+2] = (Math.random()-0.5)*1600;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.4,sizeAttenuation:true,transparent:true,opacity:0.85})));

// ======================================================
// CHUNK MANAGER
// ======================================================
const chunkCache = new Map();
const activeChunks = new Set();

// 共有マテリアルキャッシュ
const matCache = new Map();
function getMat(color, roughness=0.9, metalness=0.0) {
    const key = `${color}_${roughness}_${metalness}`;
    if(!matCache.has(key)) matCache.set(key, new THREE.MeshStandardMaterial({color, roughness, metalness}));
    return matCache.get(key);
}

function getChunkKey(cx, cz) { return `${cx},${cz}`; }
function worldToChunk(wx, wz) {
    return { cx: Math.floor(wx/CHUNK_SIZE), cz: Math.floor(wz/CHUNK_SIZE) };
}

function buildChunk(cx, cz) {
    const key = getChunkKey(cx, cz);
    if(chunkCache.has(key)) return chunkCache.get(key);

    const group = new THREE.Group();
    group.position.set(cx*CHUNK_SIZE, 0, cz*CHUNK_SIZE);

    // チャンク内をブロックグリッドで生成
    const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

    for(let bx=0; bx<BLOCKS_PER_CHUNK; bx++) {
        for(let bz=0; bz<BLOCKS_PER_CHUNK; bz++) {
            const wx = cx*CHUNK_SIZE + bx*BLOCK_SIZE + BLOCK_SIZE/2;
            const wz = cz*CHUNK_SIZE + bz*BLOCK_SIZE + BLOCK_SIZE/2;
            const biome = getBiome(wx, wz);
            const colors = BIOME_COLORS[biome];
            // チェッカーパターンで2色交互
            const col = colors[(bx+bz)%2];
            const mat = getMat(col);

            const h = biome===BIOME.MOUNTAIN ? (fbm(wx*0.05,wz*0.05)+0.5)*12 :
                       biome===BIOME.OCEAN   ? -4 :
                       biome===BIOME.RIVER   ? -1 : 0;

            const block = new THREE.Mesh(blockGeo, mat);
            block.position.set(bx*BLOCK_SIZE + BLOCK_SIZE/2, h - BLOCK_SIZE/2, bz*BLOCK_SIZE + BLOCK_SIZE/2);
            block.receiveShadow = true;
            group.add(block);

            // バイオーム装飾（確率的）
            if(biome===BIOME.OCEAN || biome===BIOME.RIVER) {
                // 水面エフェクト
                const waterMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(BLOCK_SIZE, BLOCK_SIZE),
                    new THREE.MeshStandardMaterial({color:0x1a5590,transparent:true,opacity:0.75,roughness:0.1,metalness:0.3})
                );
                waterMesh.rotation.x = -Math.PI/2;
                waterMesh.position.set(bx*BLOCK_SIZE+BLOCK_SIZE/2, 0.1, bz*BLOCK_SIZE+BLOCK_SIZE/2);
                group.add(waterMesh);
            }
        }
    }

    // バイオーム別オブジェクト生成
    spawnBiomeObjects(group, cx, cz);

    scene.add(group);
    chunkCache.set(key, group);
    return group;
}

function spawnBiomeObjects(group, cx, cz) {
    const rng = createRNG(cx*100+cz);
    const biome = getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2, cz*CHUNK_SIZE+CHUNK_SIZE/2);

    const spawnCount = {
        [BIOME.FOREST]:     8,
        [BIOME.GRASSLAND]:  4,
        [BIOME.FARMLAND]:   3,
        [BIOME.MOUNTAIN]:   3,
        [BIOME.SUBURB]:     5,
        [BIOME.URBAN]:      6,
        [BIOME.INDUSTRIAL]: 4,
        [BIOME.BEACH]:      2,
        [BIOME.OCEAN]:      0,
        [BIOME.RIVER]:      1,
    }[biome] || 0;

    for(let i=0; i<spawnCount; i++) {
        const lx = rng() * (CHUNK_SIZE-8) + 4;
        const lz = rng() * (CHUNK_SIZE-8) + 4;
        placeDecoration(group, biome, lx, lz, rng);
    }
}

function placeDecoration(group, biome, lx, lz, rng) {
    if(biome===BIOME.FOREST || biome===BIOME.GRASSLAND || biome===BIOME.MOUNTAIN) {
        const scale = 0.7 + rng()*0.8;
        const treeGroup = makeTree(scale, biome===BIOME.MOUNTAIN ? 'pine' : 'deciduous');
        treeGroup.position.set(lx, 0, lz);
        group.add(treeGroup);
    } else if(biome===BIOME.FARMLAND) {
        const t = Math.floor(rng()*3);
        if(t===0) { const f=makeFarmField(); f.position.set(lx,0.1,lz); group.add(f); }
        else if(t===1) { const b=makeBarn(); b.position.set(lx,0,lz); group.add(b); }
        else { const s=makeSilo(); s.position.set(lx,0,lz); group.add(s); }
    } else if(biome===BIOME.SUBURB) {
        const house = makeHouse(rng);
        house.position.set(lx, 0, lz);
        house.rotation.y = Math.floor(rng()*4)*Math.PI/2;
        group.add(house);
        // 庭木
        const tree = makeTree(0.6);
        tree.position.set(lx+4, 0, lz+4);
        group.add(tree);
    } else if(biome===BIOME.URBAN) {
        const h = 15 + rng()*50;
        const w = 8 + rng()*12;
        const d = 8 + rng()*12;
        const colors = [0x334455,0x3a3a4a,0x2a3345,0x444444,0x2d3d2d];
        const bldg = makeBuilding(w, d, h, colors[Math.floor(rng()*colors.length)]);
        bldg.position.set(lx, 0, lz);
        group.add(bldg);
    } else if(biome===BIOME.INDUSTRIAL) {
        const t = Math.floor(rng()*3);
        if(t===0) { const f=makeFactory(); f.position.set(lx,0,lz); group.add(f); }
        else if(t===1) { const wh=makeWarehouse(); wh.position.set(lx,0,lz); group.add(wh); }
        else { const ch=makeChimney(); ch.position.set(lx,0,lz); group.add(ch); }
    } else if(biome===BIOME.BEACH) {
        const palm = makePalmTree();
        palm.position.set(lx, 0, lz);
        group.add(palm);
    }
}

// 決定的RNG
function createRNG(seed) {
    let s = seed;
    return function() {
        s = (s*9301+49297) % 233280;
        return s/233280;
    };
}

// ======================================================
// 3Dモデルファクトリ
// ======================================================

function makeTree(scale=1, type='deciduous') {
    const g = new THREE.Group();
    const trunkMat = getMat(0x3d2b1a, 0.9);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25*scale,0.4*scale,3*scale,8), trunkMat);
    trunk.position.y = 1.5*scale; trunk.castShadow = true; g.add(trunk);

    if(type==='pine') {
        const leafMat = getMat(0x0d4015, 0.8);
        [0,1,2].forEach(i => {
            const cone = new THREE.Mesh(new THREE.ConeGeometry((2.2-i*0.5)*scale,(3+i*0.3)*scale,8), leafMat);
            cone.position.y = (3+i*2)*scale; cone.castShadow = true; g.add(cone);
        });
    } else {
        const leafColors = [0x0d3d12, 0x0a2e0d, 0x144d18];
        [0,1,2].forEach(i => {
            const r = [2.8,2.2,1.4][i]*scale, h = [4,3.5,3][i]*scale, y = [3.5,5.5,7.5][i]*scale;
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(r,h,8), getMat(leafColors[i],0.8));
            leaf.position.y = y; leaf.castShadow = true; g.add(leaf);
        });
    }
    g.rotation.y = Math.random()*Math.PI*2;
    return g;
}

function makePalmTree() {
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.35,6,8), getMat(0x8b6914,0.9));
    trunk.position.y = 3; trunk.rotation.z = 0.1; g.add(trunk);
    for(let i=0;i<6;i++) {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.15,3.5,5), getMat(0x1a5e0a,0.8));
        leaf.position.set(Math.cos(i/6*Math.PI*2)*1.5, 6.5, Math.sin(i/6*Math.PI*2)*1.5);
        leaf.rotation.z = 0.8; leaf.rotation.y = i/6*Math.PI*2; g.add(leaf);
    }
    return g;
}

function makeBuilding(w, d, h, color) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), getMat(color,0.8,0.1));
    body.position.y = h/2; body.castShadow = true; body.receiveShadow = true; g.add(body);
    const winMat = new THREE.MeshBasicMaterial({color:0xffdd88});
    const rows = Math.floor(h/3), cols = Math.floor(w/2.5);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
        if(Math.random()>0.35) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(0.8,1.0), winMat);
            win.position.set((c/(Math.max(cols-1,1))-0.5)*(w-1.5), 2.5+r*3, d/2+0.01);
            g.add(win);
        }
    }
    return g;
}

function makeHouse(rng) {
    const g = new THREE.Group();
    const wallColors = [0xd4b483,0xc8a0a0,0xa0b4c8,0xb0c8a0];
    const roofColors = [0x8b2222,0x664422,0x446688];
    const wc = wallColors[Math.floor(rng()*wallColors.length)];
    const rc = roofColors[Math.floor(rng()*roofColors.length)];
    const base = new THREE.Mesh(new THREE.BoxGeometry(7,3.5,6), getMat(wc,0.9));
    base.position.y = 1.75; base.castShadow = true; g.add(base);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(5.2,2.5,4), getMat(rc,0.85));
    roof.position.y = 4.75; roof.rotation.y = Math.PI/4; roof.castShadow = true; g.add(roof);
    // ドア
    const door = new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.6), new THREE.MeshBasicMaterial({color:0x5a3010}));
    door.position.set(0, 0.8, 3.01); g.add(door);
    // 窓2つ
    [[-2,1.8],[2,1.8]].forEach(([dx,dy]) => {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(0.9,0.9), new THREE.MeshBasicMaterial({color:0x88ccff}));
        win.position.set(dx, dy, 3.01); g.add(win);
    });
    return g;
}

function makeBarn() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(10,5,7), getMat(0x882222,0.9));
    body.position.y = 2.5; g.add(body);

function getRandomDef(biome) {
    // バイオームに応じてターゲット重みを変える
    const humans = TARGET_DEFS.filter(d=>d.type==='human');
    const animals = TARGET_DEFS.filter(d=>['cow','horse','bear','wolf','deer','eagle','bison','raccoon','turkey','alligator'].includes(d.type));
    const vehicles = TARGET_DEFS.filter(d=>['car','truck','bus'].includes(d.type));

    let pool;
    if(biome===BIOME.URBAN || biome===BIOME.SUBURB) pool = [...humans,...humans,...vehicles];
    else if(biome===BIOME.FARMLAND || biome===BIOME.GRASSLAND) pool = [...animals,...animals,...humans];
    else if(biome===BIOME.FOREST || biome===BIOME.MOUNTAIN) pool = [...animals,...animals,...animals,...humans];
    else if(biome===BIOME.INDUSTRIAL) pool = [...humans,...vehicles,...vehicles];
    else pool = [...humans,...animals,...vehicles];

    return pool[Math.floor(Math.random()*pool.length)];
}

function buildTargetMesh(def) {
    switch(def.type) {
        case 'human':    return createHuman(def);
        case 'cow':      return createCow();
        case 'horse':    return createHorse();
        case 'bear':     return createBear();
        case 'wolf':     return createWolf();
        case 'deer':     return createDeer();
        case 'eagle':    return createEagle();
        case 'bison':    return createBison();
        case 'raccoon':  return createRaccoon();
        case 'turkey':   return createTurkey();
        case 'alligator':return createAlligator();
        case 'car':      return createCar(0xcc1111);
        case 'truck':    return createTruck();
        case 'bus':      return createBus();
        default:         return createHuman(def);
    }
}

function addTarget(wx, wz, defOverride) {
    const biome = getBiome(wx, wz);
    const def = defOverride || getRandomDef(biome);
    const mesh = buildTargetMesh(def);
    mesh.position.set(wx, 0.05, wz);
    scene.add(mesh);
    targets.push({
        mesh, title:def.title, score:def.score, icon:def.icon,
        vy:0,
        weight: def.type==='bus'?800:def.type==='truck'?400:def.type==='car'?250:def.type==='bear'?200:def.type==='bison'?300:50,
        speed:  def.type==='bus'?0.08:def.type==='car'?0.20:def.type==='eagle'?0.3:0.13,
        fleeDist: def.type==='car'?22:def.type==='eagle'?30:16,
        wanderDir: Math.random()*Math.PI*2,
        type: def.type,
        animPhase: Math.random()*Math.PI*2,
        spawnChunk: worldToChunk(wx,wz)
    });
}

const chunkTargetCount = new Map(); // チャンクごとのターゲット数

function updateChunks() {
    const { cx:ux, cz:uz } = worldToChunk(ufo.position.x, ufo.position.z);

    const needed = new Set();
    for(let dcx=-CHUNK_RENDER_DIST; dcx<=CHUNK_RENDER_DIST; dcx++) {
        for(let dcz=-CHUNK_RENDER_DIST; dcz<=CHUNK_RENDER_DIST; dcz++) {
            needed.add(getChunkKey(ux+dcx, uz+dcz));
        }
    }

    // 新チャンク生成
    needed.forEach(key => {
        if(!activeChunks.has(key)) {
            const [cx,cz] = key.split(',').map(Number);
            buildChunk(cx, cz);
            activeChunks.add(key);

            // チャンク内にターゲットをスポーン
            const ck = key;
            if(!chunkTargetCount.has(ck)) {
                chunkTargetCount.set(ck, 0);
                const biome = getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2, cz*CHUNK_SIZE+CHUNK_SIZE/2);
                const spawnN = biome===BIOME.OCEAN||biome===BIOME.RIVER ? 0 : 4+Math.floor(Math.random()*4);
                for(let i=0;i<spawnN;i++) {
                    const wx = cx*CHUNK_SIZE + Math.random()*CHUNK_SIZE;
                    const wz = cz*CHUNK_SIZE + Math.random()*CHUNK_SIZE;
                    addTarget(wx, wz);
                }
            }
        }
    });

    // 遠いチャンクを削除
    const toRemove = [];
    activeChunks.forEach(key => {
        if(!needed.has(key)) toRemove.push(key);
    });
    toRemove.forEach(key => {
        const chunk = chunkCache.get(key);
        if(chunk) {
            scene.remove(chunk);
            // ジオメトリは共有なので破棄しない（マテリアルもキャッシュ済み）
        }
        activeChunks.delete(key);
        // 遠いチャンクのターゲット削除
        const [cx,cz] = key.split(',').map(Number);
        for(let i=targets.length-1; i>=0; i--) {
            const t = targets[i];
            const tc = worldToChunk(t.mesh.position.x, t.mesh.position.z);
            const tkey = getChunkKey(tc.cx, tc.cz);
            if(tkey===key) {
                scene.remove(t.mesh);
                targets.splice(i,1);
            }
        }
    });

    // 表示中のチャンクをシーンに追加
    needed.forEach(key => {
        const chunk = chunkCache.get(key);
        if(chunk && !scene.children.includes(chunk)) scene.add(chunk);
    });
}

const baseR = 55;
function getStickPos(t) {
    const rect = stickBase.getBoundingClientRect();
    let dx=t.clientX-(rect.left+rect.width/2), dy=t.clientY-(rect.top+rect.height/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>baseR){dx=dx/dist*baseR;dy=dy/dist*baseR;}
    return {dx,dy};
}
stickBase.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];vStick.id=t.identifier;vStick.active=true;const{dx,dy}=getStickPos(t);vStick.x=dx/baseR;vStick.y=dy/baseR;stickKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;},{passive:false});
stickBase.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===vStick.id){const{dx,dy}=getStickPos(t);vStick.x=dx/baseR;vStick.y=dy/baseR;stickKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}}},{passive:false});
const resetStick=()=>{vStick.x=0;vStick.y=0;vStick.active=false;vStick.id=null;stickKnob.style.transform='translate(-50%,-50%)';};

const camTarget = new THREE.Vector3(0,40,55);
const camLookTarget = new THREE.Vector3(0,30,0);
let chunkUpdateTimer = 0;

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    const delta = 0.016;

    // UFO操作
    const ufoSpeed = 1.1;
    if(keys['KeyW']||keys['ArrowUp'])    ufo.position.z -= ufoSpeed;
    if(keys['KeyS']||keys['ArrowDown'])  ufo.position.z += ufoSpeed;
    if(keys['KeyA']||keys['ArrowLeft'])  ufo.position.x -= ufoSpeed;
    if(keys['KeyD']||keys['ArrowRight']) ufo.position.x += ufoSpeed;
    if(vStick.active) { ufo.position.x+=vStick.x*ufoSpeed; ufo.position.z+=vStick.y*ufoSpeed; }

    ufo.position.y = 55 + Math.sin(time*0.8)*1.2;
    ufo.rotation.y = time*0.3;
    // アンテナ点滅
    antennaTop.material.color.setHSL(0,1,0.5+0.5*Math.sin(time*5));

    // スポットライト — UFO真下を照らす
    spotLight.position.copy(ufo.position);
    lightTarget.position.set(ufo.position.x, 0, ufo.position.z);

    // UFO周囲ポイントライト更新
    ufoPointLight.position.copy(ufo.position);
    ufoGroundLight.position.set(ufo.position.x, ufo.position.y, ufo.position.z); // UFOと同じ高さ

    // カラーアクセントライトを左右に揺らす
    const cAngle = time * 0.8;
    ufoColorLight1.position.set(ufo.position.x + Math.cos(cAngle)*6, ufo.position.y - 1, ufo.position.z + Math.sin(cAngle)*6);
    ufoColorLight2.position.set(ufo.position.x - Math.cos(cAngle)*6, ufo.position.y - 1, ufo.position.z - Math.sin(cAngle)*6);

    // ビームグループ位置
    beamGroup.position.set(ufo.position.x, ufo.position.y - 27.5, ufo.position.z);

    const active = isAbducting||keys['Space'];

    // LEDリング — 24個、カラーサイクル
    ledRing.children.forEach((led,i)=>{
        const hue = ((i/24)+time*0.4)%1;
        led.material.color.setHSL(hue,1.0,active?0.92:0.65);
    });

    // リングのemissive pulse
    ufoRing.material.emissiveIntensity = 1.2 + Math.sin(time*3)*0.5;
    ufoRing.material.emissive.setHSL((time*0.15)%1, 1.0, 0.5);

    // ドームのグロー脈動
    domeMat.emissiveIntensity = 0.8 + Math.sin(time*2)*0.4;

    // グロー板の脈動
    glowDisc.material.opacity = 0.12 + Math.sin(time*2)*0.06;

    // ビーム表示切替 & 光強度
    beamGroup.visible = active;
    if(active){
        spotLight.intensity = 6.0; spotLight.color.setHex(0x88ffee);
        spotLight.angle = Math.PI/7;
        ufoPointLight.color.setHex(0x00ffee); ufoPointLight.intensity = 8; ufoPointLight.distance = 100;
        ufoGroundLight.intensity = 5; ufoGroundLight.distance = 180;
        ufoColorLight1.intensity = 3.5; ufoColorLight2.intensity = 3.5;
        const flicker = 1.0 + Math.sin(time*30)*0.12 + Math.sin(time*47)*0.08;
        beamOuter.material.opacity = 0.055 * flicker;
        beamMid.material.opacity  = 0.10 * flicker;
        beamInner.material.opacity = 0.22 * flicker;
        beamCore.material.opacity  = 0.30 * flicker;
        beamGlow.material.opacity  = 0.30 + Math.sin(time*8)*0.10;
        beamLight1.intensity = 4 + Math.sin(time*6)*1;
        beamLight2.intensity = 3.5 + Math.sin(time*7)*1;
        beamLight3.intensity = 6 + Math.sin(time*5)*2;
        bodyMat.emissiveIntensity = 1.2 + Math.sin(time*4)*0.4;
        bodyMat.emissive.setHex(0x003344);
    } else {
        spotLight.intensity = 1.8; spotLight.color.setHex(0x55ccff);
        spotLight.angle = Math.PI/5;
        ufoPointLight.color.setHex(0x00cc88); ufoPointLight.intensity = 3; ufoPointLight.distance = 80;
        ufoGroundLight.intensity = 1.5; ufoGroundLight.distance = 130;
        ufoColorLight1.intensity = 1.2; ufoColorLight2.intensity = 1.2;
        bodyMat.emissiveIntensity = 0.4 + Math.sin(time*1.5)*0.15;
        bodyMat.emissive.setHex(0x112233);
        beamLight1.intensity = 0; beamLight2.intensity = 0; beamLight3.intensity = 0;
    }

    // ターゲット行動
    for(let i=targets.length-1;i>=0;i--) {
        const t = targets[i];
        const dx = t.mesh.position.x-ufo.position.x;
        const dz = t.mesh.position.z-ufo.position.z;
        const dist = Math.sqrt(dx*dx+dz*dz);

        if(t.mesh.position.y<=0.1) {
            if(dist<t.fleeDist&&active) {
                const angle=Math.atan2(dx,dz);
                t.mesh.position.x+=Math.sin(angle)*t.speed*1.5;
                t.mesh.position.z+=Math.cos(angle)*t.speed*1.5;
                if(t.type==='human'||t.type==='car'||t.type==='truck'||t.type==='bus')
                    t.mesh.rotation.y=Math.atan2(dx,dz);
            } else {
                if(Math.random()<0.008) t.wanderDir=Math.random()*Math.PI*2;
                t.mesh.position.x+=Math.sin(t.wanderDir)*t.speed*0.25;
                t.mesh.position.z+=Math.cos(t.wanderDir)*t.speed*0.25;
                if(t.type==='human'||t.type==='deer'||t.type==='wolf'||t.type==='horse')
                    t.mesh.rotation.y=t.wanderDir;
                // 脚アニメ（人間系）
                if(t.type==='human') {
                    t.mesh.children.forEach((c,ci)=>{ if(ci<2) c.rotation.x=Math.sin(time*4+t.animPhase+ci)*0.2; });
                }
            }
        }

        // 吸い込み
        if(active&&dist<6) {
            t.vy+=3.5/t.weight;
            if(t.vy>0.6) t.vy=0.6;
            t.mesh.position.y+=t.vy;
            t.mesh.rotation.y+=0.06; t.mesh.rotation.x+=0.02;
            if(t.mesh.position.y>ufo.position.y-2) {
                score+=t.score; abductCount++;
                document.getElementById('score').textContent=score;
                document.getElementById('count').textContent=abductCount;
                showNotif('+'+t.score);
                collected.push({title:t.title,icon:t.icon,score:t.score});
                scene.remove(t.mesh);
                targets.splice(i,1);
            }
        } else if(t.mesh.position.y>0.05) {
            t.vy-=0.2;
            t.mesh.position.y+=t.vy;
            if(t.mesh.position.y<=0.05){t.mesh.position.y=0.05;t.vy=0;t.mesh.rotation.x=0;}
        }
    }

    // チャンク更新（毎30フレームごと）
    chunkUpdateTimer++;
    if(chunkUpdateTimer>=30) { chunkUpdateTimer=0; updateChunks(); }

    // バイオームラベル更新
    const curBiome = getBiome(ufo.position.x, ufo.position.z);
    const bn = BIOME_NAMES[curBiome]||'WILDERNESS';
    if(bn!==lastBiomeLabel) { biomeLabel.textContent=bn; lastBiomeLabel=bn; }

    // カメラ追従
    camTarget.set(ufo.position.x, ufo.position.y+35, ufo.position.z+55);
    camLookTarget.set(ufo.position.x, ufo.position.y-25, ufo.position.z);
    camera.position.lerp(camTarget,0.08);
    camLookTarget.lerp(ufo.position,0.1);
    camera.lookAt(camLookTarget);

    renderer.clear();
    renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
    renderer.render(scene,camera);
}

// ======================================================
// ENCYCLOPEDIA
// ======================================================
document.getElementById('encyclopedia-btn').onclick = () => {
    const modal = document.getElementById('modal');
    modal.style.display='block';
    const grid = document.getElementById('card-grid');
    grid.innerHTML='';
    if(collected.length===0) {
        grid.innerHTML='<div style="color:#00ff8866;padding:40px;letter-spacing:2px">// まだ誰も拉致されていない //</div>';
        return;
    }
    const byTitle={};
    collected.forEach(c=>{ if(!byTitle[c.title]) byTitle[c.title]={...c,count:0}; byTitle[c.title].count++; });
    Object.values(byTitle).forEach(item=>{
        const card=document.createElement('div');
        card.className='card';
        card.innerHTML=`<div class="card-icon">${item.icon}</div><div class="card-title">${item.title}</div><div class="card-pts">${item.score} pts × ${item.count}</div>`;
        grid.appendChild(card);
    });
};
document.getElementById('close-btn').onclick=()=>document.getElementById('modal').style.display='none';
window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// 初期チャンク生成
updateChunks();
animate();

});
</script>
