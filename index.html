<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO キャトルミューティレーション</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08071a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none}
  #gc{position:relative;display:inline-block}
  canvas{display:block;border-radius:8px;box-shadow:0 0 80px rgba(80,200,255,.35)}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;pointer-events:none}
  .panel{background:rgba(0,0,0,.6);border:1px solid rgba(100,220,255,.3);border-radius:10px;padding:8px 14px;backdrop-filter:blur(6px);pointer-events:all}
  .sc{font-size:22px;font-weight:700;color:#7ff0ff;text-shadow:0 0 12px #00eeff}
  .lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
  .bw{width:140px;height:9px;background:rgba(255,255,255,.12);border-radius:5px;margin-top:4px;overflow:hidden}
  .bf{height:100%;border-radius:5px;transition:width .25s}
  #hpf{background:linear-gradient(90deg,#ff4466,#ff8800)}
  #alf{background:linear-gradient(90deg,#ffaa00,#ff2200)}
  #upbtn{cursor:pointer;background:linear-gradient(135deg,#1a3a5c,#2a5a8c);border:1px solid rgba(100,200,255,.5);color:#7ff0ff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;letter-spacing:.5px;transition:all .2s}
  #upbtn:hover{background:linear-gradient(135deg,#2a5a8c,#3a7abf);box-shadow:0 0 12px rgba(100,200,255,.4)}
  #upanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,8,28,.96);border:1px solid rgba(100,200,255,.4);border-radius:16px;padding:24px;width:340px;backdrop-filter:blur(12px);display:none;z-index:100}
  #upanel h2{color:#7ff0ff;font-size:18px;margin-bottom:16px;text-align:center;text-shadow:0 0 10px #00eeff}
  .ui{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,.05);border:1px solid rgba(100,200,255,.2);border-radius:8px}
  .un{color:#fff;font-size:13px;font-weight:600}
  .ud{color:rgba(255,255,255,.5);font-size:10px;margin-top:2px}
  .ub{background:linear-gradient(135deg,#1a5a3a,#2a9a5a);border:1px solid #3aca7a;color:#7fffa0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap}
  .ub:disabled,.ub.mx{background:linear-gradient(135deg,#333,#444);border-color:#555;color:#666;cursor:not-allowed}
  #clo{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:8px;border-radius:8px;cursor:pointer;font-size:13px}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.78);border-radius:8px;z-index:200}
  #ov h1{font-size:46px;font-weight:900;color:#7ff0ff;text-shadow:0 0 30px #00eeff,0 0 60px #0088ff;margin-bottom:8px}
  #ov .sub{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:28px;text-align:center;line-height:1.8}
  .btn{background:linear-gradient(135deg,#1a4a8a,#2a7adf);border:2px solid rgba(100,200,255,.6);color:#fff;font-size:17px;font-weight:700;padding:13px 38px;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:1px;box-shadow:0 0 30px rgba(0,120,255,.4)}
  .btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,150,255,.6)}
  #ctrl{position:absolute;bottom:10px;left:12px;color:rgba(255,255,255,.35);font-size:10px;pointer-events:none;line-height:1.9}
  /* ── 図鑑 ── */
  #zbtn{cursor:pointer;background:linear-gradient(135deg,#3a1a5c,#6a2a9c);border:1px solid rgba(200,140,255,.5);color:#dda0ff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;letter-spacing:.5px;transition:all .2s}
  #zbtn:hover{background:linear-gradient(135deg,#6a2a9c,#9a3acf);box-shadow:0 0 12px rgba(180,100,255,.4)}
  #zbadge{display:inline-block;background:#ff3366;color:#fff;font-size:9px;font-weight:900;border-radius:999px;padding:0 5px;margin-left:4px;vertical-align:middle;line-height:16px;min-width:16px;text-align:center}
  #zov{position:absolute;inset:0;background:rgba(4,2,20,.96);border-radius:8px;z-index:150;display:none;flex-direction:column;overflow:hidden}
  #zov-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(180,100,255,.2);flex-shrink:0}
  #zov-header h2{color:#dda0ff;font-size:18px;font-weight:800;text-shadow:0 0 12px #aa44ff;letter-spacing:1px}
  #zclo{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px}
  #zgrid{flex:1;overflow-y:auto;padding:18px;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start}
  #zgrid::-webkit-scrollbar{width:6px}
  #zgrid::-webkit-scrollbar-thumb{background:rgba(180,100,255,.4);border-radius:3px}
  .zcard{width:150px;height:210px;cursor:pointer;perspective:600px;flex-shrink:0;transition:transform .15s}
  .zcard:hover{transform:scale(1.06)}
  .zcard-inner{width:100%;height:100%;position:relative;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.6)}
  .zcard-inner canvas{display:block;width:100%;height:128px;background:#111}
  .zcard-bot{padding:6px 8px;background:#0a0818;height:82px;display:flex;flex-direction:column;justify-content:space-between}
  .zcard-name{font-size:11px;font-weight:800;color:#fff;line-height:1.3;letter-spacing:.3px}
  .zcard-type{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}
  .zcard-stats{display:flex;gap:6px;margin-top:3px}
  .zcard-stat{font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:3px;color:#fff}
  .zcard-count{font-size:8px;color:rgba(255,255,255,.35);text-align:right}
  .rc-common{border:2px solid #888}
  .rc-uncommon{border:2px solid #44cc66;box-shadow:0 0 8px rgba(60,200,80,.35)}
  .rc-rare{border:2px solid #4488ff;box-shadow:0 0 10px rgba(60,130,255,.45)}
  .rc-epic{border:2px solid #cc55ff;box-shadow:0 0 12px rgba(180,60,255,.5)}
  .rc-legendary{border:2px solid #ffcc00;box-shadow:0 0 16px rgba(255,200,0,.6),0 0 32px rgba(255,160,0,.3)}
  .stat-w{background:#334466} .stat-s{background:#334433} .stat-t{background:#441111}
  /* Card detail overlay */
  #cdov{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:160;display:none;align-items:center;justify-content:center;border-radius:8px}
  #cdcard{width:280px;background:linear-gradient(160deg,#0e0820,#180a30,#0e0820);border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8);position:relative}
  #cdcard canvas{display:block;width:100%;height:200px}
  #cdcard-body{padding:14px 16px}
  #cdcard-title{font-size:20px;font-weight:900;letter-spacing:.5px;margin-bottom:4px}
  #cdcard-sub{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:10px;letter-spacing:.5px}
  #cdcard-stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .cd-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.3px}
  #cdcard-desc{font-size:11px;color:rgba(255,255,255,.65);line-height:1.7;font-style:italic}
  #cdcard-close{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:8px;border-radius:8px;cursor:pointer;font-size:12px}
  /* New card toast */
  #nc-toast{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:170;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
  .nc-pop{background:linear-gradient(135deg,rgba(10,5,30,.95),rgba(30,10,60,.95));border-radius:12px;padding:8px 14px;text-align:center;animation:ncAnim 2.8s ease forwards;opacity:0;box-shadow:0 0 20px rgba(180,80,255,.4)}
  @keyframes ncAnim{0%{opacity:0;transform:translateY(10px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
  .nc-new{font-size:9px;font-weight:900;letter-spacing:2px;color:#ffaa44;text-transform:uppercase}
  .nc-name{font-size:15px;font-weight:800;margin-top:2px}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="panel">
      <div class="lbl">スコア</div>
      <div class="sc" id="sd">0</div>
      <div class="lbl" style="margin-top:8px">UFO HP</div>
      <div class="bw"><div class="bf" id="hpf"></div></div>
      <div class="lbl" style="margin-top:8px">警戒レベル <span id="alt">平和</span></div>
      <div class="bw"><div class="bf" id="alf"></div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
      <div class="panel" style="text-align:right">
        <div class="lbl">捕獲数</div>
        <div style="color:#ffdd55;font-size:18px;font-weight:700" id="cc">0</div>
      </div>
      <button class="panel" id="upbtn">⚡ 強化パネル [U]</button>
      <button class="panel" id="zbtn">📚 図鑑 [Z] <span id="zbadge">0</span></button>
    </div>
  </div>
  <div id="upanel">
    <h2>🛸 UFO 強化システム</h2>
    <div id="ulist"></div>
    <button id="clo">閉じる [U]</button>
  </div>
  <!-- 図鑑 overlay -->
  <div id="zov">
    <div id="zov-header">
      <h2>📚 キャトルミューティレーション図鑑</h2>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="zcounter" style="color:rgba(255,255,255,.5);font-size:11px"></span>
        <button id="zclo">✕ 閉じる</button>
      </div>
    </div>
    <div id="zgrid"></div>
  </div>
  <!-- Card detail -->
  <div id="cdov">
    <div id="cdcard">
      <canvas id="cdcanvas" width="280" height="200"></canvas>
      <div id="cdcard-body">
        <div id="cdcard-title"></div>
        <div id="cdcard-sub"></div>
        <div id="cdcard-stats"></div>
        <div id="cdcard-desc"></div>
        <button id="cdcard-close">← 一覧に戻る</button>
      </div>
    </div>
  </div>
  <!-- New capture toast -->
  <div id="nc-toast"></div>
  <div id="ov">
    <canvas id="titleUFO" width="160" height="100" style="margin-bottom:10px"></canvas>
    <h1>UFO ABDUCTION</h1>
    <div class="sub">宇宙船を操ってキャトルミューティレーション！<br>マウス移動でUFO誘導、クリック / Space でビーム発射<br>UFO直下にいる目標をビームで吸い上げろ！</div>
    <button class="btn" id="stbtn">🎮 ゲーム開始</button>
  </div>
  <div id="ctrl">マウス: UFO移動 &nbsp;|&nbsp; クリック / Space: ビーム &nbsp;|&nbsp; U: 強化パネル &nbsp;|&nbsp; Z: 図鑑</div>
</div>

<script>
// ─── Canvas Setup ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = Math.min(window.innerWidth-20, 1100);
const H = Math.min(window.innerHeight-20, 680);
canvas.width = W; canvas.height = H;
document.getElementById('gc').style.width = W+'px';

const GROUND_Y = H * 0.74;
const HORIZON  = H * 0.56;
const BEAM_HW  = 34;   // beam half-width
const UFO_MAX_HP = 100;
const ALERT_MAX  = 100;

// ─── Upgrades ───────────────────────────────────────────────────
const UPGRADES = [
  {id:'beam',   name:'ビーム強化',  desc:'吸い上げ速度 +25%', cost:500, maxLv:4, icon:'⚡'},
  {id:'engine', name:'エンジン強化',desc:'移動速度 +20%',     cost:400, maxLv:4, icon:'🚀'},
  {id:'stealth',name:'ステルス装置',desc:'発見距離 −25%',     cost:600, maxLv:3, icon:'👁'},
  {id:'shield', name:'シールド',    desc:'HP上限 +30',        cost:700, maxLv:3, icon:'🛡'},
  {id:'gravity',name:'重力制御',    desc:'暴れ抵抗 −30%',     cost:800, maxLv:3, icon:'🌀'},
];

// ─── Object Types ────────────────────────────────────────────────
const OBJ_TYPES = [
  {type:'human',  weight:70,   score:100,  speed:1.3, struggle:.22, w:24, h:44, reports:true },
  {type:'cow',    weight:600,  score:300,  speed:0.4, struggle:.40, w:52, h:38 },
  {type:'car',    weight:1500, score:800,  speed:0.9, struggle:.10, w:66, h:32 },
  {type:'pig',    weight:100,  score:150,  speed:0.6, struggle:.30, w:42, h:28 },
  {type:'chicken',weight:2,    score:50,   speed:2.2, struggle:.10, w:24, h:26 },
  {type:'truck',  weight:3000, score:1500, speed:0.5, struggle:.05, w:82, h:40 },
  {type:'sheep',  weight:80,   score:120,  speed:0.7, struggle:.25, w:40, h:32 },
  {type:'dog',    weight:30,   score:80,   speed:1.9, struggle:.35, w:32, h:26 },
];

// ─── State ──────────────────────────────────────────────────────
let state='title', score=0, captures=0, ufoHP=UFO_MAX_HP, alertLv=0;
let alertDecay=0, spawnTmr=0, policeTmr=0, militaryOn=false;
let upOpen=false, upLvs={beam:0,engine:0,stealth:0,shield:0,gravity:0};
let particles=[], floatMsgs=[], objects=[], police=[], military=[];
let beamOn=false, beamTarget=null, abductProg=0, struggleTmr=0, shakeTmr=0;
let stars=[], gt=0;
let ufo={x:W/2,y:H*.25,vx:0,vy:0,ft:0};
let mx=W/2, my=H*.25;
let comicFont='900 italic 20px "Arial Black",Arial,sans-serif';

// ─── Helpers ─────────────────────────────────────────────────────
const rnd=(a,b)=>a+(b-a)*Math.random();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;

function initStars(){
  stars=[];
  for(let i=0;i<130;i++) stars.push({x:rnd(0,W),y:rnd(0,HORIZON*.85),r:rnd(.5,2.2),tw:rnd(0,Math.PI*2),sp:rnd(.5,2)});
}

// ─── Sprite drawing functions ────────────────────────────────────
// Comic style: bold outlines, flat colour, expressive

function comicSetup(){
  ctx.lineJoin='round';
  ctx.lineCap='round';
}

/* ── Human ── */
function drawHuman(cx, cy, dir, alert, shake){
  ctx.save();
  if(shake){ctx.translate(rnd(-3,3),rnd(-2,2));}
  ctx.translate(cx, cy);
  ctx.scale(dir<0?-1:1, 1);
  comicSetup();

  // Pants
  ctx.fillStyle='#1a4fa8';
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-9,-12); ctx.lineTo(-9,-28); ctx.lineTo(9,-28); ctx.lineTo(9,-12);
  ctx.lineTo(4,-12); ctx.lineTo(4,-22); ctx.lineTo(0,-22); ctx.lineTo(0,-22);
  ctx.lineTo(-4,-22); ctx.lineTo(-4,-12); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Shoes
  ctx.fillStyle='#222';
  [-8,8].forEach(sx=>{
    ctx.beginPath();
    ctx.ellipse(sx+sx*.25, 0, 7, 3.5, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  });

  // Shirt
  ctx.fillStyle='#e53030';
  ctx.beginPath();
  ctx.moveTo(-10,-28);ctx.lineTo(-10,-44);ctx.lineTo(10,-44);ctx.lineTo(10,-28);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Arms
  ctx.strokeStyle='#d98060'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-10,-41); ctx.lineTo(-16,-32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-41); ctx.lineTo(16,-32); ctx.stroke();
  // Hands
  ctx.fillStyle='#f5b990'; ctx.strokeStyle='#000'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(-16,-32,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(16,-32,4,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Head
  ctx.fillStyle='#f5b990'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(0,-54,11,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Hair
  ctx.fillStyle='#4e2a10';
  ctx.beginPath(); ctx.ellipse(0,-63,11,7,0,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-11,-56,5,Math.PI*1.2,Math.PI*1.8); ctx.fill();
  ctx.beginPath(); ctx.arc(11,-56,5,Math.PI*1.2,Math.PI*1.8,true); ctx.fill();

  // Eyes
  ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(-4,-54,3.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(4,-54,3.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=alert?'#ff2200':'#1a1a6a';
  ctx.beginPath(); ctx.arc(-4,-54,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-54,2,0,Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle='#000'; ctx.lineWidth=1.8;
  ctx.beginPath();
  if(alert==='reporting'){
    ctx.arc(0,-49,4,0.1,Math.PI-.1); // panic mouth open
    ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-49,2,.3,Math.PI-.3); ctx.stroke();
  } else {
    ctx.moveTo(-4,-49); ctx.lineTo(4,-49);
  }
  ctx.stroke();

  // Alert
  if(alert==='watching'){
    ctx.font='14px serif'; ctx.textAlign='center';
    ctx.fillText('👀',0,-72);
  } else if(alert==='reporting'){
    // Phone icon
    ctx.lineWidth=2; ctx.strokeStyle='#000';
    ctx.fillStyle='#ff3300';
    ctx.beginPath(); ctx.roundRect(12,-68,10,14,2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#88aaff';
    ctx.beginPath(); ctx.rect(13,-66,8,8); ctx.fill();
  }

  ctx.restore();
}

/* ── Cow ── */
function drawCow(cx, cy, dir, shake){
  ctx.save();
  if(shake) ctx.translate(rnd(-3,3),rnd(-2,2));
  ctx.translate(cx,cy); ctx.scale(dir<0?-1:1,1);
  comicSetup();

  // Legs
  ctx.fillStyle='#e8e8e8'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
  [[-16,0],[-8,0],[8,0],[16,0]].forEach(([lx,_])=>{
    ctx.beginPath(); ctx.rect(lx-3,-16,6,16); ctx.fill(); ctx.stroke();
    // Hoof
    ctx.fillStyle='#555';
    ctx.beginPath(); ctx.ellipse(lx,0,4,2.5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e8e8e8';
  });

  // Body
  ctx.fillStyle='#f2f2f2'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(0,-22,26,16,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Spots (black patches)
  ctx.fillStyle='#111';
  [[8,-18,9,7],[-10,-26,7,5],[5,-32,6,4]].forEach(([sx,sy,rw,rh])=>{
    ctx.beginPath(); ctx.ellipse(sx,sy,rw,rh,rnd(-.5,.5),0,Math.PI*2); ctx.fill();
  });

  // Udder
  ctx.fillStyle='#f5a0a0'; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(-2,-14,8,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#c06060'; ctx.lineWidth=1.2;
  [[-5,-12],[-1,-12],[3,-12]].forEach(([tx,ty])=>{
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx,ty+5); ctx.stroke();
  });

  // Neck + Head
  ctx.fillStyle='#f2f2f2'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(-20,-26,9,7,-.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Head
  ctx.beginPath(); ctx.ellipse(-28,-28,12,10,-.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Snout
  ctx.fillStyle='#f5c0a0';
  ctx.beginPath(); ctx.ellipse(-33,-26,6,4,.1,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#944'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(-34,-26,1.8,1.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-31,-26,1.8,1.5,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(-24,-30,3.5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-24,-30,2,0,Math.PI*2); ctx.fill();
  // Horns

// ─── Draw any object by type ─────────────────────────────────────
function drawEntitySprite(obj){
  if(obj.captured) return;
  let cx=obj.x, cy=obj.y+obj.h/2, dir=obj.dir, sh=obj.shake;
  let al=obj.alertState;
  switch(obj.type){
    case 'human':   drawHuman(cx,cy,dir,al,sh);  break;
    case 'cow':     drawCow(cx,cy,dir,sh);        break;
    case 'car':     drawCar(cx,cy,dir,sh);        break;
    case 'pig':     drawPig(cx,cy,dir,sh);        break;
    case 'chicken': drawChicken(cx,cy,dir,sh);    break;
    case 'truck':   drawTruck(cx,cy,dir,sh);      break;
    case 'sheep':   drawSheep(cx,cy,dir,sh);      break;
    case 'dog':     drawDog(cx,cy,dir,sh);        break;
  }
  // Abduction progress bar
  if(obj===beamTarget && beamOn){
    let bw=54,bh=7,bx=cx-bw/2,by=obj.y-obj.h/2-22;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(bx,by,bw,bh);
    let g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,'#00ff88'); g.addColorStop(1,'#00ddff');
    ctx.fillStyle=g; ctx.fillRect(bx,by,bw*(abductProg/100),bh);
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1;
    ctx.strokeRect(bx,by,bw,bh);
  }
}

function drawEntityAscending(obj){
  if(!obj.ascending) return;
  ctx.save(); ctx.globalAlpha=clamp(1-(obj.ascY/ufo.y)*.8,.2,1);
  let cx=obj.ascX, cy=obj.ascY+obj.h/2, dir=obj.dir;
  switch(obj.type){
    case 'human':   drawHuman(cx,cy,dir,null,false);break;
    case 'cow':     drawCow(cx,cy,dir,false);       break;
    case 'car':     drawCar(cx,cy,dir,false);       break;
    case 'pig':     drawPig(cx,cy,dir,false);       break;
    case 'chicken': drawChicken(cx,cy,dir,false);   break;
    case 'truck':   drawTruck(cx,cy,dir,false);     break;
    case 'sheep':   drawSheep(cx,cy,dir,false);     break;
    case 'dog':     drawDog(cx,cy,dir,false);       break;
  }
  ctx.restore();
}

// ─── Background ──────────────────────────────────────────────────
function drawBackground(){
  // Sky
  let sky=ctx.createLinearGradient(0,0,0,HORIZON*1.15);
  sky.addColorStop(0,'#1a0830'); sky.addColorStop(.3,'#2c0c58');
  sky.addColorStop(.65,'#7a2850'); sky.addColorStop(.85,'#c05840');
  sky.addColorStop(1,'#e8a050');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Ground
  let gnd=ctx.createLinearGradient(0,HORIZON,0,H);
  gnd.addColorStop(0,'#c07040'); gnd.addColorStop(.3,'#a05520');
  gnd.addColorStop(1,'#7a3815');
  ctx.fillStyle=gnd; ctx.fillRect(0,HORIZON,W,H-HORIZON);

  // Moon
  ctx.save();
  let mg=ctx.createRadialGradient(W*.78,H*.07,2,W*.78,H*.07,30);
  mg.addColorStop(0,'rgba(255,245,200,.96)');
  mg.addColorStop(.7,'rgba(230,210,155,.65)');
  mg.addColorStop(1,'rgba(200,175,120,0)');
  ctx.fillStyle=mg;
  ctx.beginPath(); ctx.arc(W*.78,H*.07,30,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Stars
  let t=gt*.001;
  ctx.save();
  for(let s of stars){
    let a=.35+.65*Math.sin(s.tw+t*s.sp);
    ctx.globalAlpha=a;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Far dunes
  ctx.fillStyle='rgba(140,70,25,.5)';
  ctx.beginPath(); ctx.moveTo(0,H);
  [[0,GROUND_Y+5],[W*.07,GROUND_Y-42],[W*.18,GROUND_Y+4],[W*.31,GROUND_Y-64],
   [W*.46,GROUND_Y+6],[W*.6,GROUND_Y-48],[W*.76,GROUND_Y+4],[W*.88,GROUND_Y-58],[W,GROUND_Y],[W,H]].forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.closePath(); ctx.fill();

  // Front dunes
  ctx.fillStyle='rgba(110,55,16,.65)';
  ctx.beginPath(); ctx.moveTo(0,H);
  [[0,GROUND_Y+42],[W*.1,GROUND_Y+18],[W*.24,GROUND_Y+50],[W*.4,GROUND_Y+18],
   [W*.56,GROUND_Y+46],[W*.72,GROUND_Y+16],[W*.86,GROUND_Y+44],[W,GROUND_Y+22],[W,H]].forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.closePath(); ctx.fill();

  // Reflective puddles
  [W*.18,W*.52,W*.8].forEach(px=>{
    let pg=ctx.createLinearGradient(px-45,0,px+45,0);
    pg.addColorStop(0,'rgba(140,100,220,0)');
    pg.addColorStop(.5,'rgba(160,120,255,.18)');
    pg.addColorStop(1,'rgba(140,100,220,0)');
    ctx.fillStyle=pg;
    ctx.beginPath(); ctx.ellipse(px,GROUND_Y+36,55,15,0,0,Math.PI*2); ctx.fill();
  });

  // Horizon glow
  let hg=ctx.createLinearGradient(0,HORIZON-28,0,HORIZON+44);
  hg.addColorStop(0,'rgba(255,140,60,0)');
  hg.addColorStop(.5,'rgba(255,110,30,.22)');
  hg.addColorStop(1,'rgba(180,75,15,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,HORIZON-28,W,72);
}

// ─── UFO ─────────────────────────────────────────────────────────
function drawUFO(x, y, ft){
  ctx.save();
  let fy=Math.sin(ft)*5;
  ctx.translate(x, y+fy);

  // Ground shadow
  let sd=ctx.createRadialGradient(0,GROUND_Y-y-fy+20,5,0,GROUND_Y-y-fy+20,60);
  sd.addColorStop(0,'rgba(0,0,0,.3)'); sd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sd;
  ctx.save(); ctx.scale(1,.25); ctx.translate(0,(GROUND_Y-y)*4);
  ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Aura
  let ar=ctx.createRadialGradient(0,0,10,0,0,80);
  ar.addColorStop(0,'rgba(80,200,255,.12)'); ar.addColorStop(1,'rgba(0,80,200,0)');
  ctx.fillStyle=ar; ctx.beginPath(); ctx.arc(0,0,80,0,Math.PI*2); ctx.fill();

  // Dome
  let dg=ctx.createRadialGradient(-8,-22,4,0,-10,38);
  dg.addColorStop(0,'rgba(160,235,255,.92)');
  dg.addColorStop(.5,'rgba(60,130,210,.72)');
  dg.addColorStop(1,'rgba(20,40,110,.3)');
  ctx.fillStyle=dg;
  ctx.beginPath(); ctx.ellipse(0,-10,30,22,0,Math.PI,0); ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,-10,30,22,0,Math.PI,0); ctx.stroke();

  // Saucer body
  let bg=ctx.createLinearGradient(0,-14,0,14);
  bg.addColorStop(0,'#3c4268'); bg.addColorStop(.4,'#5c6488');
  bg.addColorStop(.7,'#2c3258'); bg.addColorStop(1,'#1c2248');
  ctx.fillStyle=bg; ctx.strokeStyle='rgba(100,140,255,.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,56,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Rim highlight
  ctx.strokeStyle='rgba(180,210,255,.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,-4,54,10,0,Math.PI,0); ctx.stroke();

  // Engine ring
  let rg=ctx.createLinearGradient(0,5,0,16);
  rg.addColorStop(0,'#4c5478'); rg.addColorStop(1,'#2a3060');
  ctx.fillStyle=rg; ctx.strokeStyle='rgba(80,120,220,.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,9,34,9,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Rotating lights
  let t=gt*.003;
  for(let i=0;i<12;i++){
    let a=(i/12)*Math.PI*2+t, lx=Math.cos(a)*27, ly=7+Math.sin(a)*7;
    let pulse=.55+.45*Math.sin(t*3+i*.9);
    ctx.save(); ctx.globalAlpha=pulse;
    let lg=ctx.createRadialGradient(lx,ly,0,lx,ly,6);
    lg.addColorStop(0,'rgba(180,250,255,1)'); lg.addColorStop(1,'rgba(60,160,255,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,ly,6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Center emitter
  let ep=beamOn?.85+.15*Math.sin(gt*.012):.32;
  let eg=ctx.createRadialGradient(0,10,0,0,10,16);
  eg.addColorStop(0,`rgba(80,255,100,${.75*ep})`);
  eg.addColorStop(1,'rgba(0,180,40,0)');
  ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,10,16,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ─── Vertical Beam (cylinder) ──────────────────────────────────────
function drawVerticalBeam(ux, uy, ft){
  let bx=ux;
  let topY=uy+Math.sin(ft)*5+15; // bottom of UFO engine ring
  let botY=GROUND_Y+22;
  let hw=BEAM_HW;
  let t=gt*.003;

  ctx.save();

  // Outer atmospheric halo
  let halo=ctx.createLinearGradient(bx-hw*2.8,0,bx+hw*2.8,0);
  halo.addColorStop(0,'rgba(0,255,70,0)');
  halo.addColorStop(.38,'rgba(40,255,90,.10)');
  halo.addColorStop(.5,'rgba(60,255,110,.18)');
  halo.addColorStop(.62,'rgba(40,255,90,.10)');
  halo.addColorStop(1,'rgba(0,255,70,0)');
  ctx.fillStyle=halo;
  ctx.fillRect(bx-hw*2.8, topY, hw*5.6, botY-topY);

  // Main cylinder body gradient (edge to center = dark to bright)
  let cyl=ctx.createLinearGradient(bx-hw,0,bx+hw,0);
  cyl.addColorStop(0,'rgba(10,160,50,.30)');
  cyl.addColorStop(.18,'rgba(40,210,80,.58)');
  cyl.addColorStop(.42,'rgba(100,255,130,.80)');
  cyl.addColorStop(.5,'rgba(200,255,210,.92)');
  cyl.addColorStop(.58,'rgba(100,255,130,.80)');
  cyl.addColorStop(.82,'rgba(40,210,80,.58)');
  cyl.addColorStop(1,'rgba(10,160,50,.30)');
  ctx.fillStyle=cyl;
  ctx.fillRect(bx-hw, topY, hw*2, botY-topY);

  // Animated horizontal scan lines (flow downward)
  ctx.save();
  ctx.beginPath(); ctx.rect(bx-hw,topY,hw*2,botY-topY); ctx.clip();
  ctx.globalAlpha=.14;
  ctx.fillStyle='rgba(255,255,255,1)';
  for(let i=0;i<16;i++){
    let frac=((i/16)+t*.45)%1;
    let sy=topY+(botY-topY)*frac;
    ctx.fillRect(bx-hw,sy,hw*2,3);
  }
  ctx.restore();

  // Left & right bright edge strips
  ctx.save();
  [bx-hw+2, bx+hw-4].forEach(ex=>{
    let eg=ctx.createLinearGradient(ex,topY,ex,botY);
    eg.addColorStop(0,'rgba(200,255,200,.6)');
    eg.addColorStop(.5,'rgba(80,255,100,.35)');
    eg.addColorStop(1,'rgba(200,255,200,.6)');
    ctx.fillStyle=eg;
    ctx.fillRect(ex,topY,3,botY-topY);
  });
  ctx.restore();

  // Top ellipse cap (oval mouth at UFO bottom)
  ctx.save();
  let topG=ctx.createRadialGradient(bx,topY,0,bx,topY,hw);
  topG.addColorStop(0,'rgba(220,255,230,.95)');
  topG.addColorStop(.5,'rgba(80,255,120,.60)');
  topG.addColorStop(1,'rgba(0,200,60,0)');
  ctx.fillStyle=topG;
  ctx.beginPath(); ctx.ellipse(bx,topY,hw,hw*.32,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Bottom ellipse cap (glowing floor circle)
  ctx.save();
  let botG=ctx.createRadialGradient(bx,botY,0,bx,botY,hw*1.5);
  botG.addColorStop(0,'rgba(160,255,180,.72)');
  botG.addColorStop(.45,'rgba(60,210,100,.42)');
  botG.addColorStop(1,'rgba(0,160,50,0)');
  ctx.fillStyle=botG;
  ctx.beginPath(); ctx.ellipse(bx,botY,hw*1.5,hw*.42,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Pulse ring at beam origin
  let pr=4+6*Math.sin(gt*.015);
  ctx.save();
  ctx.globalAlpha=.4+.3*Math.sin(gt*.015);
  let prg=ctx.createRadialGradient(bx,topY+2,0,bx,topY+2,hw+pr);
  prg.addColorStop(0,'rgba(180,255,200,.0)');
  prg.addColorStop(.8,'rgba(80,255,120,.5)');
  prg.addColorStop(1,'rgba(0,220,60,0)');
  ctx.fillStyle=prg;
  ctx.beginPath(); ctx.ellipse(bx,topY+2,hw+pr,(hw+pr)*.3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ─── Police / Military ───────────────────────────────────────────
function drawPolice(p){
  ctx.save();
  ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  if(p.dir<0){ctx.scale(-1,1); ctx.fillText('🚓',-p.x,p.y);}
  else ctx.fillText('🚓',p.x,p.y);
  // Siren
  ctx.globalAlpha=.5;
  ctx.fillStyle=Math.sin(gt*.025)>0?'#ff1100':'#0022ff';
  ctx.beginPath(); ctx.arc(p.x,p.y-32,8,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawMilitary(m){
  ctx.save();
  ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(m.vx<0){ctx.scale(-1,1); ctx.fillText('🚁',-m.x,m.y);}
  else ctx.fillText('🚁',m.x,m.y);
  ctx.restore();
}

// ─── Particles & Float messages ───────────────────────────────────
function drawParticles(){
  for(let p of particles){
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawFloatMsgs(){
  for(let m of floatMsgs){
    ctx.save();
    ctx.globalAlpha=m.life;
    ctx.font=`900 italic ${m.sz}px "Arial Black",Arial,sans-serif`;
    ctx.textAlign='center';
    // Comic outline
    ctx.strokeStyle='rgba(0,0,0,.8)'; ctx.lineWidth=4;
    ctx.strokeText(m.txt,m.x,m.y);
    ctx.fillStyle=m.col;
    ctx.fillText(m.txt,m.x,m.y);
    ctx.restore();
  }
}

// ─── Particle helpers ────────────────────────────────────────────
function spawnBeamParticles(x,y){
  for(let i=0;i<3;i++) particles.push({
    x:x+rnd(-BEAM_HW*.8,BEAM_HW*.8), y:y+rnd(-5,5),
    vx:rnd(-.4,.4), vy:rnd(-1.8,-.4),
    r:rnd(2,5), col:`hsl(${120+rnd(-15,15)},100%,${65+rnd(0,25)}%)`, life:1
  });
}
function spawnCaptureEffect(x,y){
  for(let i=0;i<35;i++){
    let a=rnd(0,Math.PI*2),s=rnd(2,7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(3,9),col:`hsl(${rnd(100,160)},100%,70%)`,life:1});
  }
}
function spawnDropEffect(x,y){
  for(let i=0;i<18;i++){
    let a=rnd(0,Math.PI*2);
    particles.push({x,y,vx:Math.cos(a)*rnd(1,4),vy:Math.sin(a)*rnd(1,4),r:rnd(2,5),col:`hsl(${rnd(0,40)},80%,60%)`,life:1});
  }
}
function spawnHitEffect(x,y){
  for(let i=0;i<14;i++) particles.push({x,y,vx:rnd(-3,3),vy:rnd(-3,3),r:rnd(2,7),col:`hsl(${rnd(0,30)},100%,60%)`,life:1});
}
function addFM(txt,x,y,col,sz=20){ floatMsgs.push({txt,x,y,vy:-1.4,col,sz,life:1}); }

// ─── Spawn ───────────────────────────────────────────────────────
function spawnObject(){
  let tp=OBJ_TYPES[Math.floor(Math.random()*OBJ_TYPES.length)];
  let fl=Math.random()<.5;
  let vArr=VARIANTS[tp.type]||[];
  let vIdx=vArr.length?pickVariantIdx(vArr):0;
  let vd=vArr[vIdx]||{};
  objects.push({
    ...tp,
    x: fl?-tp.w:W+tp.w, dir:fl?1:-1,
    y: GROUND_Y-tp.h/2+2,
    vx: (fl?1:-1)*tp.speed*(rnd(.7,1.3)),
    alertState:null, alertTimer:0, reportCD:0,
    shake:false, captured:false,
    ascending:false, ascX:0, ascY:0,
    pauseTimer:0, nextPause:rnd(3000,10000),
    variantIdx: vIdx,
    score: vd.score || tp.score,
  });
}
function spawnPolice(){
  let fl=Math.random()<.5;
  police.push({x:fl?-60:W+60,y:GROUND_Y+2,dir:fl?1:-1,speed:2.6,shootTmr:2000,type:'police'});
}
function spawnMilitary(){
  military.push({
    x:Math.random()<.5?-70:W+70, y:rnd(H*.08,H*.42),
    vx:(Math.random()<.5?1:-1)*1.9, vy:rnd(-.4,.4),
    shootTmr:rnd(60,120), type:'heli'
  });
}

// ─── Upgrade UI ──────────────────────────────────────────────────
function renderUpgrades(){
  let el=document.getElementById('ulist'); el.innerHTML='';
  UPGRADES.forEach(up=>{
    let lv=upLvs[up.id], cost=up.cost*(lv+1), maxed=lv>=up.maxLv, afford=score>=cost;
    let d=document.createElement('div'); d.className='ui';
    d.innerHTML=`<div style="flex:1"><div class="un">${up.icon} ${up.name} <span style="color:#888;font-size:10px">Lv${lv}/${up.maxLv}</span></div><div class="ud">${up.desc}</div></div>
    <button class="ub${maxed?' mx':''}" ${maxed||!afford?'disabled':''} data-id="${up.id}" data-cost="${cost}">${maxed?'MAX':'💰'+cost}</button>`;
    el.appendChild(d);
  });
  el.querySelectorAll('.ub:not(:disabled):not(.mx)').forEach(b=>{
    b.onclick=()=>{
      let id=b.dataset.id, cost=+b.dataset.cost;
      let up=UPGRADES.find(u=>u.id===id);
      if(score>=cost && upLvs[id]<up.maxLv){
        score-=cost; upLvs[id]++;
        if(id==='shield') ufoHP=Math.min(ufoHP+30, UFO_MAX_HP+30*upLvs.shield);
        addFM('⚡ 強化！',W/2,H/2-40,'#ffee44',24);
        renderUpgrades(); updateHUD();
      }
    };
  });
}

// ─── HUD ─────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('sd').textContent=score.toLocaleString();
  document.getElementById('cc').textContent=captures;
  let mhp=UFO_MAX_HP+30*upLvs.shield;
  document.getElementById('hpf').style.width=(ufoHP/mhp*100)+'%';
  document.getElementById('alf').style.width=(alertLv/ALERT_MAX*100)+'%';
  let at=alertLv<20?'平和':alertLv<50?'警戒':alertLv<80?'危険':'緊急';
  document.getElementById('alt').textContent=at;
}

// ─── Upgrade value getters ────────────────────────────────────────
const beamSpeed   =()=>8*(1+upLvs.beam*.25);
const moveSpeed   =()=>1*(1+upLvs.engine*.2);
const detectRange =()=>180*(1-upLvs.stealth*.25);
const struggleRes =()=>upLvs.gravity*.3;

// ─── Game Logic ───────────────────────────────────────────────────
function updateUFO(dt){
  let spd=moveSpeed();
  let dx=mx-ufo.x, dy=my-ufo.y;
  ufo.vx+=(dx*.006*spd); ufo.vy+=(dy*.006*spd);
  ufo.vx*=.88; ufo.vy*=.88;
  ufo.x+=ufo.vx*(dt/16); ufo.y+=ufo.vy*(dt/16);
  ufo.x=clamp(ufo.x,44,W-44); ufo.y=clamp(ufo.y,30,GROUND_Y-44);
  ufo.ft+=dt*.002;
}

function updateObjects(dt){
  for(let obj of objects){
    if(obj.captured||obj.ascending) continue;
    obj.nextPause-=dt;
    if(obj.nextPause<=0){
      if(obj.pauseTimer<=0){ obj.pauseTimer=rnd(1000,2500); obj.nextPause=rnd(4000,11000); }
    }
    if(obj.pauseTimer>0) obj.pauseTimer-=dt;
    else obj.x+=obj.vx*(dt/16);
    if(obj.x>W+120||obj.x<-120){ obj.dir*=-1; obj.vx*=-1; }

    // Alert / report
    let d=dist(obj,ufo);
    let dr=detectRange();
    if(obj.reports && beamOn && d<dr){
      obj.reportCD-=dt;
      if(!obj.alertState){ obj.alertState='watching'; obj.alertTimer=3200; }
      if(obj.alertState==='watching'){ obj.alertTimer-=dt; if(obj.alertTimer<=0){obj.alertState='reporting';obj.alertTimer=2000;} }
      if(obj.alertState==='reporting' && obj.reportCD<=0){
        obj.reportCD=5500;
        alertLv=Math.min(ALERT_MAX,alertLv+14);
        addFM('📱 通報！',obj.x,obj.y-obj.h-30,'#ff4400',16);
        alertDecay=9000;
      }
      if(obj.alertState && d<dr*.55) obj.x-=obj.dir*(obj.speed+1)*(dt/16)*.5;
    } else if(obj.alertState && d>dr*1.3){ obj.alertState=null; }
  }
}

function updateAscending(dt){
  for(let obj of objects){
    if(!obj.ascending) continue;
    obj.ascY-=60*(dt/16)*.25;
    obj.ascX=lerp(obj.ascX,ufo.x,.06);
    if(obj.ascY<=ufo.y+12){
      obj.ascending=false; obj.captured=true;
      captures++; score+=obj.score;
      spawnCaptureEffect(ufo.x,ufo.y);
      addFM('+'+obj.score+'pt!',ufo.x,ufo.y-50,'#7ff0ff',22);
      addToCollection(obj);
      updateHUD();
    }
  }
  objects=objects.filter(o=>!o.captured||o.ascending);
}

function findBeamTarget(){
  let fy=Math.sin(ufo.ft)*5, topY=ufo.y+fy+15, botY=GROUND_Y+22;
  let best=null, bestD=Infinity;
  for(let obj of objects){
    if(obj.captured||obj.ascending) continue;
    let dx=Math.abs(obj.x-ufo.x);
    if(dx<=BEAM_HW+obj.w*.45 && obj.y>=ufo.y && obj.y<=botY+10){
      if(dx<bestD){ bestD=dx; best=obj; }
    }
  }
  return best;
}

function updateBeam(dt){
  if(!beamOn||!beamTarget) return;
  let obj=beamTarget;
  if(obj.captured||obj.ascending){ beamOn=false; beamTarget=null; return; }
  if(Math.abs(obj.x-ufo.x)>BEAM_HW+obj.w*.5){ beamOn=false; beamTarget=null; return; }

  let wf=70/obj.weight;
  abductProg+=beamSpeed()*wf*(dt/16);
  spawnBeamParticles(obj.x,obj.y-obj.h/2);

  struggleTmr-=dt;
  if(struggleTmr<=0){
    struggleTmr=rnd(1600,4000);
    let res=1-struggleRes();
    if(Math.random()<obj.struggle*res){
      obj.shake=true; shakeTmr=900;
      let penalty=rnd(18,32);
      abductProg-=penalty;
      addFM('暴れた！',obj.x,obj.y-obj.h-20,'#ff8800',17);
      if(abductProg<0){
        abductProg=0; beamOn=false; beamTarget=null;
        spawnDropEffect(obj.x,obj.y);
        addFM('落とした！',obj.x,obj.y-obj.h-25,'#ff3300',20);
        return;
      }
    }
  }
  if(shakeTmr>0){ shakeTmr-=dt; obj.shake=shakeTmr>0; } else obj.shake=false;

  if(abductProg>=100){
    obj.ascending=true; obj.ascX=obj.x; obj.ascY=obj.y;
    beamOn=false; beamTarget=null; abductProg=0;
  }
}

function updatePolice(dt){
  for(let p of police){
    let dx=ufo.x-p.x; p.dir=dx>0?1:-1;
    p.x+=p.dir*p.speed*(dt/16);
    p.shootTmr-=dt;
    if(p.shootTmr<=0 && dist(p,ufo)<220){
      p.shootTmr=2200; ufoHP-=5;
      spawnHitEffect(ufo.x,ufo.y);
      addFM('被弾！',ufo.x,ufo.y-55,'#ff2200',19);
      updateHUD();
    }
  }
  police=police.filter(p=>p.x>-120&&p.x<W+120);
}

function updateMilitary(dt){
  for(let m of military){
    let dx=ufo.x-m.x, dy=ufo.y-m.y, dn=Math.hypot(dx,dy)||1;
    let spd=Math.abs(m.vx); // use vx as speed
    m.x+=dx/dn*spd*(dt/16);
    m.y+=dy/dn*spd*(dt/16);
    m.x=clamp(m.x,-80,W+80);
    m.y=clamp(m.y,20,H-80);
    m.shootTmr-=dt;
    if(m.shootTmr<=0 && dist(m,ufo)<180){
      m.shootTmr=1600; ufoHP-=10;
      spawnHitEffect(ufo.x,ufo.y);
      addFM('ミサイル！',ufo.x,ufo.y-65,'#ff0000',22);
      updateHUD();
    }
  }
}

function updateAlerts(dt){
  if(alertDecay>0) alertDecay-=dt;
  else alertLv=Math.max(0,alertLv-2.5*(dt/1000));
  policeTmr-=dt;
  if(alertLv>=28&&policeTmr<=0){ policeTmr=13000; spawnPolice(); addFM('🚓 警察出動！',W/2,H*.4,'#ff8800',26); }
  if(alertLv>=68&&!militaryOn){ militaryOn=true; spawnMilitary(); addFM('🚁 軍隊出動！',W/2,H*.38,'#ff2200',30); }
  if(alertLv>=92&&Math.random()<.0008) spawnMilitary();
}

function updateParticles(dt){
  particles.forEach(p=>{ p.x+=p.vx*(dt/16); p.y+=p.vy*(dt/16); p.vy+=.06*(dt/16); p.life-=.018*(dt/16); });
  particles=particles.filter(p=>p.life>0);
}

function updateFMs(dt){
  floatMsgs.forEach(m=>{ m.y+=m.vy*(dt/16); m.life-=.016*(dt/16); });
  floatMsgs=floatMsgs.filter(m=>m.life>0);
}

function checkGameOver(){
  let mhp=UFO_MAX_HP+30*upLvs.shield;
  if(ufoHP<=0){ ufoHP=0; updateHUD(); doGameOver(); }
}

// ─── Game flow ────────────────────────────────────────────────────
function startGame(){
  state='playing'; score=0; captures=0; ufoHP=UFO_MAX_HP; alertLv=0;
  alertDecay=0; spawnTmr=0; policeTmr=0; militaryOn=false;
  upLvs={beam:0,engine:0,stealth:0,shield:0,gravity:0};
  ufo={x:W/2,y:H*.25,vx:0,vy:0,ft:0};
  objects=[]; police=[]; military=[]; particles=[]; floatMsgs=[];
  beamOn=false; beamTarget=null; abductProg=0;
  document.getElementById('ov').style.display='none';
  updateHUD();
  for(let i=0;i<9;i++) spawnObject();
}

function doGameOver(){
  state='gameover';
  let ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <div style="font-size:70px;margin-bottom:6px">💥</div>
    <h1 style="color:#ff4444;text-shadow:0 0 30px #ff0000,0 0 60px #880000">GAME OVER</h1>
    <div class="sub">UFOが撃墜されました...<br>
    最終スコア: <span style="color:#7ff0ff;font-size:26px;font-weight:900">${score.toLocaleString()}</span> pt<br>
    捕獲数: <span style="color:#ffdd55">${captures}</span> 体</div>
    <button class="btn" id="rb">🔄 もう一度</button>`;
  document.getElementById('rb').onclick=startGame;
}

// ─── Beam range indicator ────────────────────────────────────────
function drawBeamRangeIndicator(){
  if(state!=='playing') return;
  let fy=Math.sin(ufo.ft)*5;
  // Show beam footprint on ground
  let pulse=.15+.08*Math.sin(gt*.01);
  let g=ctx.createRadialGradient(ufo.x,GROUND_Y+20,2,ufo.x,GROUND_Y+20,BEAM_HW+20);
  g.addColorStop(0,`rgba(80,255,100,${pulse})`);
  g.addColorStop(.6,`rgba(40,200,70,${pulse*.5})`);
  g.addColorStop(1,'rgba(0,180,50,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(ufo.x,GROUND_Y+20,BEAM_HW+20,(BEAM_HW+20)*.28,0,0,Math.PI*2); ctx.fill();
  // Dashed oval
  ctx.save();
  ctx.strokeStyle=`rgba(80,255,100,${.25+.15*Math.sin(gt*.012)})`;
  ctx.lineWidth=1.5; ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.ellipse(ufo.x,GROUND_Y+20,BEAM_HW,(BEAM_HW)*.28,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ─── Main Loop ────────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  let dt=Math.min(ts-lastT,50); lastT=ts;
  gt=ts;
  ctx.clearRect(0,0,W,H);
  drawBackground();

  if(state==='playing'){
    spawnTmr-=dt;
    if(spawnTmr<=0){ spawnTmr=Math.max(2200-score*.4,900); if(objects.length<22) spawnObject(); }
    updateUFO(dt);
    updateObjects(dt);
    updateBeam(dt);
    updateAscending(dt);
    updatePolice(dt);
    updateMilitary(dt);
    updateAlerts(dt);
    updateParticles(dt);
    updateFMs(dt);
    checkGameOver();
    updateHUD();
  } else {
    // Animate stars still
    updateParticles(dt); updateFMs(dt);
  }

  // Draw order: ground objects → beam → ascending → UFO → police/military → particles → UI
  for(let obj of objects) drawEntitySprite(obj);

  if(beamOn){
    drawVerticalBeam(ufo.x, ufo.y, ufo.ft);
  }
  drawBeamRangeIndicator();

  for(let obj of objects) drawEntityAscending(obj);

  drawUFO(ufo.x, ufo.y, ufo.ft);

  for(let p of police) drawPolice(p);
  for(let m of military) drawMilitary(m);

  drawParticles();
  drawFloatMsgs();

  // Vignette
  let vg=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,W*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,16,.42)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove',e=>{
  let r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top;
});

function toggleBeam(){
  if(state!=='playing') return;
  if(!beamOn){
    let t=findBeamTarget();
    if(t){ beamOn=true; beamTarget=t; abductProg=0; struggleTmr=rnd(2000,4000); }
    else{  // fire beam even without target
      beamOn=true; beamTarget=null;
    }
  } else { beamOn=false; beamTarget=null; }
}

canvas.addEventListener('mousedown',e=>{ if(e.button===0) toggleBeam(); });
canvas.addEventListener('mouseup',e=>{}); // beam stays until toggled off or missed

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault(); toggleBeam(); }
  if(e.code==='KeyU'){
    upOpen=!upOpen;
    let p=document.getElementById('upanel');
    if(upOpen){ renderUpgrades(); p.style.display='block'; }
    else p.style.display='none';
  }
  // Keyboard movement fallback
  let s=18;
  if(e.code==='ArrowLeft') mx=Math.max(44,mx-s);
  if(e.code==='ArrowRight') mx=Math.min(W-44,mx+s);
  if(e.code==='ArrowUp') my=Math.max(30,my-s);
  if(e.code==='ArrowDown') my=Math.min(GROUND_Y-44,my+s);
});

// ─── COLLECTION ───────────────────────────────────────────────────────────────
var collection=[];
var totalVariants=0; // computed after VARIANTS is set

function pickVariantIdx(arr){
  let pool=[];
  arr.forEach((v,i)=>{ let w=RARITY_WEIGHTS[v.rarity]||20; for(let k=0;k<w;k++) pool.push(i); });
  return pool[Math.floor(Math.random()*pool.length)];
}

function addToCollection(obj){
  let vArr=VARIANTS[obj.type]||[]; if(!vArr.length) return;
  let key=obj.type+'_'+obj.variantIdx;
  let entry=collection.find(e=>e.key===key);
  let isNew=!entry;
  if(!entry){ entry={key,type:obj.type,variantIdx:obj.variantIdx,count:0}; collection.push(entry); }
  entry.count++;
  showNewCardToast(obj,vArr[obj.variantIdx],isNew);
  updateZukanBadge();
}

function updateZukanBadge(){
  document.getElementById('zbadge').textContent=collection.length;
}

function showNewCardToast(obj, vd, isNew){
  if(!vd) return;
  let rc=RARITY_COLORS[vd.rarity];
  let toast=document.getElementById('nc-toast');
  let div=document.createElement('div');
  div.className='nc-pop';
  div.style.cssText+=`;border-top:2px solid ${rc.border};box-shadow:0 0 16px ${rc.border}66`;
  div.innerHTML=`<div class="nc-new">${isNew?'✨ NEW CARD ✨':'↺ 複数所持'}</div>
    <div class="nc-name" style="color:${rc.text}">${vd.name}</div>
    <div style="font-size:9px;color:rgba(255,255,255,.45);margin-top:2px">${rc.label} ${'\u2605'.repeat(rc.stars)}</div>`;
  toast.appendChild(div);
  setTimeout(()=>div.remove(),3100);
}

function renderZukanGrid(){
  let grid=document.getElementById('zgrid'); grid.innerHTML='';
  document.getElementById('zcounter').textContent=`${collection.length} / ${totalVariants} 種類捕獲`;
  if(!collection.length){
    grid.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:14px;padding:40px;text-align:center;width:100%">まだ何も捕獲していません...<br>UFOで地上の生き物を吸い上げよう！</div>';
    return;
  }
  let rarOrd={legendary:0,epic:1,rare:2,uncommon:3,common:4};
  let sorted=[...collection].sort((a,b)=>{
    let va=VARIANTS[a.type][a.variantIdx],vb=VARIANTS[b.type][b.variantIdx];
    return rarOrd[va.rarity]-rarOrd[vb.rarity]||va.name.localeCompare(vb.name);
  });
  sorted.forEach(entry=>{
    let vd=VARIANTS[entry.type][entry.variantIdx];
    let rc=RARITY_COLORS[vd.rarity];
    let card=document.createElement('div');
    card.className='zcard';
    card.innerHTML=`<div class="zcard-inner rc-${vd.rarity}">
      <canvas class="pc" width="150" height="128"></canvas>
      <div class="zcard-bot">
        <div><div class="zcard-name">${vd.name}</div>
        <div class="zcard-type">${vd.typeLabel} &middot; <span style="color:${rc.text}">${rc.label}</span></div></div>
        <div class="zcard-stats">
          <span class="zcard-stat stat-w">${vd.weight}kg</span>
          <span class="zcard-stat stat-s">${vd.score}pt</span>
          <span style="font-size:9px;color:${rc.text};margin-left:auto">${'\u2605'.repeat(rc.stars)}</span>
        </div>
        <div class="zcard-count">&times;${entry.count}捕獲</div>
      </div></div>`;
    card.onclick=()=>showCardDetail(entry);
    grid.appendChild(card);
    drawCardPortrait(card.querySelector('.pc'),entry.type,entry.variantIdx,vd);
  });
}

function drawCardPortrait(pc,type,variantIdx,vd){
  let tc=pc.getContext('2d'),pw=pc.width,ph=pc.height;
  tc.clearRect(0,0,pw,ph);
  let rc=RARITY_COLORS[vd.rarity];
  let bg=tc.createLinearGradient(0,0,0,ph);
  bg.addColorStop(0,rc.bg); bg.addColorStop(1,'#050510');
  tc.fillStyle=bg; tc.fillRect(0,0,pw,ph);
  // Grid lines
  tc.strokeStyle='rgba(255,255,255,.04)'; tc.lineWidth=1;
  for(let gx=0;gx<pw;gx+=20){tc.beginPath();tc.moveTo(gx,0);tc.lineTo(gx,ph);tc.stroke();}
  for(let gy=0;gy<ph;gy+=20){tc.beginPath();tc.moveTo(0,gy);tc.lineTo(pw,gy);tc.stroke();}
  // Rarity glow at bottom
  let gl=tc.createLinearGradient(0,ph-20,0,ph);
  gl.addColorStop(0,rc.border+'00'); gl.addColorStop(1,rc.border+'44');
  tc.fillStyle=gl; tc.fillRect(0,ph-20,pw,20);
  // Swap ctx to draw sprite
  let savedCtx=ctx; ctx=tc;
  let sc=type==='truck'?.75:type==='car'?.8:type==='cow'?.8:1.0;
  tc.save(); tc.translate(pw/2,ph*.9); tc.scale(sc,sc);
  try{
    switch(type){
      case 'human':   drawHuman(0,0,1,null,false);break;
      case 'cow':     drawCow(0,0,1,false);break;
      case 'car':     drawCar(0,0,1,false);break;
      case 'pig':     drawPig(0,0,1,false);break;
      case 'chicken': drawChicken(0,0,1,false);break;
      case 'truck':   drawTruck(0,0,1,false);break;
      case 'sheep':   drawSheep(0,0,1,false);break;
      case 'dog':     drawDog(0,0,1,false);break;
    }
  }catch(e){}
  tc.restore(); ctx=savedCtx;
}

function showCardDetail(entry){
  let vd=VARIANTS[entry.type][entry.variantIdx];
  let rc=RARITY_COLORS[vd.rarity];
  let card=document.getElementById('cdcard');
  card.style.border=`2px solid ${rc.border}`;
  card.style.boxShadow=`0 0 40px ${rc.border}55,0 0 80px ${rc.border}22`;
  document.getElementById('cdcard-title').textContent=vd.name;
  document.getElementById('cdcard-title').style.color=rc.text;
  document.getElementById('cdcard-sub').textContent=`${vd.typeLabel} \u30fb ${rc.label} \u2605${rc.stars} \u30fb x${entry.count}捕獲`;
  let statsEl=document.getElementById('cdcard-stats');
  let threat=Math.min(vd.threat||0,5);
  statsEl.innerHTML=[
    {l:'体重',v:vd.weight+'kg',c:'#4488cc'},
    {l:'得点',v:vd.score+'pt',c:'#44aa66'},
    {l:'危険度',v:threat?'\u2605'.repeat(threat):'\u2606\u2606',c:'#cc4444'},
    {l:'希少度',v:rc.label,c:rc.border},
  ].map(s=>`<span class="cd-tag" style="background:${s.c}22;border:1px solid ${s.c}55;color:${s.c}">${s.l}: ${s.v}</span>`).join('');
  document.getElementById('cdcard-desc').textContent=vd.desc;
  let bigC=document.getElementById('cdcanvas');
  drawCardPortrait(bigC,entry.type,entry.variantIdx,vd);
  document.getElementById('cdov').style.display='flex';
}

    // Dome
    let dg=tcx.createRadialGradient(-4,-14,2,0,-8,22);
    dg.addColorStop(0,'rgba(160,240,255,.9)'); dg.addColorStop(1,'rgba(30,80,200,.3)');
    tcx.fillStyle=dg; tcx.beginPath(); tcx.ellipse(0,-7,17,12,0,Math.PI,0); tcx.fill();
    // Body
    let bg=tcx.createLinearGradient(0,-8,0,8);
    bg.addColorStop(0,'#3c4268'); bg.addColorStop(1,'#1c2248');
    tcx.fillStyle=bg; tcx.beginPath(); tcx.ellipse(0,0,30,7,0,0,Math.PI*2); tcx.fill();
    // Lights
    for(let i=0;i<8;i++){
      let a=(i/8)*Math.PI*2+tft*2, lx=Math.cos(a)*23,ly=4+Math.sin(a)*4;
      let p=.5+.5*Math.sin(tft*4+i);
      tcx.globalAlpha=p;
      let lg=tcx.createRadialGradient(lx,ly,0,lx,ly,4);
      lg.addColorStop(0,'rgba(180,255,255,1)'); lg.addColorStop(1,'rgba(60,160,255,0)');
      tcx.fillStyle=lg; tcx.beginPath(); tcx.arc(lx,ly,4,0,Math.PI*2); tcx.fill();
    }
    tcx.globalAlpha=1;
    // Beam hint
    let bh=tcx.createLinearGradient(0,7,0,90);
    bh.addColorStop(0,'rgba(80,255,100,.7)'); bh.addColorStop(1,'rgba(40,200,70,0)');
    tcx.fillStyle=bh; tcx.fillRect(-12,7,24,60);
    tcx.restore();
    requestAnimationFrame(ta);
  }
  ta();
})();

// ─── Init ──────────────────────────────────────────────────────────
initStars();
totalVariants=Object.values(VARIANTS).reduce((a,v)=>a+v.length,0);
mx=W/2; my=H*.25;
requestAnimationFrame(loop);
</script>
