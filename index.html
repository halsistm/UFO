<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFO Abductor - OPEN WORLD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden; background: #000; font-family: 'Courier New', monospace;
            user-select: none; -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-board {
            position: absolute; top: 20px; left: 20px;
            color: #00ff88; font-size: 20px; font-weight: bold;
            text-shadow: 0 0 12px #00ff88;
            letter-spacing: 2px;
        }
        #multiplier { font-size: 12px; color: #88ffcc; margin-top: 4px; opacity: 0.8; }
        #biome-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #aaffdd; font-size: 13px; letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffaa;
            background: rgba(0,0,0,0.4); padding: 5px 16px; border-radius: 20px;
            border: 1px solid #00ff8844;
        }
        #hp-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            margin-top: 50px;
            color: #ff4444; font-size: 11px; letter-spacing: 2px;
            text-align: center;
        }
        #hp-bar-bg {
            width: 140px; height: 8px; background: #1a0000;
            border: 1px solid #ff4444; border-radius: 4px; margin-top: 3px;
        }
        #hp-fill {
            height: 100%; background: linear-gradient(90deg,#ff2200,#ff6600);
            border-radius: 4px; transition: width 0.3s;
        }
        #apache-warning {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #ff2200; font-size: 28px; font-weight: bold;
            text-shadow: 0 0 20px #ff4400;
            pointer-events: none; opacity: 0;
            letter-spacing: 3px;
        }
        #controls {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; gap: 16px; pointer-events: auto;
        }
        .btn {
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, rgba(0,255,136,0.05) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            color: #00ff88; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 11px; letter-spacing: 1px;
            cursor: pointer; text-shadow: 0 0 8px #00ff88;
            box-shadow: 0 0 15px #00ff8833;
            transition: all 0.1s; user-select: none;
        }
        .btn:active { background: radial-gradient(circle, rgba(0,255,136,0.4) 0%, rgba(0,255,136,0.1) 100%); }
        #attack-btn {
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(255,60,0,0.2) 0%, rgba(255,60,0,0.05) 100%);
            border: 2px solid #ff3300; border-radius: 50%;
            color: #ff5500; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; letter-spacing: 1px;
            cursor: pointer; text-shadow: 0 0 8px #ff3300;
            box-shadow: 0 0 15px #ff330033;
            transition: all 0.1s; user-select: none; pointer-events: auto;
        }
        #attack-btn:active { background: radial-gradient(circle, rgba(255,60,0,0.5) 0%, rgba(255,60,0,0.15) 100%); }
        #modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.92);
            z-index: 1000; overflow-y: auto; color: #fff;
            backdrop-filter: blur(4px);
        }
        #notification {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88; font-size: 36px; font-weight: bold;
            text-shadow: 0 0 20px #00ff88;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; letter-spacing: 2px;
        }
        #controls-hint {
            position: absolute; bottom: 130px; left: 20px;
            color: #00ff8855; font-size: 11px; letter-spacing: 1px; line-height: 1.8;
        }
        #virtual-stick-container {
            display: none; position: absolute; bottom: 30px; left: 20px; pointer-events: auto;
        }
        #stick-base {
            width: 110px; height: 110px;
            background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, rgba(0,255,136,0.02) 100%);
            border: 2px solid rgba(0,255,136,0.35); border-radius: 50%;
            position: relative; touch-action: none;
        }
        #stick-knob {
            width: 46px; height: 46px;
            background: radial-gradient(circle, rgba(0,255,136,0.55) 0%, rgba(0,255,136,0.25) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #00ff8866; pointer-events: none;
        }
        #speed-indicator {
            position: absolute; top: 20px; right: 20px;
            color: #ff8800; font-size: 11px; letter-spacing: 2px;
            text-shadow: 0 0 8px #ff8800;
            opacity: 0; transition: opacity 0.2s;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="score-board">
        SCORE: <span id="score">0</span>
        <div id="multiplier">ABDUCTED: <span id="count">0</span></div>
    </div>
    <div id="biome-label">GRASSLAND</div>
    <div id="hp-bar-container">
        UFO HP
        <div id="hp-bar-bg"><div id="hp-fill" style="width:100%"></div></div>
    </div>
    <div id="speed-indicator">⚡ WARP SPEED</div>
    <div id="controls">
        <div class="btn" id="abduct-btn">ABDUCT</div>
        <div id="attack-btn">ATTACK</div>
    </div>
    <div id="controls-hint">WASD / 矢印: 移動<br>ABDUCT: 吸い込み<br>SPACE: 攻撃ビーム</div>
    <div id="virtual-stick-container">
        <div id="stick-base"><div id="stick-knob"></div></div>
    </div>
    <div id="notification">+100</div>
    <div id="apache-warning">⚠ APACHE INCOMING ⚠</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {

// ======================================================
// WORLD / CHUNK SYSTEM
// ======================================================
const CHUNK_SIZE = 64;
const CHUNK_RENDER_DIST = 3;
const BLOCK_SIZE = 8;
const BLOCKS_PER_CHUNK = CHUNK_SIZE / BLOCK_SIZE;

const BIOME = {
    OCEAN:0,BEACH:1,GRASSLAND:2,FARMLAND:3,FOREST:4,
    MOUNTAIN:5,SUBURB:6,URBAN:7,INDUSTRIAL:8,RIVER:9,
};
const BIOME_NAMES = {
    0:'OCEAN',1:'BEACH',2:'GRASSLAND',3:'FARMLAND',
    4:'FOREST',5:'MOUNTAIN',6:'SUBURB',7:'URBAN',8:'INDUSTRIAL',9:'RIVER'
};

function hash(n){n=Math.sin(n)*43758.5453123;return n-Math.floor(n);}
function noise2D(x,y){
    const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    const a=hash(ix+iy*57),b=hash(ix+1+iy*57),c=hash(ix+(iy+1)*57),d=hash(ix+1+(iy+1)*57);
    return a+(b-a)*ux+(c-a)*uy+(d-a)*ux*uy-0.5;
}
function fbm(x,y,oct=4){
    let v=0,amp=0.5,freq=1,max=0;
    for(let i=0;i<oct;i++){v+=noise2D(x*freq,y*freq)*amp;max+=amp;amp*=0.5;freq*=2;}
    return v/max;
}
function getBiome(wx,wz){
    const scale=0.008;
    const h=fbm(wx*scale,wz*scale)+0.5;
    const moisture=fbm(wx*scale+100,wz*scale+200)+0.5;
    const riverN=Math.abs(fbm(wx*0.005,wz*0.005+500));
    if(riverN<0.07)return BIOME.RIVER;
    if(h<0.28)return BIOME.OCEAN;
    if(h<0.33)return BIOME.BEACH;
    if(h>0.78)return BIOME.MOUNTAIN;
    const cityN=fbm(wx*0.015+300,wz*0.015+300)+0.5;
    if(cityN>0.72)return BIOME.URBAN;
    if(cityN>0.60)return BIOME.INDUSTRIAL;
    if(cityN>0.50)return BIOME.SUBURB;
    if(moisture>0.55)return BIOME.FOREST;
    if(moisture>0.40)return BIOME.GRASSLAND;
    return BIOME.FARMLAND;
}

const BIOME_COLORS = {
    [BIOME.OCEAN]:     [0x0a1e38,0x07142a],[BIOME.BEACH]:     [0x7a6535,0x6a5528],
    [BIOME.GRASSLAND]: [0x162e0a,0x1c3e0c],[BIOME.FARMLAND]:  [0x4a3808,0x563e0e],
    [BIOME.FOREST]:    [0x0a1e06,0x071504],[BIOME.MOUNTAIN]:  [0x3a3a3a,0x484848],
    [BIOME.SUBURB]:    [0x1e1e16,0x181810],[BIOME.URBAN]:     [0x0e0e16,0x0a0a10],
    [BIOME.INDUSTRIAL]:[0x121208,0x0e0e06],[BIOME.RIVER]:     [0x081828,0x05101a],
};

// ======================================================
// THREE.JS SETUP
// ======================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);
scene.fog = new THREE.FogExp2(0x000814, 0.004);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.autoClear = false;
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,800);
camera.position.set(0,40,55);

const ambient = new THREE.AmbientLight(0x223355, 0.85);
scene.add(ambient);
const moonLight = new THREE.DirectionalLight(0x6677aa,0.4);
moonLight.position.set(-50,80,-30); moonLight.castShadow=false;
scene.add(moonLight);
const horizonLight = new THREE.DirectionalLight(0xff8833,0.08);
horizonLight.position.set(100,5,100); scene.add(horizonLight);

const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(3000*3);
for(let i=0;i<3000;i++){starPos[i*3]=(Math.random()-0.5)*1600;starPos[i*3+1]=Math.random()*500+30;starPos[i*3+2]=(Math.random()-0.5)*1600;}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.4,sizeAttenuation:true,transparent:true,opacity:0.85})));

// ======================================================
// CHUNK MANAGER
// ======================================================
const chunkCache = new Map();
const activeChunks = new Set();
const buildingColliders = new Map();
let buildingCollisionCooldown = 0;

const matCache = new Map();
function getMat(color,roughness=0.9,metalness=0.0){
    const key=`${color}_${roughness}_${metalness}`;
    if(!matCache.has(key))matCache.set(key,new THREE.MeshStandardMaterial({color,roughness,metalness}));
    return matCache.get(key);
}

const _sharedBlockGeo = new THREE.BoxGeometry(BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);
const _sharedWaterGeo = new THREE.PlaneGeometry(BLOCK_SIZE,BLOCK_SIZE);
const _sharedWaterMat = new THREE.MeshStandardMaterial({color:0x0e2e55,transparent:true,opacity:0.8,roughness:0.05,metalness:0.4});
const _instDummy = new THREE.Object3D();

const _treeTrunkGeo    = new THREE.CylinderGeometry(0.25,0.4,3,8);
const _deciduousLeafGeos=[new THREE.ConeGeometry(2.8,4,8),new THREE.ConeGeometry(2.2,3.5,8),new THREE.ConeGeometry(1.4,3,8)];
const _deciduousLeafYs =[3.5,5.5,7.5];
const _pineLeafGeos    =[new THREE.ConeGeometry(2.2,3,8),new THREE.ConeGeometry(1.7,3.3,8),new THREE.ConeGeometry(1.2,3.6,8)];
const _pineLeafYs      =[3,5,7];
const _bushGeo         = new THREE.SphereGeometry(1,8,6);

const _apacheHitColor  = new THREE.Color(0xff2200);
const _apacheBaseColor = new THREE.Color(0x000000);

function getChunkKey(cx,cz){return `${cx},${cz}`;}
function worldToChunk(wx,wz){return{cx:Math.floor(wx/CHUNK_SIZE),cz:Math.floor(wz/CHUNK_SIZE)};}

const _buildingTexCache = new Map();

function makeBuildingTexture(rows, cols, seed) {
    const cacheKey = `${rows}_${cols}_${seed}`;
    if (_buildingTexCache.has(cacheKey)) return _buildingTexCache.get(cacheKey);

    const TW = 128, TH = 256;
    const canvas = document.createElement('canvas');
    canvas.width = TW; canvas.height = TH;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, TW, TH);

    const winColors = ['#ffee88','#fff0aa','#88ccff','#ffdd66','#ff9944','#ffffff'];
    const cw = TW / cols, ch = TH / rows;

    let r = seed | 0;
    const rng = () => { r = (r * 9301 + 49297) % 233280; return r / 233280; };

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            if (rng() > 0.42) {
                ctx.fillStyle = winColors[Math.floor(rng() * winColors.length)];
                ctx.fillRect(col * cw + 2, row * ch + 2, cw - 4, ch - 4);
            }
        }
    }

    const tex = new THREE.CanvasTexture(canvas);
    _buildingTexCache.set(cacheKey, tex);
    return tex;
}

const roadMat = new THREE.MeshStandardMaterial({color:0x111115,roughness:0.95});
const sidewalkMat = new THREE.MeshStandardMaterial({color:0x1a1a20,roughness:0.9});
const laneMarkMat = new THREE.MeshBasicMaterial({color:0x555540});

function addRoads(group,biome){
    const roadW=biome===BIOME.URBAN?7:5;
    const halfCS=CHUNK_SIZE/2;
    const hRoad=new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE+2,roadW),roadMat);
    hRoad.rotation.x=-Math.PI/2; hRoad.position.set(halfCS,0.07,halfCS); group.add(hRoad);
    const vRoad=new THREE.Mesh(new THREE.PlaneGeometry(roadW,CHUNK_SIZE+2),roadMat);
    vRoad.rotation.x=-Math.PI/2; vRoad.position.set(halfCS,0.07,halfCS); group.add(vRoad);
    [-1,1].forEach(s=>{
        const sw=new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE+2,1.5),sidewalkMat);
        sw.rotation.x=-Math.PI/2; sw.position.set(halfCS,0.06,halfCS+s*(roadW/2+0.75)); group.add(sw);
    });
    const dashGeoH=new THREE.PlaneGeometry(4,0.25);
    const dashInstH=new THREE.InstancedMesh(dashGeoH,laneMarkMat,8);
    for(let i=0;i<8;i++){
        _instDummy.position.set(i*8+4,0.08,halfCS);_instDummy.rotation.set(-Math.PI/2,0,0);_instDummy.scale.setScalar(1);_instDummy.updateMatrix();
        dashInstH.setMatrixAt(i,_instDummy.matrix);
    }
    dashInstH.instanceMatrix.needsUpdate=true; group.add(dashInstH);
    const dashGeoV=new THREE.PlaneGeometry(0.25,4);
    const dashInstV=new THREE.InstancedMesh(dashGeoV,laneMarkMat,8);
    for(let i=0;i<8;i++){
        _instDummy.position.set(halfCS,0.08,i*8+4);_instDummy.rotation.set(-Math.PI/2,0,0);_instDummy.scale.setScalar(1);_instDummy.updateMatrix();
        dashInstV.setMatrixAt(i,_instDummy.matrix);
    }
    dashInstV.instanceMatrix.needsUpdate=true; group.add(dashInstV);
    const lampPostMat2=getMat(0x444450,0.6);
    const lampGlowMat2=new THREE.MeshBasicMaterial({color:0xffeedd});
    const lampPos=[halfCS*0.5,halfCS*1.5];
    lampPos.forEach(lx=>{
        [halfCS+roadW/2+1.8,halfCS-roadW/2-1.8].forEach(lz=>{
            const post=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,5,6),lampPostMat2);
            post.position.set(lx,2.5,lz); group.add(post);
            const globe=new THREE.Mesh(new THREE.SphereGeometry(0.35,6,5),lampGlowMat2);
            globe.position.set(lx,5.2,lz); group.add(globe);
        });
    });
}

function buildChunk(cx,cz){
    const key=getChunkKey(cx,cz);
    if(chunkCache.has(key))return chunkCache.get(key);

    const group=new THREE.Group();
    group.position.set(cx*CHUNK_SIZE,0,cz*CHUNK_SIZE);

    const blockInstances=new Map();
    const waterPositions=[];

    for(let bx=0;bx<BLOCKS_PER_CHUNK;bx++){
        for(let bz=0;bz<BLOCKS_PER_CHUNK;bz++){
            const wx=cx*CHUNK_SIZE+bx*BLOCK_SIZE+BLOCK_SIZE/2;
            const wz=cz*CHUNK_SIZE+bz*BLOCK_SIZE+BLOCK_SIZE/2;
            const biome=getBiome(wx,wz);
            const colors=BIOME_COLORS[biome];
            const col=colors[(bx+bz)%2];
            const h=biome===BIOME.MOUNTAIN?(fbm(wx*0.05,wz*0.05)+0.5)*12:biome===BIOME.OCEAN?-4:biome===BIOME.RIVER?-1:0;
            if(!blockInstances.has(col))blockInstances.set(col,[]);
            blockInstances.get(col).push({x:bx*BLOCK_SIZE+BLOCK_SIZE/2,y:h-BLOCK_SIZE/2,z:bz*BLOCK_SIZE+BLOCK_SIZE/2});
            if(biome===BIOME.OCEAN||biome===BIOME.RIVER)
                waterPositions.push({x:bx*BLOCK_SIZE+BLOCK_SIZE/2,z:bz*BLOCK_SIZE+BLOCK_SIZE/2});
        }
    }

    for(const[col,positions]of blockInstances){
        const inst=new THREE.InstancedMesh(_sharedBlockGeo,getMat(col),positions.length);
        inst.receiveShadow=false;
        positions.forEach((p,i)=>{
            _instDummy.position.set(p.x,p.y,p.z);_instDummy.rotation.set(0,0,0);_instDummy.scale.setScalar(1);_instDummy.updateMatrix();
            inst.setMatrixAt(i,_instDummy.matrix);
        });
        inst.instanceMatrix.needsUpdate=true; group.add(inst);
    }

    if(waterPositions.length>0){
        const waterInst=new THREE.InstancedMesh(_sharedWaterGeo,_sharedWaterMat,waterPositions.length);
        waterPositions.forEach((p,i)=>{
            _instDummy.position.set(p.x,0.1,p.z);_instDummy.rotation.set(-Math.PI/2,0,0);_instDummy.scale.setScalar(1);_instDummy.updateMatrix();
            waterInst.setMatrixAt(i,_instDummy.matrix);
        });
        waterInst.instanceMatrix.needsUpdate=true; group.add(waterInst);
    }

    const centerBiome=getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2,cz*CHUNK_SIZE+CHUNK_SIZE/2);
    if(centerBiome===BIOME.URBAN||centerBiome===BIOME.SUBURB||centerBiome===BIOME.INDUSTRIAL)
        addRoads(group,centerBiome);

    spawnBiomeObjects(group,cx,cz);

    if(centerBiome===BIOME.URBAN||centerBiome===BIOME.SUBURB){
        const glowPlane=new THREE.Mesh(
            new THREE.PlaneGeometry(CHUNK_SIZE*0.6,CHUNK_SIZE*0.6),
            new THREE.MeshBasicMaterial({color:0x553311,transparent:true,opacity:0.08,depthWrite:false,side:THREE.DoubleSide})
        );
        glowPlane.rotation.x=-Math.PI/2;
        glowPlane.position.set(CHUNK_SIZE/2,0.15,CHUNK_SIZE/2);
        group.add(glowPlane);
    }

    scene.add(group);
    chunkCache.set(key,group);

    const colliders=[];
    group.children.forEach(child=>{
        if(child.userData&&child.userData.isBuilding){
            colliders.push({
                wx:cx*CHUNK_SIZE+child.position.x,
                wz:cz*CHUNK_SIZE+child.position.z,
                w:child.userData.bw,d:child.userData.bd,h:child.userData.bh,
                mesh:child,parentGroup:group
            });
        }
    });
    if(colliders.length>0)buildingColliders.set(key,colliders);
    return group;
}

function spawnBiomeObjects(group,cx,cz){
    const rng=createRNG(cx*100+cz);
    const biome=getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2,cz*CHUNK_SIZE+CHUNK_SIZE/2);

    if(isFastMode){
        if(biome===BIOME.URBAN){
            const count=3+Math.floor(rng()*3);
            for(let i=0;i<count;i++){
                const lx=rng()*(CHUNK_SIZE-8)+4,lz=rng()*(CHUNK_SIZE-8)+4;
                const h=20+rng()*60,w=8+rng()*14,d=8+rng()*14;
                const colors=[0x1e2535,0x252535,0x181828,0x222230,0x1a2220];
                const bldg=makeBuilding(w,d,h,colors[Math.floor(rng()*colors.length)]);
                bldg.position.set(lx,0,lz);group.add(bldg);
            }
        }else if(biome===BIOME.SUBURB){
            const count=2+Math.floor(rng()*3);
            for(let i=0;i<count;i++){
                const lx=rng()*(CHUNK_SIZE-8)+4,lz=rng()*(CHUNK_SIZE-8)+4;
                const house=makeHouse(rng);
                house.position.set(lx,0,lz);house.rotation.y=Math.floor(rng()*4)*Math.PI/2;group.add(house);
            }
        }
        return;
    }

    const spawnCount={
        [BIOME.FOREST]:10,[BIOME.GRASSLAND]:5,[BIOME.FARMLAND]:4,[BIOME.MOUNTAIN]:4,
        [BIOME.SUBURB]:6,[BIOME.URBAN]:7,[BIOME.INDUSTRIAL]:5,[BIOME.BEACH]:2,
        [BIOME.OCEAN]:0,[BIOME.RIVER]:0,
    }[biome]||0;

    const deciduousBatch=[],pineBatch=[],bushBatch=[];
    for(let i=0;i<spawnCount;i++){
        const lx=rng()*(CHUNK_SIZE-8)+4;
        const lz=rng()*(CHUNK_SIZE-8)+4;
        placeDecoration(group,biome,lx,lz,rng,deciduousBatch,pineBatch,bushBatch);
    }
    _batchTrees(group,deciduousBatch,'deciduous');
    _batchTrees(group,pineBatch,'pine');
    _batchBushes(group,bushBatch);
}

function _batchTrees(group,batch,type){
    if(batch.length===0)return;
    const leafGeos=type==='pine'?_pineLeafGeos:_deciduousLeafGeos;
    const leafYs  =type==='pine'?_pineLeafYs:_deciduousLeafYs;
    const leafMat =type==='pine'?getMat(0x0d4015,0.8):null;
    const trunkInst=new THREE.InstancedMesh(_treeTrunkGeo,getMat(0x3d2b1a,0.9),batch.length);
    batch.forEach((t,i)=>{
        _instDummy.position.set(t.x,1.5*t.scale,t.z);_instDummy.rotation.set(0,t.rotY,0);_instDummy.scale.setScalar(t.scale);_instDummy.updateMatrix();
        trunkInst.setMatrixAt(i,_instDummy.matrix);
    });
    trunkInst.instanceMatrix.needsUpdate=true; group.add(trunkInst);
    const leafColors=[0x0d3d12,0x0a2e0d,0x144d18];
    leafGeos.forEach((geo,li)=>{
        const mat=type==='pine'?leafMat:getMat(leafColors[li],0.8);
        const leafInst=new THREE.InstancedMesh(geo,mat,batch.length);
        batch.forEach((t,i)=>{
            _instDummy.position.set(t.x,leafYs[li]*t.scale,t.z);_instDummy.rotation.set(0,t.rotY,0);_instDummy.scale.setScalar(t.scale);_instDummy.updateMatrix();
            leafInst.setMatrixAt(i,_instDummy.matrix);
        });
        leafInst.instanceMatrix.needsUpdate=true; group.add(leafInst);
    });
}

function _batchBushes(group,batch){
    if(batch.length===0)return;
    const byColor=new Map();
    batch.forEach(b=>{if(!byColor.has(b.col))byColor.set(b.col,[]);byColor.get(b.col).push(b);});
    for(const[col,items]of byColor){
        const inst=new THREE.InstancedMesh(_bushGeo,getMat(col,0.9),items.length);
        items.forEach((b,i)=>{
            _instDummy.position.set(b.x,b.scale,b.z);_instDummy.rotation.set(0,0,0);_instDummy.scale.setScalar(b.scale);_instDummy.updateMatrix();
            inst.setMatrixAt(i,_instDummy.matrix);
        });
        inst.instanceMatrix.needsUpdate=true; group.add(inst);
    }
}

function placeDecoration(group,biome,lx,lz,rng,deciduousBatch,pineBatch,bushBatch){
    if(biome===BIOME.FOREST){
        deciduousBatch.push({x:lx,z:lz,scale:0.7+rng()*0.8,rotY:rng()*Math.PI*2});
    }else if(biome===BIOME.MOUNTAIN){
        pineBatch.push({x:lx,z:lz,scale:0.7+rng()*0.8,rotY:rng()*Math.PI*2});
    }else if(biome===BIOME.GRASSLAND){
        if(rng()<0.6){deciduousBatch.push({x:lx,z:lz,scale:0.5+rng()*0.4,rotY:rng()*Math.PI*2});}
        else{const s=0.4+rng()*0.5;const col=[0x0e3a08,0x123d0c,0x0a2e06][Math.floor(rng()*3)];bushBatch.push({x:lx,z:lz,scale:s,col});}
    }else if(biome===BIOME.FARMLAND){
        const t=Math.floor(rng()*3);
        if(t===0){const f=makeFarmField();f.position.set(lx,0.1,lz);group.add(f);}
        else if(t===1){const b=makeBarn();b.position.set(lx,0,lz);group.add(b);}
        else{const s=makeSilo();s.position.set(lx,0,lz);group.add(s);}
    }else if(biome===BIOME.SUBURB){
        const house=makeHouse(rng);
        house.position.set(lx,0,lz);house.rotation.y=Math.floor(rng()*4)*Math.PI/2;group.add(house);
        deciduousBatch.push({x:lx+4,z:lz+4,scale:0.6,rotY:rng()*Math.PI*2});
    }else if(biome===BIOME.URBAN){
        const h=20+rng()*60,w=8+rng()*14,d=8+rng()*14;
        const colors=[0x1e2535,0x252535,0x181828,0x222230,0x1a2220];
        const bldg=makeBuilding(w,d,h,colors[Math.floor(rng()*colors.length)]);
        bldg.position.set(lx,0,lz);group.add(bldg);
    }else if(biome===BIOME.INDUSTRIAL){
        const t=Math.floor(rng()*3);
        if(t===0){const f=makeFactory();f.position.set(lx,0,lz);group.add(f);}
        else if(t===1){const wh=makeWarehouse();wh.position.set(lx,0,lz);group.add(wh);}
        else{const ch=makeChimney();ch.position.set(lx,0,lz);group.add(ch);}
    }else if(biome===BIOME.BEACH){
        const palm=makePalmTree();palm.position.set(lx,0,lz);group.add(palm);
    }
}

function createRNG(seed){
    let s=seed;
    return function(){s=(s*9301+49297)%233280;return s/233280;};
}

        color,

let attackBeamTimer=0,attackCooldown=0;
const _atkDir=new THREE.Vector3(),_atkMid=new THREE.Vector3(),_yAxis=new THREE.Vector3(0,1,0);

function fireAttackBeam(){
    if(attackCooldown>0)return;
    attackCooldown=0.8; attackBeamTimer=0.3;
    let nearest=null,nearestDist=Infinity;
    apaches.forEach(ap=>{
        const d=ufo.position.distanceTo(ap.mesh.position);
        if(d<nearestDist){nearestDist=d;nearest=ap;}
    });
    let targetPos;
    if(nearest&&nearestDist<300){
        targetPos=nearest.mesh.position.clone();
        nearest.hp-=1;
        if(nearest.hp<=0){
            createExplosion(nearest.mesh.position.clone(),1.5);
            scene.remove(nearest.mesh);
            apaches.splice(apaches.indexOf(nearest),1);
            score+=5000;document.getElementById('score').textContent=score;
            showNotif('APACHE DOWN! +5000');
        }else{nearest.flashTimer=0.2;}
    }else{
        targetPos=new THREE.Vector3(ufo.position.x,0,ufo.position.z-60);
        const BEAM_DESTROY_RADIUS=22;
        let buildingHit=false;
        for(const[chunkKey,colliders]of buildingColliders){
            for(let bi=colliders.length-1;bi>=0;bi--){
                const c=colliders[bi];
                const bdx=c.wx-targetPos.x,bdz=c.wz-targetPos.z;
                if(Math.sqrt(bdx*bdx+bdz*bdz)<BEAM_DESTROY_RADIUS){
                    buildingHit=true;
                    const bScale=1.2+c.h/30;
                    const explosionCount=3+Math.floor(Math.random()*3);
                    for(let ei=0;ei<explosionCount;ei++){
                        setTimeout(()=>{createExplosion(new THREE.Vector3(c.wx+(Math.random()-0.5)*c.w,c.h*(ei/explosionCount)*0.9+1,c.wz+(Math.random()-0.5)*c.d),bScale);},ei*110);
                    }
                    if(c.mesh&&c.parentGroup){setTimeout(()=>{if(c.parentGroup)c.parentGroup.remove(c.mesh);},300);}
                    colliders.splice(bi,1);
                }
            }
        }
        if(buildingHit){score+=500;document.getElementById('score').textContent=score;showNotif('BUILDING DESTROYED! +500');}
        else{createExplosion(targetPos.clone(),0.8);}
    }
    _atkDir.subVectors(targetPos,ufo.position);
    const len=_atkDir.length();_atkDir.normalize();
    _atkMid.copy(ufo.position).addScaledVector(_atkDir,len/2);
    attackBeamGroup.position.copy(_atkMid);
    attackBeamGroup.scale.y=len/attackBeamLen;
    attackBeamGroup.quaternion.setFromUnitVectors(_yAxis,_atkDir);
    attackBeamGroup.visible=true;
}

const DEBRIS_COUNT=220,PUFF_COUNT=80,RING_COUNT=12,FLASH_COUNT=8;
const _debrisPool=[],_debrisActive=[],_puffPool=[],_puffActive=[],_ringPool=[],_ringActive=[],_flashPool=[],_flashActive=[];
const _dGeo1=new THREE.BoxGeometry(0.55,0.55,0.55),_dGeo2=new THREE.SphereGeometry(0.38,4,3);
const _pGeo=new THREE.SphereGeometry(1,6,4),_rGeo=new THREE.RingGeometry(0.4,1.1,36);
for(let i=0;i<DEBRIS_COUNT;i++){const m=new THREE.Mesh(i%3===0?_dGeo2:_dGeo1,new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,depthWrite:false}));m.visible=false;scene.add(m);_debrisPool.push(m);}
for(let i=0;i<PUFF_COUNT;i++){const m=new THREE.Mesh(_pGeo,new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,depthWrite:false}));m.visible=false;scene.add(m);_puffPool.push(m);}
for(let i=0;i<RING_COUNT;i++){const m=new THREE.Mesh(_rGeo,new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,side:THREE.DoubleSide,depthWrite:false}));m.rotation.x=-Math.PI/2;m.visible=false;scene.add(m);_ringPool.push(m);}
for(let i=0;i<FLASH_COUNT;i++){const l=new THREE.PointLight(0xff6600,0,150);scene.add(l);_flashPool.push(l);}

function _poolGet(pool){return pool.find(m=>!m.visible)||null;}
function _flashGet(){return _flashPool.find(l=>l.intensity===0)||null;}

function createExplosion(pos,scale=1.0){
    const fl=_flashGet();
    if(fl){fl.position.copy(pos);fl.color.setHex(0xff8833);fl.intensity=40*scale;fl.distance=130*scale;_flashActive.push({l:fl,age:0,maxAge:0.6});}
    [{delay:0,maxScale:9*scale,maxAge:0.55,opa:0.85},{delay:80,maxScale:6*scale,maxAge:0.75,opa:0.55}].forEach(cfg=>{
        const spawn=()=>{const r=_poolGet(_ringPool);if(!r)return;r.position.copy(pos);r.position.y=pos.y+0.3;r.scale.setScalar(0.05);r.material.color.setHex(cfg.opa>0.7?0xffcc44:0xff6600);r.material.opacity=cfg.opa;r.visible=true;_ringActive.push({m:r,age:0,maxAge:cfg.maxAge,maxScale:cfg.maxScale});};
        cfg.delay===0?spawn():setTimeout(spawn,cfg.delay);
    });
    const FIRE_COLORS=[0xff2200,0xff5500,0xff8800,0xffcc00,0xffffff];
    const puffN=Math.min(Math.round(10*scale),18);
    for(let i=0;i<puffN;i++){
        const p=_poolGet(_puffPool);if(!p)continue;
        const isSmoke=i>=puffN*0.55;
        p.position.copy(pos);p.position.x+=(Math.random()-0.5)*2*scale;p.position.z+=(Math.random()-0.5)*2*scale;p.position.y+=Math.random()*1.5*scale;
        p.material.color.setHex(isSmoke?0x151515:FIRE_COLORS[Math.floor(Math.random()*FIRE_COLORS.length)]);
        p.material.opacity=isSmoke?0.55:0.92;
        const sStart=0.4*scale,sEnd=(isSmoke?4:2.5)*scale;p.scale.setScalar(sStart);p.visible=true;
        _puffActive.push({m:p,vx:(Math.random()-0.5)*0.7,vy:1.8+Math.random()*3.5*scale,vz:(Math.random()-0.5)*0.7,age:0,maxAge:0.65+Math.random()*0.55,sStart,sEnd,isSmoke});
    }
    const DEBRIS_COLORS=[0xff4400,0xff7700,0xffcc00,0xff1100,0xffffff,0xff6622];
    const debN=Math.min(Math.round(14*scale),24);
    for(let i=0;i<debN;i++){
        const d=_poolGet(_debrisPool);if(!d)continue;
        d.position.copy(pos);d.material.color.setHex(DEBRIS_COLORS[Math.floor(Math.random()*DEBRIS_COLORS.length)]);d.material.opacity=1.0;d.visible=true;
        const sp=(2+Math.random()*4.5)*scale,az=Math.random()*Math.PI*2,el=Math.random()*Math.PI*0.7;
        _debrisActive.push({m:d,vx:Math.cos(az)*Math.sin(el)*sp,vy:Math.cos(el)*sp+2,vz:Math.sin(az)*Math.sin(el)*sp,age:0,maxAge:0.9+Math.random()*0.7});
    }
}

function updateExplosions(dt){
    for(let i=_debrisActive.length-1;i>=0;i--){
        const d=_debrisActive[i];d.age+=dt;
        if(d.age>=d.maxAge){d.m.visible=false;_debrisActive.splice(i,1);continue;}
        const t=d.age/d.maxAge;
        d.m.position.x+=d.vx*dt;d.m.position.y+=d.vy*dt-9.8*d.age*dt;d.m.position.z+=d.vz*dt;
        d.m.rotation.x+=0.18;d.m.rotation.z+=0.14;d.m.material.opacity=1-t*t;d.m.scale.setScalar(1.0+t*0.4);
    }
    for(let i=_puffActive.length-1;i>=0;i--){
        const p=_puffActive[i];p.age+=dt;
        if(p.age>=p.maxAge){p.m.visible=false;_puffActive.splice(i,1);continue;}
        const t=p.age/p.maxAge;
        p.m.position.x+=p.vx*dt;p.m.position.y+=p.vy*dt*(1-t*0.6);p.m.position.z+=p.vz*dt;
        p.m.scale.setScalar(p.sStart+(p.sEnd-p.sStart)*Math.sqrt(t));
        p.m.material.opacity=p.isSmoke?(1-t)*0.45:(1-t*t)*0.88;
    }
    for(let i=_ringActive.length-1;i>=0;i--){
        const r=_ringActive[i];r.age+=dt;
        if(r.age>=r.maxAge){r.m.visible=false;_ringActive.splice(i,1);continue;}
        const t=r.age/r.maxAge;
        r.m.scale.setScalar(r.maxScale*Math.sqrt(t));r.m.material.opacity=(1-t)*0.85;
    }
    for(let i=_flashActive.length-1;i>=0;i--){
        const f=_flashActive[i];f.age+=dt;
        if(f.age>=f.maxAge){f.l.intensity=0;_flashActive.splice(i,1);continue;}
        f.l.intensity*=0.82;
    }
}

function getRandomDef(biome){
    const humans=TARGET_DEFS.filter(d=>d.type==='human');
    const wildAnims=TARGET_DEFS.filter(d=>['bear','wolf','deer','eagle','bison','raccoon','turkey','alligator'].includes(d.type));
    const farmAnims=TARGET_DEFS.filter(d=>['cow','horse'].includes(d.type));
    const vehicles=TARGET_DEFS.filter(d=>['car','truck','bus'].includes(d.type));
    let pool;
    if(biome===BIOME.URBAN)pool=[...humans,...humans,...humans,...vehicles,...vehicles];
    else if(biome===BIOME.SUBURB)pool=[...humans,...humans,...vehicles];
    else if(biome===BIOME.INDUSTRIAL)pool=[...humans,...vehicles,...vehicles];
    else if(biome===BIOME.FOREST)pool=[...wildAnims,...wildAnims,...wildAnims,...wildAnims,...humans.slice(0,2)];
    else if(biome===BIOME.MOUNTAIN)pool=[...wildAnims,...wildAnims,...wildAnims,...humans.slice(0,1)];
    else if(biome===BIOME.GRASSLAND)pool=[...wildAnims,...wildAnims,...farmAnims,...humans.slice(10,13)];
    else if(biome===BIOME.FARMLAND)pool=[...farmAnims,...farmAnims,...farmAnims,...wildAnims,...humans.slice(11,14)];
    else if(biome===BIOME.BEACH)pool=[...humans.slice(11,13),...wildAnims.slice(0,3)];
    else pool=[...humans,...wildAnims];
    return pool[Math.floor(Math.random()*pool.length)];
}

const _targetMatCache=new Map();
function getMatBright(color,roughness=0.8){
    const key=`bright_${color}_${roughness}`;
    if(!_targetMatCache.has(key)){
        const m=new THREE.MeshStandardMaterial({color,roughness,metalness:0.0,emissive:new THREE.Color(color).multiplyScalar(0.15)});
        _targetMatCache.set(key,m);
    }
    return _targetMatCache.get(key);
}

function buildTargetMesh(def){
    switch(def.type){
        case 'human':return createHuman(def);case 'cow':return createCow();case 'horse':return createHorse();
        case 'bear':return createBear();case 'wolf':return createWolf();case 'deer':return createDeer();
        case 'eagle':return createEagle();case 'bison':return createBison();case 'raccoon':return createRaccoon();
        case 'turkey':return createTurkey();case 'alligator':return createAlligator();
        case 'car':return createCar([0xee2222,0x22aaee,0x22ee55,0xeeaa22][Math.floor(Math.random()*4)]);
        case 'truck':return createTruck();case 'bus':return createBus();default:return createHuman(def);
    }
}

function addTarget(wx,wz,defOverride){
    const biome=getBiome(wx,wz);
    if(biome===BIOME.OCEAN||biome===BIOME.RIVER)return;
    const def=defOverride||getRandomDef(biome);
    const mesh=buildTargetMesh(def);
    mesh.position.set(wx,0.05,wz);
    scene.add(mesh);
    targets.push({
        mesh,title:def.title,score:def.score,icon:def.icon,vy:0,
        weight:def.type==='bus'?800:def.type==='truck'?400:def.type==='car'?250:def.type==='bear'?200:def.type==='bison'?300:50,
        speed:def.type==='bus'?0.08:def.type==='car'?0.20:def.type==='eagle'?0.3:0.13,
        fleeDist:def.type==='car'?22:def.type==='eagle'?30:16,
        wanderDir:Math.random()*Math.PI*2,type:def.type,
        animPhase:Math.random()*Math.PI*2,spawnChunk:worldToChunk(wx,wz)
    });
}

for(let i=0;i<80;i++){
    const r=30+Math.random()*200,a=Math.random()*Math.PI*2;
    addTarget(Math.cos(a)*r,Math.sin(a)*r);
}

const chunkTargetCount=new Map();
function updateChunks(){
    const{cx:ux,cz:uz}=worldToChunk(ufo.position.x,ufo.position.z);
    const needed=new Set();
    for(let dcx=-CHUNK_RENDER_DIST;dcx<=CHUNK_RENDER_DIST;dcx++)
        for(let dcz=-CHUNK_RENDER_DIST;dcz<=CHUNK_RENDER_DIST;dcz++)
            needed.add(getChunkKey(ux+dcx,uz+dcz));
    needed.forEach(key=>{
        if(!activeChunks.has(key)){
            const[cx,cz]=key.split(',').map(Number);
            buildChunk(cx,cz);activeChunks.add(key);
            if(!chunkTargetCount.has(key)){
                chunkTargetCount.set(key,0);
                if(!isFastMode){
                    const biome=getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2,cz*CHUNK_SIZE+CHUNK_SIZE/2);
                    if(biome===BIOME.OCEAN||biome===BIOME.RIVER)return;
                    const spawnN=4+Math.floor(Math.random()*4);
                    for(let i=0;i<spawnN;i++){
                        const wx=cx*CHUNK_SIZE+Math.random()*CHUNK_SIZE;
                        const wz=cz*CHUNK_SIZE+Math.random()*CHUNK_SIZE;
                        addTarget(wx,wz);
                    }
                }
            }
        }
    });
    const toRemove=[];
    activeChunks.forEach(key=>{if(!needed.has(key))toRemove.push(key);});
    toRemove.forEach(key=>{
        const chunk=chunkCache.get(key);
        if(chunk)scene.remove(chunk);
        activeChunks.delete(key);buildingColliders.delete(key);
        const[cx,cz]=key.split(',').map(Number);
        for(let i=targets.length-1;i>=0;i--){
            const t=targets[i],tc=worldToChunk(t.mesh.position.x,t.mesh.position.z),tkey=getChunkKey(tc.cx,tc.cz);
            if(tkey===key){scene.remove(t.mesh);targets.splice(i,1);}
        }
    });
    needed.forEach(key=>{
        const chunk=chunkCache.get(key);
        if(chunk&&!scene.children.includes(chunk))scene.add(chunk);
    });
}

const baseR=55;
function getStickPos(t){
    const rect=stickBase.getBoundingClientRect();
    let dx=t.clientX-(rect.left+rect.width/2),dy=t.clientY-(rect.top+rect.height/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>baseR){dx=dx/dist*baseR;dy=dy/dist*baseR;}
    return{dx,dy};
}
stickBase.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];vStick.id=t.identifier;vStick.active=true;const{dx,dy}=getStickPos(t);vStick.x=dx/baseR;vStick.y=dy/baseR;stickKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;},{passive:false});

const _ledTrailGeo = new THREE.BoxGeometry(1.0, 1.0, 1.0);
for(let i=0;i<LED_TRAIL_POOL_SIZE;i++){
    const m=new THREE.Mesh(
        _ledTrailGeo,
        new THREE.MeshBasicMaterial({
            color:0xffffff,
            transparent:true,
            opacity:0,
            depthWrite:false,
            blending:THREE.AdditiveBlending,
            side:THREE.DoubleSide
        })
    );
    m.visible=false;
    scene.add(m);
    _ledTrailPool.push(m);
}

// ======================================================
// ANIMATE
// ======================================================
const camTarget=new THREE.Vector3(0,40,55);
const camLookTarget=new THREE.Vector3(0,30,0);
let chunkUpdateTimer=0,camShakeTimer=0,moveStreak=0,currentSpeed=2.8;

function animate(){
    requestAnimationFrame(animate);
    const time=clock.getElapsedTime();
    const delta=0.016;

    const isMoving=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||vStick.active;
    if(isMoving)moveStreak=Math.min(moveStreak+delta,3.5);
    else moveStreak=0;
    const boostT=Math.max(0,(moveStreak-1.2)/2.5);
    const boostFactor=boostT*boostT;
    currentSpeed=2.8+boostFactor*18;

    isFastMode=boostFactor>0.7;
    speedIndicator.style.opacity=boostFactor>0.5?Math.min((boostFactor-0.5)*4,1).toFixed(2):'0';

    prevUfoPos.copy(ufo.position);
    if(keys['KeyW']||keys['ArrowUp'])ufo.position.z-=currentSpeed;
    if(keys['KeyS']||keys['ArrowDown'])ufo.position.z+=currentSpeed;
    if(keys['KeyA']||keys['ArrowLeft'])ufo.position.x-=currentSpeed;
    if(keys['KeyD']||keys['ArrowRight'])ufo.position.x+=currentSpeed;
    if(vStick.active){ufo.position.x+=vStick.x*currentSpeed;ufo.position.z+=vStick.y*currentSpeed;}
    if(isMoving){const mv=new THREE.Vector3().subVectors(ufo.position,prevUfoPos);mv.y=0;if(mv.length()>0.01)ufoMoveDir.copy(mv).normalize();}
    prevUfoPos.copy(ufo.position);

    // --- 既存スピードトレイル ---
    const trailIntensity=boostFactor;
    if(trailIntensity>0.05&&isMoving){
        trailEmitTimer-=delta;
        const emitInterval=Math.max(0.008,0.05-trailIntensity*0.04);
        if(trailEmitTimer<=0){
            trailEmitTimer=emitInterval;
            const t=trailPool[trailHead%TRAIL_COUNT];trailHead++;
            t.mesh.position.copy(ufo.position);t.mesh.position.y-=1+Math.random()*3;
            t.mesh.position.x+=(Math.random()-0.5)*3;t.mesh.position.z+=(Math.random()-0.5)*3;
            const hue=0.45-trailIntensity*0.35;t.mesh.material.color.setHSL(hue,1.0,0.85);
            t.age=1.0;t.maxAge=0.15+trailIntensity*0.25;t.streakLen=4+trailIntensity*30;
            _streakQuat.setFromUnitVectors(_zAxis,ufoMoveDir);
            t.mesh.quaternion.copy(_streakQuat);t.mesh.scale.set(1.2,1.2,t.streakLen);t.mesh.visible=true;
        }
    }
    trailPool.forEach(t=>{
        if(t.age>0){
            t.age-=delta/t.maxAge;
            if(t.age<=0){t.age=0;t.mesh.visible=false;t.mesh.material.opacity=0;}
            else{t.mesh.material.opacity=t.age*0.9;const w=0.8+t.age*0.4;t.mesh.scale.set(w,w,t.streakLen*Math.max(0.05,t.age));}
        }
    });

    // ======================================================
    // ⚡ LED光跡 — 流れるテープランプ
    // 6本のLEDからリボン状の半透明ストリークを引く
    // 横幅広・縦薄・AdditiveBlending で柔らかく重なる
    // ======================================================
    if(boostFactor>0.05&&isMoving){
        for(let li=0;li<LED_TRAIL_COUNT;li++){
            const ledIdx=li*4; // 0,4,8,12,16,20 — 6本を等間隔で選択
            const led=ledRing.children[ledIdx];
            led.getWorldPosition(_ledWorldPos);

            let p=null;
            for(let pi=0;pi<_ledTrailPool.length;pi++){
                if(!_ledTrailPool[pi].visible){p=_ledTrailPool[pi];break;}
            }
            if(!p)continue;

            const hue=((ledIdx/24)+time*0.4)%1;

            // テープランプ：横広・縦薄のリボン形状
            const streakLen = 6 + boostFactor * 90;
            const tapeWidth  = 1 + boostFactor * 7.0;  // テープ横幅
            const tapeHeight = 0.1;                       // テープ薄さ
            const initOpacity = Math.min(boostFactor * 0.7, 0.38); // 半透明

            // 移動方向後方に中心をずらす
            p.position.copy(_ledWorldPos);
            p.position.addScaledVector(ufoMoveDir, -streakLen * 0.5);

            // BoxのZ軸を移動方向に向ける
            _streakQuat.setFromUnitVectors(_zAxis, ufoMoveDir);
            p.quaternion.copy(_streakQuat);
            p.scale.set(tapeWidth, tapeHeight, streakLen);

            p.material.color.setHSL(hue, 1.0, 0.98);
            p.material.opacity = initOpacity;
            p.visible = true;

            const maxAge = 0.05 + boostFactor * 0.18;
            _ledTrailActive.push({m:p, age:0, maxAge, initOpacity, streakLen, thickness: tapeWidth});
        }
    }

    // LED テープ光跡の更新（後端が縮退しながらフェード）
    for(let i=_ledTrailActive.length-1;i>=0;i--){
        const t=_ledTrailActive[i];
        t.age+=delta;
        if(t.age>=t.maxAge){
            t.m.visible=false;
            t.m.material.opacity=0;
            _ledTrailActive.splice(i,1);
            continue;
        }
        const prog=t.age/t.maxAge;
        const lenNow=t.streakLen*(1-prog*0.5);
        const tapeW=t.thickness*(1-prog*0.3); // 横幅はゆっくり縮む
        t.m.scale.set(tapeW, 0.22, lenNow);
        t.m.material.opacity=t.initOpacity*(1-prog*prog);
    }

    ufo.position.y=55+Math.sin(time*0.8)*1.2;
    ufo.rotation.y=time*0.3;
    antennaTop.material.color.setHSL(0,1,0.5+0.5*Math.sin(time*5));

    spotLight.position.copy(ufo.position);
    lightTarget.position.set(ufo.position.x,0,ufo.position.z);
    ufoPointLight.position.copy(ufo.position);
    ufoGroundLight.position.copy(ufo.position);

    ufoRing.material.emissiveIntensity=1.2+Math.sin(time*3)*0.5+boostFactor*1.5;
    if(boostFactor>0.05){ufoRing.material.emissive.setHSL(0.45-boostFactor*0.35,1.0,0.55);}
    else{ufoRing.material.emissive.setHSL((time*0.15)%1,1.0,0.5);}

    beamGroup.position.set(ufo.position.x,ufo.position.y-27.5,ufo.position.z);

    blobShadow.position.x=ufo.position.x;blobShadow.position.z=ufo.position.z;
    groundRing.position.x=ufo.position.x;groundRing.position.z=ufo.position.z;

    const abductActive=isAbducting;
    if(abductActive){
        blobShadowMat.opacity=Math.min(blobShadowMat.opacity+0.06,0.50);
        const pulse=0.25+Math.abs(Math.sin(time*4))*0.35;
        groundRingMat.opacity=pulse;groundRing.scale.setScalar(1.0+Math.sin(time*6)*0.06);
    }else{
        blobShadowMat.opacity=Math.max(blobShadowMat.opacity-0.05,0);
        groundRingMat.opacity=Math.max(groundRingMat.opacity-0.06,0);
    }

    if(keys['Space']&&!keys['_spaceUsed']){keys['_spaceUsed']=true;fireAttackBeam();}

    ledRing.children.forEach((led,i)=>{
        const hue=((i/24)+time*0.4)%1;
        led.material.color.setHSL(hue,1.0,abductActive?0.92:0.65);
    });

    domeMat.emissiveIntensity=0.8+Math.sin(time*2)*0.4;
    glowDisc.material.opacity=0.08+Math.sin(time*2)*0.04;

    beamGroup.visible=abductActive;
    if(abductActive){
        spotLight.intensity=2.0;spotLight.color.setHex(0x44ff88);spotLight.angle=Math.PI/7;
        ufoPointLight.color.setHex(0x00ff44);ufoPointLight.intensity=3;ufoPointLight.distance=80;
        ufoGroundLight.intensity=1.0;ufoGroundLight.distance=120;
        const flicker=1.0+Math.sin(time*30)*0.12+Math.sin(time*47)*0.08;
        beamOuter.material.opacity=0.045*flicker;beamMid.material.opacity=0.09*flicker;
        beamInner.material.opacity=0.20*flicker;beamCore.material.opacity=0.32*flicker;
        beamGlow.material.opacity=0.18+Math.sin(time*8)*0.08;
        beamLight1.intensity=1.5+Math.sin(time*6)*0.5;beamLight2.intensity=1.2+Math.sin(time*7)*0.4;beamLight3.intensity=2.0+Math.sin(time*5)*0.8;
        bodyMat.emissiveIntensity=0.8+Math.sin(time*4)*0.3;bodyMat.emissive.setHex(0x003322);
    }else{
        spotLight.intensity=1.5;spotLight.color.setHex(0x55ccff);spotLight.angle=Math.PI/5;
        ufoPointLight.color.setHex(0x00cc88);ufoPointLight.intensity=2;ufoPointLight.distance=70;
        ufoGroundLight.intensity=1.0;ufoGroundLight.distance=110;
        bodyMat.emissiveIntensity=0.4+Math.sin(time*1.5)*0.15;bodyMat.emissive.setHex(0x112233);
        beamLight1.intensity=0;beamLight2.intensity=0;beamLight3.intensity=0;
    }

    attackCooldown-=delta;
    if(attackBeamTimer>0){attackBeamTimer-=delta;if(attackBeamTimer<=0)attackBeamGroup.visible=false;}

    updateExplosions(delta);

    apacheSpawnTimer+=delta;
    if(apacheSpawnTimer>=APACHE_SPAWN_INTERVAL){apacheSpawnTimer=0;spawnApache();}
    const warningEl=document.getElementById('apache-warning');
    if(apacheWarningTimer>0){apacheWarningTimer-=delta;warningEl.style.opacity=Math.min(1,apacheWarningTimer).toString();if(apacheWarningTimer<=0)warningEl.style.opacity='0';}

    for(let i=apaches.length-1;i>=0;i--){
        const ap=apaches[i];
        ap.mainRotor.rotation.y+=0.35;ap.tailRotor.rotation.x+=0.4;
        const dx=ufo.position.x-ap.mesh.position.x,dy=ufo.position.y-ap.mesh.position.y,dz=ufo.position.z-ap.mesh.position.z;
        const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);

        if(dist>APACHE_MAX_DIST){
            scene.remove(ap.mesh);
            apaches.splice(i,1);
            continue;
        }

        if(dist>35){ap.mesh.position.x+=dx/dist*0.55;ap.mesh.position.y+=dy/dist*0.2;ap.mesh.position.z+=dz/dist*0.55;}
        ap.mesh.lookAt(ufo.position);
        ap.shootTimer-=delta;
        if(ap.shootTimer<=0){
            ap.shootTimer=3+Math.random()*2;
            ufoHP=Math.max(0,ufoHP-10);hpFill.style.width=ufoHP+'%';
            const origColor=bodyMat.emissive.getHex();
            bodyMat.emissive.setHex(0xff0000);setTimeout(()=>bodyMat.emissive.setHex(origColor),150);
        }
        if(ap.flashTimer>0){
            ap.flashTimer-=delta;
            ap.mesh.traverse(child=>{if(child.isMesh&&child.material)child.material.emissive.copy(_apacheHitColor);});
        }else{
            ap.mesh.traverse(child=>{if(child.isMesh&&child.material)child.material.emissive.copy(_apacheBaseColor);});
        }
        if(ap.hp<=0){createExplosion(ap.mesh.position.clone(),1.8);scene.remove(ap.mesh);apaches.splice(i,1);}
    }

    // ======================================================
    // ターゲット更新
    // ======================================================
    for(let i=targets.length-1;i>=0;i--){
        const t=targets[i];
        const dx=t.mesh.position.x-ufo.position.x,dz=t.mesh.position.z-ufo.position.z;
        const dist=Math.sqrt(dx*dx+dz*dz);

        if(!isFastMode){
            if(t.mesh.position.y<=0.1){
                if(dist<t.fleeDist&&abductActive){
                    const angle=Math.atan2(dx,dz);
                    t.mesh.position.x+=Math.sin(angle)*t.speed*1.5;t.mesh.position.z+=Math.cos(angle)*t.speed*1.5;
                    if(t.type==='human'||t.type==='car'||t.type==='truck'||t.type==='bus')t.mesh.rotation.y=Math.atan2(dx,dz);
                }else{
                    if(Math.random()<0.008)t.wanderDir=Math.random()*Math.PI*2;
                    t.mesh.position.x+=Math.sin(t.wanderDir)*t.speed*0.25;t.mesh.position.z+=Math.cos(t.wanderDir)*t.speed*0.25;
                    if(t.type==='human'||t.type==='deer'||t.type==='wolf'||t.type==='horse')t.mesh.rotation.y=t.wanderDir;
                    if(t.type==='human'){t.mesh.children.forEach((c,ci)=>{if(ci<2)c.rotation.x=Math.sin(time*4+t.animPhase+ci)*0.2;});}
                }
            }
        }

        if(abductActive&&dist<6){
            t.vy+=3.5/t.weight;if(t.vy>0.6)t.vy=0.6;
            t.mesh.position.y+=t.vy;t.mesh.rotation.y+=0.06;t.mesh.rotation.x+=0.02;
            if(t.mesh.position.y>ufo.position.y-2){
                score+=t.score;abductCount++;
                document.getElementById('score').textContent=score;document.getElementById('count').textContent=abductCount;
                showNotif(t.title+'  +'+t.score);
                collected.push({title:t.title,icon:t.icon,score:t.score,type:t.type});
                scene.remove(t.mesh);targets.splice(i,1);
            }
        }else if(t.mesh.position.y>0.05){
            t.vy-=0.2;t.mesh.position.y+=t.vy;
            if(t.mesh.position.y<=0.05){t.mesh.position.y=0.05;t.vy=0;t.mesh.rotation.x=0;}
        }
    }

    buildingCollisionCooldown-=delta;
    if(buildingCollisionCooldown<=0){
        const UFO_RADIUS=6.5,uy=ufo.position.y;
        for(const[,colliders]of buildingColliders){
            for(const c of colliders){
                const hw=c.w/2+UFO_RADIUS,hd=c.d/2+UFO_RADIUS;
                const dx=Math.abs(ufo.position.x-c.wx),dz=Math.abs(ufo.position.z-c.wz);
                if(dx<hw&&dz<hd&&uy<c.h+UFO_RADIUS){
                    buildingCollisionCooldown=1.2;
                    ufoHP=Math.max(0,ufoHP-8);hpFill.style.width=ufoHP+'%';
                    const origEmissive=bodyMat.emissive.getHex();
                    bodyMat.emissive.setHex(0xff0000);setTimeout(()=>bodyMat.emissive.setHex(origEmissive),200);
                    const hitPt=new THREE.Vector3((ufo.position.x+c.wx)/2,Math.min(uy,c.h),(ufo.position.z+c.wz)/2);
                    createExplosion(hitPt,1.0);
                    const flashDiv=document.createElement('div');
                    flashDiv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,80,0,0.35);pointer-events:none;z-index:999;transition:opacity 0.4s';
                    document.body.appendChild(flashDiv);setTimeout(()=>{flashDiv.style.opacity='0';setTimeout(()=>flashDiv.remove(),400);},80);
                    camShakeTimer=0.35;showNotif('IMPACT! -8 HP');break;
                }
            }
        }
    }

    chunkUpdateTimer++;
    if(chunkUpdateTimer>=(isFastMode?90:30)){chunkUpdateTimer=0;updateChunks();}

    const curBiome=getBiome(ufo.position.x,ufo.position.z);
    const bn=BIOME_NAMES[curBiome]||'WILDERNESS';
    if(bn!==lastBiomeLabel){biomeLabel.textContent=bn;lastBiomeLabel=bn;}

    if(camShakeTimer>0)camShakeTimer-=delta;
    const camShake=camShakeTimer>0?(Math.random()-0.5)*4*camShakeTimer:0;
    camTarget.set(ufo.position.x+camShake,ufo.position.y+35,ufo.position.z+55);
    camLookTarget.set(ufo.position.x,ufo.position.y-25,ufo.position.z);
    camera.position.lerp(camTarget,0.08);
    camLookTarget.lerp(ufo.position,0.1);
    camera.lookAt(camLookTarget);

    renderer.clear();
    renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
    renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

updateChunks();
animate();

});
</script>
</body>
</html>
