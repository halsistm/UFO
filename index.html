<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFO Abductor - OPEN WORLD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden; background: #000; font-family: 'Courier New', monospace;
            user-select: none; -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-board {
            position: absolute; top: 20px; left: 20px;
            color: #00ff88; font-size: 20px; font-weight: bold;
            text-shadow: 0 0 12px #00ff88;
            letter-spacing: 2px;
        }
        #multiplier { font-size: 12px; color: #88ffcc; margin-top: 4px; opacity: 0.8; }
        #biome-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #aaffdd; font-size: 13px; letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffaa;
            background: rgba(0,0,0,0.4); padding: 5px 16px; border-radius: 20px;
            border: 1px solid #00ff8844;
        }
        #hp-bar-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            margin-top: 50px;
            color: #ff4444; font-size: 11px; letter-spacing: 2px;
            text-align: center;
        }
        #hp-bar-bg {
            width: 140px; height: 8px; background: #1a0000;
            border: 1px solid #ff4444; border-radius: 4px; margin-top: 3px;
        }
        #hp-fill {
            height: 100%; background: linear-gradient(90deg,#ff2200,#ff6600);
            border-radius: 4px; transition: width 0.3s;
        }
        #apache-warning {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #ff2200; font-size: 28px; font-weight: bold;
            text-shadow: 0 0 20px #ff4400;
            pointer-events: none; opacity: 0;
            letter-spacing: 3px;
        }
        #controls {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; gap: 16px; pointer-events: auto;
        }
        .btn {
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, rgba(0,255,136,0.05) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            color: #00ff88; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 11px; letter-spacing: 1px;
            cursor: pointer; text-shadow: 0 0 8px #00ff88;
            box-shadow: 0 0 15px #00ff8833;
            transition: all 0.1s; user-select: none;
        }
        .btn:active { background: radial-gradient(circle, rgba(0,255,136,0.4) 0%, rgba(0,255,136,0.1) 100%); }
        #attack-btn {
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(255,60,0,0.2) 0%, rgba(255,60,0,0.05) 100%);
            border: 2px solid #ff3300; border-radius: 50%;
            color: #ff5500; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; letter-spacing: 1px;
            cursor: pointer; text-shadow: 0 0 8px #ff3300;
            box-shadow: 0 0 15px #ff330033;
            transition: all 0.1s; user-select: none; pointer-events: auto;
        }
        #attack-btn:active { background: radial-gradient(circle, rgba(255,60,0,0.5) 0%, rgba(255,60,0,0.15) 100%); }
        #encyclopedia-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.7);
            color: #00ff88; border: 1px solid #00ff8866;
            border-radius: 6px; cursor: pointer; pointer-events: auto;
            font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 1px;
            text-shadow: 0 0 8px #00ff88;
        }
        #modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.92);
            z-index: 1000; overflow-y: auto; color: #fff;
            backdrop-filter: blur(4px);
        }
        #modal-header {
            position: sticky; top: 0; background: rgba(0,5,17,0.95);
            border-bottom: 1px solid #00ff8833;
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }
        #modal-title { color: #00ff88; font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 12px #00ff88; }
        #close-btn {
            padding: 8px 20px; background: transparent;
            color: #ff4444; border: 1px solid #ff4444;
            border-radius: 4px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 13px;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; padding: 40px 60px; }
        .card {
            background: rgba(0,255,136,0.05); border: 1px solid #00ff8833;
            border-radius: 8px; padding: 20px; text-align: center;
        }
        .card-icon { font-size: 36px; margin-bottom: 10px; }
        .card-title { color: #00ff88; font-size: 14px; letter-spacing: 1px; margin-bottom: 6px; }
        .card-pts { color: #88ffcc; font-size: 12px; opacity: 0.7; }
        #notification {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88; font-size: 36px; font-weight: bold;
            text-shadow: 0 0 20px #00ff88;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; letter-spacing: 2px;
        }
        #controls-hint {
            position: absolute; bottom: 130px; left: 20px;
            color: #00ff8855; font-size: 11px; letter-spacing: 1px; line-height: 1.8;
        }
        #virtual-stick-container {
            display: none; position: absolute; bottom: 30px; left: 20px; pointer-events: auto;
        }
        #stick-base {
            width: 110px; height: 110px;
            background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, rgba(0,255,136,0.02) 100%);
            border: 2px solid rgba(0,255,136,0.35); border-radius: 50%;
            position: relative; touch-action: none;
        }
        #stick-knob {
            width: 46px; height: 46px;
            background: radial-gradient(circle, rgba(0,255,136,0.55) 0%, rgba(0,255,136,0.25) 100%);
            border: 2px solid #00ff88; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #00ff8866; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="score-board">
        SCORE: <span id="score">0</span>
        <div id="multiplier">ABDUCTED: <span id="count">0</span></div>
    </div>
    <div id="biome-label">GRASSLAND</div>
    <div id="hp-bar-container">
        UFO HP
        <div id="hp-bar-bg"><div id="hp-fill" style="width:100%"></div></div>
    </div>
    <button id="encyclopedia-btn">[ 図鑑 ]</button>
    <div id="controls">
        <div class="btn" id="abduct-btn">ABDUCT</div>
        <div id="attack-btn">ATTACK</div>
    </div>
    <div id="controls-hint">WASD / 矢印: 移動<br>ABDUCT: 吸い込み<br>SPACE: 攻撃ビーム</div>
    <div id="virtual-stick-container">
        <div id="stick-base"><div id="stick-knob"></div></div>
    </div>
    <div id="notification">+100</div>
    <div id="apache-warning">⚠ APACHE INCOMING ⚠</div>
</div>

<div id="modal">
    <div id="modal-header">
        <div id="modal-title">// ABDUCTION LOG //</div>
        <button id="close-btn">[ 閉じる ]</button>
    </div>
    <div class="grid" id="card-grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {

// ======================================================
// WORLD / CHUNK SYSTEM
// ======================================================
const CHUNK_SIZE = 64;
const CHUNK_RENDER_DIST = 3;
const BLOCK_SIZE = 8;
const BLOCKS_PER_CHUNK = CHUNK_SIZE / BLOCK_SIZE;

const BIOME = {
    OCEAN:      0,
    BEACH:      1,
    GRASSLAND:  2,
    FARMLAND:   3,
    FOREST:     4,
    MOUNTAIN:   5,
    SUBURB:     6,
    URBAN:      7,
    INDUSTRIAL: 8,
    RIVER:      9,
};

const BIOME_NAMES = {
    0: 'OCEAN', 1: 'BEACH', 2: 'GRASSLAND', 3: 'FARMLAND',
    4: 'FOREST', 5: 'MOUNTAIN', 6: 'SUBURB', 7: 'URBAN',
    8: 'INDUSTRIAL', 9: 'RIVER'
};

function hash(n) {
    n = Math.sin(n) * 43758.5453123;
    return n - Math.floor(n);
}
function noise2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    const a = hash(ix + iy*57);
    const b = hash(ix+1 + iy*57);
    const c = hash(ix + (iy+1)*57);
    const d = hash(ix+1 + (iy+1)*57);
    return a + (b-a)*ux + (c-a)*uy + (d-a)*ux*uy - 0.5;
}
function fbm(x, y, oct=4) {
    let v=0, amp=0.5, freq=1, max=0;
    for(let i=0;i<oct;i++){
        v += noise2D(x*freq, y*freq)*amp;
        max += amp; amp*=0.5; freq*=2;
    }
    return v/max;
}

function getBiome(wx, wz) {
    const scale = 0.008;
    const h = fbm(wx*scale, wz*scale) + 0.5;
    const moisture = fbm(wx*scale+100, wz*scale+200) + 0.5;

    const riverN = Math.abs(fbm(wx*0.005, wz*0.005+500));
    if(riverN < 0.07) return BIOME.RIVER;

    if(h < 0.28) return BIOME.OCEAN;
    if(h < 0.33) return BIOME.BEACH;
    if(h > 0.78) return BIOME.MOUNTAIN;

    const cityN = fbm(wx*0.015+300, wz*0.015+300) + 0.5;
    if(cityN > 0.72) return BIOME.URBAN;
    if(cityN > 0.60) return BIOME.INDUSTRIAL;
    if(cityN > 0.50) return BIOME.SUBURB;
    if(moisture > 0.55) return BIOME.FOREST;
    if(moisture > 0.40) return BIOME.GRASSLAND;
    return BIOME.FARMLAND;
}

// ---- TERRAIN COLORS (toned down / darker) ----
const BIOME_COLORS = {
    [BIOME.OCEAN]:      [0x0a1e38, 0x07142a],
    [BIOME.BEACH]:      [0x7a6535, 0x6a5528],
    [BIOME.GRASSLAND]:  [0x162e0a, 0x1c3e0c],
    [BIOME.FARMLAND]:   [0x4a3808, 0x563e0e],
    [BIOME.FOREST]:     [0x0a1e06, 0x071504],
    [BIOME.MOUNTAIN]:   [0x3a3a3a, 0x484848],
    [BIOME.SUBURB]:     [0x1e1e16, 0x181810],
    [BIOME.URBAN]:      [0x0e0e16, 0x0a0a10],
    [BIOME.INDUSTRIAL]: [0x121208, 0x0e0e06],
    [BIOME.RIVER]:      [0x081828, 0x05101a],
};

// ======================================================
// THREE.JS SETUP
// ======================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);
scene.fog = new THREE.FogExp2(0x000814, 0.004);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.autoClear = false;
renderer.shadowMap.enabled = false;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2; // reduced from 2.0
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 800);
camera.position.set(0, 40, 55);

const ambient = new THREE.AmbientLight(0x223355, 0.6);
scene.add(ambient);
const moonLight = new THREE.DirectionalLight(0x6677aa, 0.4);
moonLight.position.set(-50, 80, -30);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.left = -300; moonLight.shadow.camera.right = 300;
moonLight.shadow.camera.top = 300; moonLight.shadow.camera.bottom = -300;
moonLight.shadow.camera.far = 600;
moonLight.shadow.bias = -0.001;
scene.add(moonLight);
const horizonLight = new THREE.DirectionalLight(0xff8833, 0.08);
horizonLight.position.set(100, 5, 100);
scene.add(horizonLight);

const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000*3);
for(let i=0;i<3000;i++){
    starPos[i*3]   = (Math.random()-0.5)*1600;
    starPos[i*3+1] = Math.random()*500+30;
    starPos[i*3+2] = (Math.random()-0.5)*1600;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.4,sizeAttenuation:true,transparent:true,opacity:0.85})));

// ======================================================
// CHUNK MANAGER
// ======================================================
const chunkCache = new Map();
const activeChunks = new Set();
const buildingColliders = new Map(); // chunkKey -> [{wx, wz, w, d, h}]
let buildingCollisionCooldown = 0;

const matCache = new Map();
function getMat(color, roughness=0.9, metalness=0.0) {
    const key = `${color}_${roughness}_${metalness}`;
    if(!matCache.has(key)) matCache.set(key, new THREE.MeshStandardMaterial({color, roughness, metalness}));
    return matCache.get(key);
}

function getChunkKey(cx, cz) { return `${cx},${cz}`; }
function worldToChunk(wx, wz) {
    return { cx: Math.floor(wx/CHUNK_SIZE), cz: Math.floor(wz/CHUNK_SIZE) };
}

// Road materials (shared)
const roadMat = new THREE.MeshStandardMaterial({color:0x111115, roughness:0.95});
const sidewalkMat = new THREE.MeshStandardMaterial({color:0x1a1a20, roughness:0.9});
const laneMarkMat = new THREE.MeshBasicMaterial({color:0x555540});

function addRoads(group, biome) {
    const roadW = biome === BIOME.URBAN ? 7 : 5;
    const halfCS = CHUNK_SIZE / 2;

    // Horizontal road across center
    const hRoad = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE+2, roadW), roadMat);
    hRoad.rotation.x = -Math.PI/2;
    hRoad.position.set(halfCS, 0.07, halfCS);
    group.add(hRoad);

    // Vertical road across center
    const vRoad = new THREE.Mesh(new THREE.PlaneGeometry(roadW, CHUNK_SIZE+2), roadMat);
    vRoad.rotation.x = -Math.PI/2;
    vRoad.position.set(halfCS, 0.07, halfCS);
    group.add(vRoad);

    // Sidewalks beside horizontal road
    [-1,1].forEach(s => {
        const sw = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE+2, 1.5), sidewalkMat);
        sw.rotation.x = -Math.PI/2;
        sw.position.set(halfCS, 0.06, halfCS + s*(roadW/2+0.75));
        group.add(sw);
    });

    // Center line dashes (horizontal road)
    for(let i=0; i<8; i++) {
        const dash = new THREE.Mesh(new THREE.PlaneGeometry(4, 0.25), laneMarkMat);
        dash.rotation.x = -Math.PI/2;
        dash.position.set(i*8+4, 0.08, halfCS);
        group.add(dash);
    }
    // Center line dashes (vertical road)
    for(let i=0; i<8; i++) {
        const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 4), laneMarkMat);
        dash.rotation.x = -Math.PI/2;
        dash.position.set(halfCS, 0.08, i*8+4);
        group.add(dash);
    }

    // Street lamps — visual only, no PointLights (perf)
    const lampPostMat2 = getMat(0x444450, 0.6);
    const lampGlowMat2 = new THREE.MeshBasicMaterial({color:0xffeedd});
    const lampPos = [halfCS*0.5, halfCS*1.5]; // 2 lamps per road side
    lampPos.forEach(lx => {
        [halfCS + roadW/2 + 1.8, halfCS - roadW/2 - 1.8].forEach(lz => {
            const post = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,5,6), lampPostMat2);
            post.position.set(lx, 2.5, lz); group.add(post);
            const globe = new THREE.Mesh(new THREE.SphereGeometry(0.35,6,5), lampGlowMat2);
            globe.position.set(lx, 5.2, lz); group.add(globe);
        });
    });

}

function buildChunk(cx, cz) {
    const key = getChunkKey(cx, cz);
    if(chunkCache.has(key)) return chunkCache.get(key);

    const group = new THREE.Group();
    group.position.set(cx*CHUNK_SIZE, 0, cz*CHUNK_SIZE);

    const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

    for(let bx=0; bx<BLOCKS_PER_CHUNK; bx++) {
        for(let bz=0; bz<BLOCKS_PER_CHUNK; bz++) {
            const wx = cx*CHUNK_SIZE + bx*BLOCK_SIZE + BLOCK_SIZE/2;
            const wz = cz*CHUNK_SIZE + bz*BLOCK_SIZE + BLOCK_SIZE/2;
            const biome = getBiome(wx, wz);
            const colors = BIOME_COLORS[biome];
            const col = colors[(bx+bz)%2];
            const mat = getMat(col);

            const h = biome===BIOME.MOUNTAIN ? (fbm(wx*0.05,wz*0.05)+0.5)*12 :
                       biome===BIOME.OCEAN   ? -4 :
                       biome===BIOME.RIVER   ? -1 : 0;

            const block = new THREE.Mesh(blockGeo, mat);
            block.position.set(bx*BLOCK_SIZE + BLOCK_SIZE/2, h - BLOCK_SIZE/2, bz*BLOCK_SIZE + BLOCK_SIZE/2);
            block.receiveShadow = false;
            group.add(block);

            if(biome===BIOME.OCEAN || biome===BIOME.RIVER) {
                const waterMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(BLOCK_SIZE, BLOCK_SIZE),
                    new THREE.MeshStandardMaterial({color:0x0e2e55,transparent:true,opacity:0.8,roughness:0.05,metalness:0.4})
                );
                waterMesh.rotation.x = -Math.PI/2;
                waterMesh.position.set(bx*BLOCK_SIZE+BLOCK_SIZE/2, 0.1, bz*BLOCK_SIZE+BLOCK_SIZE/2);
                group.add(waterMesh);
            }
        }
    }

    // ---- Roads for urban biomes ----
    const centerBiome = getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2, cz*CHUNK_SIZE+CHUNK_SIZE/2);
    if(centerBiome===BIOME.URBAN || centerBiome===BIOME.SUBURB || centerBiome===BIOME.INDUSTRIAL) {
        addRoads(group, centerBiome);
    }

    spawnBiomeObjects(group, cx, cz);

    // Urban/Suburb: 1 cheap PointLight per chunk for city ambient glow
    if(centerBiome===BIOME.URBAN || centerBiome===BIOME.SUBURB) {
        const chunkLight = new THREE.PointLight(0xffcc88, 0.7, CHUNK_SIZE * 1.3);
        chunkLight.position.set(CHUNK_SIZE/2, 18, CHUNK_SIZE/2);
        group.add(chunkLight);
    }

    scene.add(group);
    chunkCache.set(key, group);
    // Collect building colliders for this chunk
    const colliders = [];
    group.children.forEach(child => {
        if(child.userData && child.userData.isBuilding) {
            colliders.push({
                wx: cx*CHUNK_SIZE + child.position.x,
                wz: cz*CHUNK_SIZE + child.position.z,
                w: child.userData.bw,
                d: child.userData.bd,
                h: child.userData.bh
            });
        }
    });
    if(colliders.length > 0) buildingColliders.set(key, colliders);
    return group;
}

function spawnBiomeObjects(group, cx, cz) {
    const rng = createRNG(cx*100+cz);
    const biome = getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2, cz*CHUNK_SIZE+CHUNK_SIZE/2);

    const spawnCount = {
        [BIOME.FOREST]:     10,
        [BIOME.GRASSLAND]:  5,
        [BIOME.FARMLAND]:   4,
        [BIOME.MOUNTAIN]:   4,
        [BIOME.SUBURB]:     6,
        [BIOME.URBAN]:      7,
        [BIOME.INDUSTRIAL]: 5,
        [BIOME.BEACH]:      2,
        [BIOME.OCEAN]:      0,
        [BIOME.RIVER]:      0,
    }[biome] || 0;

    for(let i=0; i<spawnCount; i++) {
        const lx = rng() * (CHUNK_SIZE-8) + 4;
        const lz = rng() * (CHUNK_SIZE-8) + 4;
        placeDecoration(group, biome, lx, lz, rng);
    }
}

function placeDecoration(group, biome, lx, lz, rng) {
    if(biome===BIOME.FOREST || biome===BIOME.MOUNTAIN) {
        const scale = 0.7 + rng()*0.8;
        const treeGroup = makeTree(scale, biome===BIOME.MOUNTAIN ? 'pine' : 'deciduous');
        treeGroup.position.set(lx, 0, lz);
        group.add(treeGroup);
    } else if(biome===BIOME.GRASSLAND) {
        const r = rng();
        if(r < 0.6) { const t = makeTree(0.5+rng()*0.4); t.position.set(lx,0,lz); group.add(t); }
        else { const b = makeBush(rng); b.position.set(lx,0,lz); group.add(b); }
    } else if(biome===BIOME.FARMLAND) {
        const t = Math.floor(rng()*3);
        if(t===0) { const f=makeFarmField(); f.position.set(lx,0.1,lz); group.add(f); }
        else if(t===1) { const b=makeBarn(); b.position.set(lx,0,lz); group.add(b); }
        else { const s=makeSilo(); s.position.set(lx,0,lz); group.add(s); }
    } else if(biome===BIOME.SUBURB) {
        const house = makeHouse(rng);
        house.position.set(lx, 0, lz);
        house.rotation.y = Math.floor(rng()*4)*Math.PI/2;
        group.add(house);
        const tree = makeTree(0.6);
        tree.position.set(lx+4, 0, lz+4);
        group.add(tree);
    } else if(biome===BIOME.URBAN) {
        const h = 20 + rng()*60;
        const w = 8 + rng()*14;
        const d = 8 + rng()*14;
        const colors = [0x1e2535,0x252535,0x181828,0x222230,0x1a2220];
        const bldg = makeBuilding(w, d, h, colors[Math.floor(rng()*colors.length)]);
        bldg.position.set(lx, 0, lz);
        group.add(bldg);
        // Register collider (world coords resolved later via group.position)
        bldg.userData.colliderLx = lx; bldg.userData.colliderLz = lz;
    } else if(biome===BIOME.INDUSTRIAL) {
        const t = Math.floor(rng()*3);
        if(t===0) { const f=makeFactory(); f.position.set(lx,0,lz); group.add(f); }
        else if(t===1) { const wh=makeWarehouse(); wh.position.set(lx,0,lz); group.add(wh); }
        else { const ch=makeChimney(); ch.position.set(lx,0,lz); group.add(ch); }
    } else if(biome===BIOME.BEACH) {
        const palm = makePalmTree();
        palm.position.set(lx, 0, lz);
        group.add(palm);
    }
}

function createRNG(seed) {
    let s = seed;
    return function() {
        s = (s*9301+49297) % 233280;
        return s/233280;
    };
}

function makeTree(scale=1, type='deciduous') {
    const g = new THREE.Group();
    const trunkMat = getMat(0x3d2b1a, 0.9);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25*scale,0.4*scale,3*scale,8), trunkMat);
    trunk.position.y = 1.5*scale; trunk.castShadow = true; g.add(trunk);

    if(type==='pine') {
        const leafMat = getMat(0x0d4015, 0.8);
        [0,1,2].forEach(i => {
            const cone = new THREE.Mesh(new THREE.ConeGeometry((2.2-i*0.5)*scale,(3+i*0.3)*scale,8), leafMat);
            cone.position.y = (3+i*2)*scale; cone.castShadow = true; g.add(cone);
        });
    } else {
        const leafColors = [0x0d3d12, 0x0a2e0d, 0x144d18];
        [0,1,2].forEach(i => {
            const r = [2.8,2.2,1.4][i]*scale, h = [4,3.5,3][i]*scale, y = [3.5,5.5,7.5][i]*scale;
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(r,h,8), getMat(leafColors[i],0.8));
            leaf.position.y = y; leaf.castShadow = true; g.add(leaf);
        });
    }
    g.rotation.y = Math.random()*Math.PI*2;
    return g;
}

function makeBuilding(w, d, h, color) {
    const g = new THREE.Group();
    // Lambert = no specular calc, much cheaper than Standard
    const bodyMtl = new THREE.MeshLambertMaterial({
        color,
        emissive: new THREE.Color(color).multiplyScalar(0.4),
    });
    const body = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), bodyMtl);
    body.position.y = h/2; body.castShadow = false; body.receiveShadow = false; g.add(body);

    // Windows — front face only, thinned out (no PointLights)
    const winColors = [0xffee88, 0xfff0aa, 0x88ccff, 0xffdd66];
    const rows = Math.floor(h/4), cols = Math.floor(w/3);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
        if(Math.random()>0.45) {
            const wc = winColors[Math.floor(Math.random()*winColors.length)];
            const winMat = new THREE.MeshBasicMaterial({color: wc});
            const win = new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.1), winMat);
            win.position.set((c/(Math.max(cols-1,1))-0.5)*(w-2), 3+r*4, d/2+0.02);
            g.add(win);
        }
    }

    // Neon sign bar on facade — MeshBasicMaterial only, zero lighting cost
    const neonColors = [0xff2266, 0x00ffcc, 0xff8800, 0x44aaff, 0xff44ff, 0x00ff88];
    const nc = neonColors[Math.floor(Math.random()*neonColors.length)];
    const neonBar = new THREE.Mesh(
        new THREE.BoxGeometry(w*0.65, 0.55, 0.25),
        new THREE.MeshBasicMaterial({color: nc})
    );
    neonBar.position.set(0, h + 0.5, d/2 + 0.15);
    g.add(neonBar);

    g.userData.isBuilding = true;
    g.userData.bw = w; g.userData.bd = d; g.userData.bh = h;
    return g;
}

let attackBeamTimer = 0;
let attackCooldown = 0;
const _atkDir = new THREE.Vector3();
const _atkMid = new THREE.Vector3();
const _yAxis = new THREE.Vector3(0,1,0);

function fireAttackBeam() {
    if(attackCooldown > 0) return;
    attackCooldown = 0.8;
    attackBeamTimer = 0.3;

    // Find nearest Apache
    let nearest = null, nearestDist = Infinity;
    apaches.forEach(ap => {
        const d = ufo.position.distanceTo(ap.mesh.position);
        if(d < nearestDist) { nearestDist = d; nearest = ap; }
    });

    let targetPos;
    if(nearest && nearestDist < 300) {
        targetPos = nearest.mesh.position.clone();
        nearest.hp -= 1;
        if(nearest.hp <= 0) {
            createExplosion(nearest.mesh.position.clone());
            scene.remove(nearest.mesh);
            apaches.splice(apaches.indexOf(nearest), 1);
            score += 5000;
            document.getElementById('score').textContent = score;
            showNotif('APACHE DOWN! +5000');
        } else {
            // flash red
            nearest.flashTimer = 0.2;
        }
    } else {
        // Fire toward ground ahead of UFO
        targetPos = new THREE.Vector3(ufo.position.x, 0, ufo.position.z - 60);
    }

    // Orient beam from UFO to target
    _atkDir.subVectors(targetPos, ufo.position);
    const len = _atkDir.length();
    _atkDir.normalize();
    _atkMid.copy(ufo.position).addScaledVector(_atkDir, len/2);
    attackBeamGroup.position.copy(_atkMid);
    attackBeamGroup.scale.y = len / attackBeamLen;
    attackBeamGroup.quaternion.setFromUnitVectors(_yAxis, _atkDir);
    attackBeamGroup.visible = true;
}

function createExplosion(pos) {
    const flash = new THREE.PointLight(0xff6600, 25, 100);
    flash.position.copy(pos);
    scene.add(flash);
    // Debris particles
    for(let i=0;i<8;i++) {
        const debris = new THREE.Mesh(
            new THREE.BoxGeometry(0.5,0.5,0.5),
            new THREE.MeshBasicMaterial({color:0xff4400})
        );
        debris.position.copy(pos);
        scene.add(debris);
        const vx = (Math.random()-0.5)*4, vy = Math.random()*3+1, vz=(Math.random()-0.5)*4;
        let t=0;
        const tick = setInterval(()=>{
            t+=0.016;
            debris.position.x+=vx*0.016; debris.position.y+=vy*0.016-0.05*t;
            debris.position.z+=vz*0.016;
            debris.rotation.x+=0.1; debris.rotation.z+=0.08;
            flash.intensity *= 0.9;
            if(t>1.5){clearInterval(tick);scene.remove(debris);scene.remove(flash);}
        },16);
    }
}

function getRandomDef(biome) {
    const humans    = TARGET_DEFS.filter(d=>d.type==='human');
    const wildAnims = TARGET_DEFS.filter(d=>['bear','wolf','deer','eagle','bison','raccoon','turkey','alligator'].includes(d.type));
    const farmAnims = TARGET_DEFS.filter(d=>['cow','horse'].includes(d.type));
    const vehicles  = TARGET_DEFS.filter(d=>['car','truck','bus'].includes(d.type));

    let pool;
    if(biome===BIOME.URBAN)
        pool = [...humans,...humans,...humans,...vehicles,...vehicles];
    else if(biome===BIOME.SUBURB)
        pool = [...humans,...humans,...vehicles];
    else if(biome===BIOME.INDUSTRIAL)
        pool = [...humans,...vehicles,...vehicles];
    else if(biome===BIOME.FOREST)
        pool = [...wildAnims,...wildAnims,...wildAnims,...wildAnims,...humans.slice(0,2)];
    else if(biome===BIOME.MOUNTAIN)
        pool = [...wildAnims,...wildAnims,...wildAnims,...humans.slice(0,1)];
    else if(biome===BIOME.GRASSLAND)
        pool = [...wildAnims,...wildAnims,...farmAnims,...humans.slice(10,13)];
    else if(biome===BIOME.FARMLAND)
        pool = [...farmAnims,...farmAnims,...farmAnims,...wildAnims,...humans.slice(11,14)];
    else if(biome===BIOME.BEACH)
        pool = [...humans.slice(11,13),...wildAnims.slice(0,3)];
    else
        pool = [...humans,...wildAnims];

    return pool[Math.floor(Math.random()*pool.length)];
}

function getMatBright(color, roughness=0.8) {
    // Slightly luminous material for targets
    const key = `bright_${color}_${roughness}`;
    if(!matCache.has(key)) {
        const m = new THREE.MeshStandardMaterial({color, roughness, metalness:0.0, emissive:new THREE.Color(color).multiplyScalar(0.15)});
        matCache.set(key, m);
    }
    return matCache.get(key);
}

}

function buildTargetMesh(def) {
    switch(def.type){
        case 'human':    return createHuman(def);
        case 'cow':      return createCow();
        case 'horse':    return createHorse();
        case 'bear':     return createBear();
        case 'wolf':     return createWolf();
        case 'deer':     return createDeer();
        case 'eagle':    return createEagle();
        case 'bison':    return createBison();
        case 'raccoon':  return createRaccoon();
        case 'turkey':   return createTurkey();
        case 'alligator':return createAlligator();
        case 'car':      return createCar([0xee2222,0x22aaee,0x22ee55,0xeeaa22][Math.floor(Math.random()*4)]);
        case 'truck':    return createTruck();
        case 'bus':      return createBus();
        default:         return createHuman(def);
    }
}

function addTarget(wx, wz, defOverride) {
    const biome = getBiome(wx, wz);
    // No targets on ocean or river
    if(biome===BIOME.OCEAN || biome===BIOME.RIVER) return;
    const def = defOverride || getRandomDef(biome);
    const mesh = buildTargetMesh(def);
    mesh.position.set(wx, 0.05, wz);
    scene.add(mesh);
    targets.push({
        mesh, title:def.title, score:def.score, icon:def.icon,
        vy:0,
        weight: def.type==='bus'?800:def.type==='truck'?400:def.type==='car'?250:def.type==='bear'?200:def.type==='bison'?300:50,
        speed:  def.type==='bus'?0.08:def.type==='car'?0.20:def.type==='eagle'?0.3:0.13,
        fleeDist: def.type==='car'?22:def.type==='eagle'?30:16,
        wanderDir: Math.random()*Math.PI*2,
        type: def.type,
        animPhase: Math.random()*Math.PI*2,
        spawnChunk: worldToChunk(wx,wz)
    });
}

const chunkTargetCount = new Map();

function updateChunks() {
    const { cx:ux, cz:uz } = worldToChunk(ufo.position.x, ufo.position.z);
    const needed = new Set();
    for(let dcx=-CHUNK_RENDER_DIST; dcx<=CHUNK_RENDER_DIST; dcx++)
        for(let dcz=-CHUNK_RENDER_DIST; dcz<=CHUNK_RENDER_DIST; dcz++)
            needed.add(getChunkKey(ux+dcx, uz+dcz));

    needed.forEach(key => {
        if(!activeChunks.has(key)) {
            const [cx,cz] = key.split(',').map(Number);
            buildChunk(cx, cz);
            activeChunks.add(key);
            if(!chunkTargetCount.has(key)) {
                chunkTargetCount.set(key, 0);
                const biome = getBiome(cx*CHUNK_SIZE+CHUNK_SIZE/2, cz*CHUNK_SIZE+CHUNK_SIZE/2);
                // No spawns on ocean/river
                if(biome===BIOME.OCEAN||biome===BIOME.RIVER) return;
                const spawnN = 4+Math.floor(Math.random()*4);
                for(let i=0;i<spawnN;i++) {
                    const wx=cx*CHUNK_SIZE+Math.random()*CHUNK_SIZE;
                    const wz=cz*CHUNK_SIZE+Math.random()*CHUNK_SIZE;
                    addTarget(wx, wz);
                }
            }
        }
    });

    const toRemove=[];
    activeChunks.forEach(key=>{ if(!needed.has(key)) toRemove.push(key); });
    toRemove.forEach(key=>{
        const chunk=chunkCache.get(key);
        if(chunk) scene.remove(chunk);
        activeChunks.delete(key);
        buildingColliders.delete(key);
        const [cx,cz]=key.split(',').map(Number);
        for(let i=targets.length-1;i>=0;i--){
            const t=targets[i];
            const tc=worldToChunk(t.mesh.position.x,t.mesh.position.z);
            const tkey=getChunkKey(tc.cx,tc.cz);
            if(tkey===key){scene.remove(t.mesh);targets.splice(i,1);}
        }
    });

    needed.forEach(key=>{
        const chunk=chunkCache.get(key);
        if(chunk&&!scene.children.includes(chunk)) scene.add(chunk);
    });
}

const camTarget = new THREE.Vector3(0,40,55);
const camLookTarget = new THREE.Vector3(0,30,0);
let chunkUpdateTimer = 0;
let camShakeTimer = 0;
let moveStreak = 0;
let currentSpeed = 2.8;

// ---- Speed trail particles ----
const TRAIL_COUNT = 25;
const trailPool = [];
for(let i=0;i<TRAIL_COUNT;i++){
    const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.55, 5, 4),
        new THREE.MeshBasicMaterial({color:0x00ffee, transparent:true, opacity:0, depthWrite:false})
    );
    m.visible = false;
    scene.add(m);
    trailPool.push({mesh:m, age:0, maxAge:0});
}
let trailHead = 0;
let trailEmitTimer = 0;



function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    const delta = 0.016;

    // UFO movement — 長押しで超光速モード
    const isMoving = keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||
                     keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||
                     vStick.active;
    if(isMoving) {
        moveStreak = Math.min(moveStreak + delta, 3.5);
    } else {
        moveStreak = Math.max(0, moveStreak - delta * 2.5);
    }
    // 0→1 のブースト係数（0.6秒維持後にじわ上昇）
    const boostT = Math.max(0, (moveStreak - 0.6) / 2.5);
    const boostFactor = boostT * boostT; // ease-in
    currentSpeed = 2.8 + boostFactor * 18; // 最大 ~20.8

    if(keys['KeyW']||keys['ArrowUp'])   ufo.position.z -= currentSpeed;
    if(keys['KeyS']||keys['ArrowDown']) ufo.position.z += currentSpeed;
    if(keys['KeyA']||keys['ArrowLeft']) ufo.position.x -= currentSpeed;
    if(keys['KeyD']||keys['ArrowRight'])ufo.position.x += currentSpeed;
    if(vStick.active){ ufo.position.x+=vStick.x*currentSpeed; ufo.position.z+=vStick.y*currentSpeed; }

    // ---- Trail emission ----
    const trailIntensity = boostFactor;
    if(trailIntensity > 0.05 && isMoving) {
        trailEmitTimer -= delta;
        const emitInterval = Math.max(0.01, 0.06 - trailIntensity * 0.05);
        if(trailEmitTimer <= 0) {
            trailEmitTimer = emitInterval;
            const t = trailPool[trailHead % TRAIL_COUNT];
            trailHead++;
            t.mesh.position.copy(ufo.position);
            t.mesh.position.y -= 2 + Math.random() * 4;
            // 速度に応じて色変化: 青→白熱
            const hue = 0.45 - trailIntensity * 0.35; // 水色→黄
            t.mesh.material.color.setHSL(hue, 1.0, 0.75);
            t.age = 1.0;
            t.maxAge = 0.25 + trailIntensity * 0.35;
            t.mesh.visible = true;
        }
    }
    // Trail フェードアウト更新
    trailPool.forEach(t => {
        if(t.age > 0) {
            t.age -= delta / t.maxAge;
            if(t.age <= 0) {
                t.age = 0;
                t.mesh.visible = false;
                t.mesh.material.opacity = 0;
            } else {
                t.mesh.material.opacity = t.age * 0.85;
                const sc = 1.0 + (1 - t.age) * 1.8;
                t.mesh.scale.setScalar(sc);
            }
        }
    });

    ufo.position.y = 55 + Math.sin(time*0.8)*1.2;
    ufo.rotation.y = time*0.3;
    antennaTop.material.color.setHSL(0,1,0.5+0.5*Math.sin(time*5));

    spotLight.position.copy(ufo.position);
    lightTarget.position.set(ufo.position.x, 0, ufo.position.z);
    ufoPointLight.position.copy(ufo.position);
    ufoGroundLight.position.copy(ufo.position);

    const cAngle = time*0.8;
    ufoColorLight1.position.set(ufo.position.x+Math.cos(cAngle)*6, ufo.position.y-1, ufo.position.z+Math.sin(cAngle)*6);
    ufoColorLight2.position.set(ufo.position.x-Math.cos(cAngle)*6, ufo.position.y-1, ufo.position.z-Math.sin(cAngle)*6);

    beamGroup.position.set(ufo.position.x, ufo.position.y-27.5, ufo.position.z);

    // ---- Blob shadow & ground ring (吸引時のみ) ----
    blobShadow.position.x = ufo.position.x;
    blobShadow.position.z = ufo.position.z;
    groundRing.position.x = ufo.position.x;
    groundRing.position.z = ufo.position.z;
    if(isAbducting) {
        blobShadowMat.opacity = Math.min(blobShadowMat.opacity + 0.06, 0.50);
        const pulse = 0.25 + Math.abs(Math.sin(time * 4)) * 0.35;
        groundRingMat.opacity = pulse;
        groundRing.scale.setScalar(1.0 + Math.sin(time * 6) * 0.06);
    } else {
        blobShadowMat.opacity = Math.max(blobShadowMat.opacity - 0.05, 0);
        groundRingMat.opacity = Math.max(groundRingMat.opacity - 0.06, 0);
    }

    // Abduct (ABDUCT button only, NOT Space)
    const abductActive = isAbducting;

    // Space = attack beam
    if(keys['Space'] && !keys['_spaceUsed']) {
        keys['_spaceUsed'] = true;
        fireAttackBeam();
    }

    // LED ring
    ledRing.children.forEach((led,i)=>{
        const hue=((i/24)+time*0.4)%1;
        led.material.color.setHSL(hue,1.0,abductActive?0.92:0.65);
    });

    ufoRing.material.emissiveIntensity = 1.2 + Math.sin(time*3)*0.5 + boostFactor*1.5;
    if(boostFactor > 0.05) {
        // 超光速中: 青→白熱へ
        ufoRing.material.emissive.setHSL(0.45 - boostFactor*0.35, 1.0, 0.55);
    } else {
        ufoRing.material.emissive.setHSL((time*0.15)%1, 1.0, 0.5);
    }
    domeMat.emissiveIntensity = 0.8 + Math.sin(time*2)*0.4;
    glowDisc.material.opacity = 0.08 + Math.sin(time*2)*0.04;

    // Beam — reduced lighting when active
    beamGroup.visible = abductActive;
    if(abductActive){
        spotLight.intensity = 2.0;
        spotLight.color.setHex(0x44ff88);
        spotLight.angle = Math.PI/7;
        ufoPointLight.color.setHex(0x00ff44); ufoPointLight.intensity = 3; ufoPointLight.distance = 80;
        ufoGroundLight.intensity = 1.0; ufoGroundLight.distance = 120;
        ufoColorLight1.intensity = 1.0; ufoColorLight2.intensity = 1.0;
        const flicker = 1.0 + Math.sin(time*30)*0.12 + Math.sin(time*47)*0.08;
        beamOuter.material.opacity = 0.045 * flicker;
        beamMid.material.opacity   = 0.09  * flicker;
        beamInner.material.opacity = 0.20  * flicker;
        beamCore.material.opacity  = 0.32  * flicker;
        beamGlow.material.opacity  = 0.18 + Math.sin(time*8)*0.08;
        beamLight1.intensity = 1.5 + Math.sin(time*6)*0.5;
        beamLight2.intensity = 1.2 + Math.sin(time*7)*0.4;
        beamLight3.intensity = 2.0 + Math.sin(time*5)*0.8;
        bodyMat.emissiveIntensity = 0.8 + Math.sin(time*4)*0.3;
        bodyMat.emissive.setHex(0x003322);
    } else {
        spotLight.intensity = 1.5; spotLight.color.setHex(0x55ccff);
        spotLight.angle = Math.PI/5;
        ufoPointLight.color.setHex(0x00cc88); ufoPointLight.intensity = 2; ufoPointLight.distance = 70;
        ufoGroundLight.intensity = 1.0; ufoGroundLight.distance = 110;
        ufoColorLight1.intensity = 0.8; ufoColorLight2.intensity = 0.8;
        bodyMat.emissiveIntensity = 0.4 + Math.sin(time*1.5)*0.15;
        bodyMat.emissive.setHex(0x112233);
        beamLight1.intensity = 0; beamLight2.intensity = 0; beamLight3.intensity = 0;
    }

    // Attack beam timer
    attackCooldown -= delta;
    if(attackBeamTimer > 0){
        attackBeamTimer -= delta;
        if(attackBeamTimer <= 0) attackBeamGroup.visible = false;
    }

    // ---- Apache update ----
    apacheSpawnTimer += delta;
    if(apacheSpawnTimer >= APACHE_SPAWN_INTERVAL) {
        apacheSpawnTimer = 0;
        spawnApache();
    }

    const warningEl = document.getElementById('apache-warning');
    if(apacheWarningTimer > 0){
        apacheWarningTimer -= delta;
        warningEl.style.opacity = Math.min(1, apacheWarningTimer).toString();
        if(apacheWarningTimer <= 0) warningEl.style.opacity = '0';
    }

    for(let i=apaches.length-1;i>=0;i--){
        const ap = apaches[i];
        // Spin rotors
        ap.mainRotor.rotation.y += 0.35;
        ap.tailRotor.rotation.x += 0.4;

        // Move toward UFO
        const dx = ufo.position.x - ap.mesh.position.x;
        const dy = ufo.position.y - ap.mesh.position.y;
        const dz = ufo.position.z - ap.mesh.position.z;
        const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);

        if(dist > 35) {
            ap.mesh.position.x += dx/dist * 0.55;
            ap.mesh.position.y += dy/dist * 0.2;
            ap.mesh.position.z += dz/dist * 0.55;
        }

        // Face UFO
        ap.mesh.lookAt(ufo.position);

        // Apache shooting
        ap.shootTimer -= delta;
        if(ap.shootTimer <= 0){
            ap.shootTimer = 3 + Math.random()*2;
            ufoHP = Math.max(0, ufoHP - 10);
            hpFill.style.width = ufoHP + '%';
            // Flash red on hit
            const origColor = bodyMat.emissive.getHex();
            bodyMat.emissive.setHex(0xff0000);
            setTimeout(()=>bodyMat.emissive.setHex(origColor), 150);
        }

        // Flash when hit by player
        if(ap.flashTimer > 0){
            ap.flashTimer -= delta;
            ap.mesh.traverse(child=>{
                if(child.isMesh && child.material) child.material.emissive = new THREE.Color(0xff2200);
            });
        } else {
            ap.mesh.traverse(child=>{
                if(child.isMesh && child.material) child.material.emissive = new THREE.Color(0x000000);
            });
        }

        // HP check
        if(ap.hp <= 0){
            createExplosion(ap.mesh.position.clone());
            scene.remove(ap.mesh);
            apaches.splice(i,1);
        }
    }

    // ---- Target behavior ----
    for(let i=targets.length-1;i>=0;i--){
        const t=targets[i];
        const dx=t.mesh.position.x-ufo.position.x;
        const dz=t.mesh.position.z-ufo.position.z;
        const dist=Math.sqrt(dx*dx+dz*dz);

        if(t.mesh.position.y<=0.1){
            if(dist<t.fleeDist&&abductActive){
                const angle=Math.atan2(dx,dz);
                t.mesh.position.x+=Math.sin(angle)*t.speed*1.5;
                t.mesh.position.z+=Math.cos(angle)*t.speed*1.5;
                if(t.type==='human'||t.type==='car'||t.type==='truck'||t.type==='bus')
                    t.mesh.rotation.y=Math.atan2(dx,dz);
            } else {
                if(Math.random()<0.008) t.wanderDir=Math.random()*Math.PI*2;
                t.mesh.position.x+=Math.sin(t.wanderDir)*t.speed*0.25;
                t.mesh.position.z+=Math.cos(t.wanderDir)*t.speed*0.25;
                if(t.type==='human'||t.type==='deer'||t.type==='wolf'||t.type==='horse')
                    t.mesh.rotation.y=t.wanderDir;
                if(t.type==='human'){
                    t.mesh.children.forEach((c,ci)=>{ if(ci<2) c.rotation.x=Math.sin(time*4+t.animPhase+ci)*0.2; });
                }
            }
        }

        if(abductActive&&dist<6){
            t.vy+=3.5/t.weight;
            if(t.vy>0.6) t.vy=0.6;
            t.mesh.position.y+=t.vy;
            t.mesh.rotation.y+=0.06; t.mesh.rotation.x+=0.02;
            if(t.mesh.position.y>ufo.position.y-2){
                score+=t.score; abductCount++;
                document.getElementById('score').textContent=score;
                document.getElementById('count').textContent=abductCount;
                showNotif('+'+t.score);
                collected.push({title:t.title,icon:t.icon,score:t.score,type:t.type});
                scene.remove(t.mesh); targets.splice(i,1);
            }
        } else if(t.mesh.position.y>0.05){
            t.vy-=0.2;
            t.mesh.position.y+=t.vy;
            if(t.mesh.position.y<=0.05){t.mesh.position.y=0.05;t.vy=0;t.mesh.rotation.x=0;}
        }
    }


    // ---- Building collision detection ----
    buildingCollisionCooldown -= delta;
    if(buildingCollisionCooldown <= 0) {
        const UFO_RADIUS = 6.5;
        const uy = ufo.position.y;
        for(const [, colliders] of buildingColliders) {
            for(const c of colliders) {
                const hw = c.w/2 + UFO_RADIUS;
                const hd = c.d/2 + UFO_RADIUS;
                const dx = Math.abs(ufo.position.x - c.wx);
                const dz = Math.abs(ufo.position.z - c.wz);
                if(dx < hw && dz < hd && uy < c.h + UFO_RADIUS) {
                    // COLLISION!
                    buildingCollisionCooldown = 1.2;
                    ufoHP = Math.max(0, ufoHP - 8);
                    hpFill.style.width = ufoHP + '%';
                    // Flash body red
                    const origEmissive = bodyMat.emissive.getHex();
                    bodyMat.emissive.setHex(0xff0000);
                    setTimeout(()=>bodyMat.emissive.setHex(origEmissive), 200);
                    // Debris explosion at collision point
                    const hitPt = new THREE.Vector3(
                        (ufo.position.x + c.wx)/2,
                        Math.min(uy, c.h),
                        (ufo.position.z + c.wz)/2
                    );
                    createExplosion(hitPt);
                    // Screen flash overlay
                    const flashDiv = document.createElement('div');
                    flashDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,80,0,0.35);pointer-events:none;z-index:999;transition:opacity 0.4s';
                    document.body.appendChild(flashDiv);
                    setTimeout(()=>{ flashDiv.style.opacity='0'; setTimeout(()=>flashDiv.remove(),400); },80);
                    // Shake camera
                    camShakeTimer = 0.35;
                    showNotif('IMPACT! -8 HP');
                    break;
                }
            }
        }
    }

    // Chunk update
    chunkUpdateTimer++;
    if(chunkUpdateTimer>=30){ chunkUpdateTimer=0; updateChunks(); }

    // Biome label
    const curBiome=getBiome(ufo.position.x,ufo.position.z);
    const bn=BIOME_NAMES[curBiome]||'WILDERNESS';
    if(bn!==lastBiomeLabel){ biomeLabel.textContent=bn; lastBiomeLabel=bn; }

    // Camera follow
    if(camShakeTimer > 0) { camShakeTimer -= delta; }
    const camShake = camShakeTimer > 0 ? (Math.random()-0.5)*4*camShakeTimer : 0;
    camTarget.set(ufo.position.x + camShake, ufo.position.y+35, ufo.position.z+55);
    camLookTarget.set(ufo.position.x, ufo.position.y-25, ufo.position.z);
    camera.position.lerp(camTarget,0.08);
    camLookTarget.lerp(ufo.position,0.1);
    camera.lookAt(camLookTarget);

    renderer.clear();
    renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
    renderer.render(scene,camera);
}

// ======================================================
// ENCYCLOPEDIA
// ======================================================
document.getElementById('encyclopedia-btn').onclick = () => {
    const modal = document.getElementById('modal');
    modal.style.display='block';
    const grid = document.getElementById('card-grid');
    grid.innerHTML='';
    if(collected.length===0){
        grid.innerHTML='<div style="color:#00ff8866;padding:40px;letter-spacing:2px">// まだ誰も拉致されていない //</div>';
        return;
    }
    const byTitle={};
    collected.forEach(c=>{ if(!byTitle[c.title]) byTitle[c.title]={...c,count:0}; byTitle[c.title].count++; });
    Object.values(byTitle).forEach(item=>{
        const card=document.createElement('div');
        card.className='card';
        const typeColor = {'human':'#00ff88','cow':'#ffcc44','horse':'#ff8833','bear':'#ff4444','wolf':'#8899ff','deer':'#ffaa44','eagle':'#aabbff','bison':'#cc8844','raccoon':'#aaaaaa','turkey':'#cc5533','alligator':'#44cc55','car':'#44aaff','truck':'#6688ff','bus':'#ffee22'}[item.type] || '#00ff88';
        const abbr = item.title.slice(0,2);
        card.innerHTML=`<div class="card-icon" style="width:48px;height:48px;border-radius:50%;background:${typeColor}22;border:2px solid ${typeColor};display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:18px;font-weight:bold;color:${typeColor};letter-spacing:1px">${abbr}</div><div class="card-title">${item.title}</div><div class="card-pts">${item.score} pts × ${item.count}</div>`;
        grid.appendChild(card);
    });
};
document.getElementById('close-btn').onclick=()=>document.getElementById('modal').style.display='none';
window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

updateChunks();
animate();

});
</script>
